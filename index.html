/* ══════════════════════════════════════════════════
   DETAIL SCREEN — مع نظام الحجز الاحترافي
══════════════════════════════════════════════════ */
function DetailScreen({ user, tool, tools, setTools, requests, setRequests, notifications, setNotifications, allTags, setAllTags, onBack }) {
  const liveTool   = tools.find(t=>t.id===tool.id)||tool;
  const d          = DEPTS.find(x=>x.id===liveTool.dept)||DEPTS[0];
  const canEdit    = user.role==="admin" || (user.role==="teacher" && liveTool.teacherId===user.id);
  const isOwner    = liveTool.teacherId===user.id || user.role==="admin";

  const [tab,         setTab]         = useState("info");
  const [lightbox,    setLightbox]    = useState(null);
  const [comment,     setComment]     = useState("");
  const [myRating,    setMyRating]    = useState(0);
  const [comments,    setComments]    = useState(liveTool.comments||[]);
  const [confirmDelete, setConfirmDelete] = useState(false);

  const [showReturnModal, setShowReturnModal] = useState(false);
  const [returnStatus, setReturnStatus] = useState("available");
  const [returnNote,   setReturnNote]   = useState("");
  const [returnSent,   setReturnSent]   = useState(false);

  // طلبات الإرجاع المعلقة
  const myPendingReturn = requests.find(r=>r.toolId===liveTool.id && r.requesterId===user.id && r.type==="return" && r.status==="pending");
  const pendingReturnReqs = isOwner ? requests.filter(r=>r.toolId===liveTool.id && r.type==="return" && r.status==="pending") : [];

  // حجز
  const [showBookModal, setShowBookModal] = useState(false);
  const [bookNote,      setBookNote]      = useState("");
  const [bookDue,       setBookDue]       = useState("");
  const [bookSent,      setBookSent]      = useState(false);

  // تعديل
  const [editName, setEditName] = useState("");
  const [editDesc, setEditDesc] = useState("");
  const [editGoal, setEditGoal] = useState("");
  const [editDept, setEditDept] = useState("");
  const [editTags, setEditTags] = useState("");
  const [editLink, setEditLink] = useState("");
  const [editSaved,setEditSaved]= useState(false);

  const today = new Date().toISOString().split("T")[0];
  const minDue = new Date(Date.now()+86400000).toISOString().split("T")[0];

  // هل أرسل المستخدم طلباً معلقاً لهذه الوسيلة؟
  const myPendingReq = requests.find(r=>r.toolId===liveTool.id && r.requesterId===user.id && r.status==="pending");

  /* ── إرسال طلب حجز ── */
  const sendBookRequest = () => {
    if (!bookDue) return;
    const req = {
      id:          genId(),
      toolId:      liveTool.id,
      toolName:    liveTool.name,
      toolImg:     liveTool.img,
      requesterId: user.id,
      requesterName:user.name,
      ownerId:     liveTool.teacherId,
      ownerName:   liveTool.teacher,
      note:        bookNote,
      dueDate:     bookDue,
      status:      "pending",       // pending / approved / rejected
      date:        today,
    };
    const updatedReqs = [req, ...requests];
    setRequests(updatedReqs);
    persist("app:requests", JSON.stringify(updatedReqs));

    // إشعار لصاحب الوسيلة والأدمن
    const notif = {
      id:       genId(),
      type:     "request",
      toId:     liveTool.teacherId,
      fromId:   user.id,
      fromName: user.name,
      toolId:   liveTool.id,
      toolName: liveTool.name,
      toolImg:  liveTool.img,
      reqId:    req.id,
      message:  `طلب حجز جديد من ${user.name} للوسيلة "${liveTool.name}"`,
      date:     today,
      read:     false,
    };
    // إشعار للأدمنز أيضاً (id=1)
    const adminNotif = liveTool.teacherId!==1 ? {...notif, id:genId(), toId:1} : null;
    const updatedNotifs = adminNotif ? [notif, adminNotif, ...notifications] : [notif, ...notifications];
    setNotifications(updatedNotifs);
    persist("app:notifications", JSON.stringify(updatedNotifs));

    setBookSent(true);
    setShowBookModal(false);
  };

  /* ── موافقة على طلب ── */
  const approveRequest = (req) => {
    const dateStr = new Date(req.dueDate).toLocaleDateString("ar-SA");
    // تحديث حالة الوسيلة
    setTools(prev=>prev.map(t=>t.id===req.toolId?{
      ...t,
      status:       "borrowed",
      borrowedBy:   req.requesterName,
      borrowedById: req.requesterId,
      dueDate:      dateStr,
      dueDateISO:   req.dueDate,
      usageCount:   t.usageCount+1,
      history:      [{date:today,user:req.requesterName,action:"استلام",note:req.note||""}, ...(t.history||[])],
    }:t));
    // تحديث الطلب
    const updatedReqs = requests.map(r=>r.id===req.id?{...r,status:"approved"}:r);
    setRequests(updatedReqs);
    persist("app:requests", JSON.stringify(updatedReqs));
    // إشعار لمقدم الطلب
    const notif = { id:genId(), type:"approval", toId:req.requesterId, fromId:user.id, fromName:user.name, toolName:req.toolName, toolImg:req.toolImg, message:`تمت الموافقة على طلبك لحجز "${req.toolName}" — موعد الإرجاع: ${dateStr}`, date:today, read:false };
    const updatedNotifs = [notif,...notifications];
    setNotifications(updatedNotifs);
    persist("app:notifications", JSON.stringify(updatedNotifs));
  };

  /* ── رفض طلب ── */
  const rejectRequest = (req) => {
    const updatedReqs = requests.map(r=>r.id===req.id?{...r,status:"rejected"}:r);
    setRequests(updatedReqs);
    persist("app:requests", JSON.stringify(updatedReqs));
    const notif = { id:genId(), type:"rejection", toId:req.requesterId, fromId:user.id, fromName:user.name, toolName:req.toolName, toolImg:req.toolImg, message:`تم رفض طلبك لحجز "${req.toolName}"`, date:today, read:false };
    const updatedNotifs = [notif,...notifications];
    setNotifications(updatedNotifs);
    persist("app:notifications", JSON.stringify(updatedNotifs));
  };

  /* ── إرسال طلب إرجاع ── */
  const sendReturnRequest = () => {
    const req = {
      id:           genId(),
      type:         "return",
      toolId:       liveTool.id,
      toolName:     liveTool.name,
      toolImg:      liveTool.img,
      requesterId:  user.id,
      requesterName:user.name,
      ownerId:      liveTool.teacherId,
      ownerName:    liveTool.teacher,
      note:         returnNote,
      status:       "pending",
      date:         today,
    };
    const updatedReqs = [req, ...requests];
    setRequests(updatedReqs);
    persist("app:requests", JSON.stringify(updatedReqs));
    // إشعار لصاحب الوسيلة
    const notif = {
      id:genId(), type:"returnRequest", toId:liveTool.teacherId, fromId:user.id, fromName:user.name,
      toolId:liveTool.id, toolName:liveTool.name, toolImg:liveTool.img, reqId:req.id,
      message:`طلب إرجاع من ${user.name} للوسيلة "${liveTool.name}"`,
      date:today, read:false,
    };
    const adminNotif = liveTool.teacherId!==1 ? {...notif, id:genId(), toId:1} : null;
    const updatedNotifs = adminNotif ? [notif, adminNotif, ...notifications] : [notif, ...notifications];
    setNotifications(updatedNotifs);
    persist("app:notifications", JSON.stringify(updatedNotifs));
    setReturnSent(true);
    setShowReturnModal(false);
  };

  /* ── موافقة المعلم على الإرجاع ── */
  const approveReturn = (req, chosenStatus) => {
    setTools(prev=>prev.map(t=>t.id===req.toolId?{
      ...t, status:chosenStatus, borrowedBy:null, borrowedById:null, dueDate:null, dueDateISO:null,
      history:[{date:today,user:req.requesterName,action:"تسليم",note:`تم الإرجاع • الحالة الجديدة: ${STATUS[chosenStatus]?.label||chosenStatus}${req.note?" • "+req.note:""}`}, ...(t.history||[])],
    }:t));
    const updatedReqs = requests.map(r=>r.id===req.id?{...r,status:"approved"}:r);
    setRequests(updatedReqs);
    persist("app:requests", JSON.stringify(updatedReqs));
    const notif = {
      id:genId(), type:"returnApproved", toId:req.requesterId, fromId:user.id, fromName:user.name,
      toolName:req.toolName, toolImg:req.toolImg,
      message:`✅ تم قبول إرجاعك للوسيلة "${req.toolName}"`,
      date:today, read:false,
    };
    const updatedNotifs = [notif,...notifications];
    setNotifications(updatedNotifs);
    persist("app:notifications", JSON.stringify(updatedNotifs));
  };

  /* ── رفض المعلم لطلب الإرجاع ── */
  const rejectReturn = (req) => {
    const updatedReqs = requests.map(r=>r.id===req.id?{...r,status:"rejected"}:r);
    setRequests(updatedReqs);
    persist("app:requests", JSON.stringify(updatedReqs));
    const notif = {
      id:genId(), type:"returnRejected", toId:req.requesterId, fromId:user.id, fromName:user.name,
      toolName:req.toolName, toolImg:req.toolImg,
      message:`❌ تم رفض طلب إرجاعك للوسيلة "${req.toolName}"`,
      date:today, read:false,
    };
    const updatedNotifs = [notif,...notifications];
    setNotifications(updatedNotifs);
    persist("app:notifications", JSON.stringify(updatedNotifs));
  };

  /* ── تغيير حالة يدوي (للأدمن) ── */
  const changeStatus = (k) => {
    setTools(prev=>prev.map(t=>t.id!==liveTool.id?t:{
      ...t,
      status: k,
      ...(k==="available"?{borrowedBy:null,borrowedById:null,dueDate:null,dueDateISO:null}:{}),
      history:[{date:today,user:user.name,action:k==="available"?"تسليم":"استلام",note:""}, ...(t.history||[])],
    }));
  };

  const deleteTool = () => { setTools(prev=>prev.filter(t=>t.id!==liveTool.id)); onBack(); };

  const openManage = () => {
    setEditName(liveTool.name); setEditDesc(liveTool.desc); setEditGoal(liveTool.goal);
    setEditDept(liveTool.dept); setEditTags((liveTool.tags||[]).join("، ")); setEditLink(liveTool.externalLink||""); setEditSaved(false);
    setTab("manage");
  };

  const saveEdits = () => {
    const tagsArr = editTags.split(/[،,]/).map(t=>t.trim()).filter(Boolean);
    setTools(prev=>prev.map(t=>t.id===liveTool.id?{...t,name:editName,desc:editDesc,goal:editGoal,dept:editDept,tags:tagsArr,externalLink:editLink.trim()||null}:t));
    setEditSaved(true);
    setTimeout(()=>setEditSaved(false),2500);
  };

  const handleToolPhoto = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!["image/jpeg","image/jpg","image/png"].includes(file.type)) {
      alert("⚠️ يُقبل فقط JPG أو PNG");
      return;
    }
    const MAX = 2 * 1024 * 1024; // 2MB
    const applyPhoto = (dataUrl) =>
      setTools(prev => prev.map(t => t.id === liveTool.id
        ? { ...t, photos: [...(t.photos || []), dataUrl] }
        : t));
    const compressImage = (file, callback) => {
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          let quality = 0.85;
          const canvas = document.createElement("canvas");
          const MAX_DIM = 1600;
          if (width > MAX_DIM || height > MAX_DIM) {
            const ratio = Math.min(MAX_DIM / width, MAX_DIM / height);
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }
          canvas.width = width;
          canvas.height = height;
          canvas.getContext("2d").drawImage(img, 0, 0, width, height);
          const tryCompress = (q) => {
            const result = canvas.toDataURL("image/jpeg", q);
            const sizeBytes = Math.round((result.length - "data:image/jpeg;base64,".length) * 3 / 4);
            if (sizeBytes < MAX || q <= 0.3) {
              if (sizeBytes >= MAX) {
                alert("⚠️ تعذّر ضغط الصورة بما يكفي، يرجى اختيار صورة أصغر");
              } else {
                callback(result);
              }
            } else {
              tryCompress(Math.max(q - 0.15, 0.3));
            }
          };
          tryCompress(quality);
        };
        img.onerror = () => alert("⚠️ تعذّر قراءة الصورة");
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };
    if (file.size <= MAX) {
      const r = new FileReader();
      r.onload = ev => applyPhoto(ev.target.result);
      r.readAsDataURL(file);
    } else {
      compressImage(file, applyPhoto);
    }
  };

  // الطلبات المعلقة على هذه الوسيلة (لصاحبها والأدمن)
  const pendingReqsForTool = isOwner ? requests.filter(r=>r.toolId===liveTool.id && r.status==="pending") : [];

  const totalPendingForOwner = pendingReqsForTool.length + pendingReturnReqs.length;
  const tabs = [
    {k:"info",label:"التفاصيل"},
    {k:"history",label:"السجل"},
    {k:"reviews",label:"التقييمات"},
    ...(totalPendingForOwner>0?[{k:"requests",label:`طلبات (${totalPendingForOwner})`}]:[]),
    ...(canEdit?[{k:"manage",label:"⚙️ إدارة"}]:[]),
  ];

  return (
    <div style={{paddingBottom:"5rem"}}>
      {confirmDelete && <ConfirmDialog message={`هل أنت متأكد من حذف "${liveTool.name}"؟`} onConfirm={deleteTool} onCancel={()=>setConfirmDelete(false)}/>}

      {/* Return Request Modal — المستعير يرسل طلب الإرجاع */}
      {showReturnModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem",width:"100%",maxWidth:430}}>
            <div style={{fontSize:"1rem",fontWeight:800,color:"#0f172a",marginBottom:"0.4rem"}}>↩️ طلب إرجاع الوسيلة</div>
            <div style={{fontSize:"0.78rem",color:"#9ca3af",marginBottom:"1rem"}}>الوسيلة: <b style={{color:"#1f2937"}}>{liveTool.name}</b></div>
            <div style={{background:"#fffbeb",border:"1px solid #f59e0b44",borderRadius:"10px",padding:"0.75rem",marginBottom:"1rem",fontSize:"0.78rem",color:"#92400e",lineHeight:1.6}}>
              ⚠️ سيتم إرسال طلب إرجاع إلى المعلم <b>{liveTool.teacher}</b> ليقوم بالموافقة وتحديد حالة الوسيلة.
            </div>
            <div style={{marginBottom:"1rem"}}>
              <label style={lLabel}>ملاحظة للمعلم (اختياري)</label>
              <textarea value={returnNote} onChange={e=>setReturnNote(e.target.value)} rows={2} placeholder="مثال: الوسيلة بحالة جيدة / تحتاج فحص..." style={{...lightInput,resize:"none",lineHeight:1.6}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.7rem"}}>
              <button onClick={()=>setShowReturnModal(false)} style={{background:"#f3f4f6",border:"none",borderRadius:"12px",padding:"0.8rem",color:"#6b7280",fontWeight:700,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>إلغاء</button>
              <button onClick={sendReturnRequest} style={{background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",borderRadius:"12px",padding:"0.8rem",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>📤 إرسال طلب الإرجاع</button>
            </div>
          </div>
        </div>
      )}

      {/* Lightbox */}
      {lightbox && (
        <div onClick={()=>setLightbox(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
          <img src={lightbox} alt="" style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:"12px",objectFit:"contain"}}/>
          <button onClick={()=>setLightbox(null)} style={{position:"absolute",top:"1rem",left:"1rem",background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"50%",width:36,height:36,color:"#fff",fontSize:"1.2rem",cursor:"pointer"}}>✕</button>
        </div>
      )}

      {/* Book Modal */}
      {showBookModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:999,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem",width:"100%",maxWidth:430}}>
            <div style={{fontSize:"1rem",fontWeight:700,color:"#0f172a",marginBottom:"1rem"}}>📋 طلب حجز — {liveTool.name}</div>
            <div style={{marginBottom:"0.8rem"}}>
              <label style={lLabel}>ملاحظة (اختياري)</label>
              <textarea value={bookNote} onChange={e=>setBookNote(e.target.value)} rows={2} placeholder="سبب الحجز أو أي ملاحظة..." style={{...lightInput,resize:"none",lineHeight:1.6}}/>
            </div>
            <div style={{marginBottom:"1rem"}}>
              <label style={lLabel}>تاريخ الإرجاع المتوقع *</label>
              <input type="date" value={bookDue} min={minDue} onChange={e=>setBookDue(e.target.value)} style={lightInput}/>
            </div>
            {!bookDue && <div style={{color:"#ef4444",fontSize:"0.75rem",marginBottom:"0.6rem"}}>⚠️ يجب تحديد تاريخ الإرجاع</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.7rem"}}>
              <button onClick={()=>setShowBookModal(false)} style={{background:"#f3f4f6",border:"none",borderRadius:"12px",padding:"0.75rem",color:"#6b7280",fontWeight:700,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>إلغاء</button>
              <button onClick={sendBookRequest} disabled={!bookDue} style={{background:bookDue?"linear-gradient(135deg,#10b981,#059669)":"#d1d5db",border:"none",borderRadius:"12px",padding:"0.75rem",color:"#fff",fontWeight:700,cursor:bookDue?"pointer":"not-allowed",fontFamily:"Tajawal,sans-serif"}}>إرسال الطلب ✅</button>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${d.color}dd,${d.color}99)`,padding:"1.5rem 1.2rem 2rem",position:"relative",overflow:"hidden"}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:"10px",padding:"0.4rem 0.8rem",color:"#fff",cursor:"pointer",fontSize:"0.85rem",marginBottom:"1rem",fontFamily:"Tajawal,sans-serif"}}>← رجوع</button>
        <div style={{position:"absolute",left:"1rem",top:"50%",transform:"translateY(-50%)",fontSize:"6rem",opacity:0.12}}>{liveTool.img}</div>
        <StatusBadge status={liveTool.status}/>
        <div style={{color:"#fff",fontSize:"1.5rem",fontWeight:900,marginTop:"0.5rem",marginBottom:"0.3rem"}}>{liveTool.name}</div>
        <div style={{color:"rgba(255,255,255,0.8)",fontSize:"0.8rem"}}>{liveTool.teacher} • {d.name}</div>
        <div style={{marginTop:"0.5rem"}}><Stars val={liveTool.rating}/></div>
      </div>

      {/* Action Buttons */}
      <div style={{background:"#fff",padding:"0.9rem 1.2rem",borderBottom:"1px solid #f3f4f6"}}>
        {/* زر طلب الحجز — للمستخدمين غير أصحاب الوسيلة */}
        {!isOwner && liveTool.status==="available" && !myPendingReq && !bookSent && (
          <button onClick={()=>setShowBookModal(true)} style={{width:"100%",background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",borderRadius:"12px",padding:"0.85rem",color:"#fff",fontWeight:700,fontSize:"0.95rem",cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>
            📋 طلب حجز الوسيلة
          </button>
        )}
        {/* حالة بعد الإرسال */}
        {(!isOwner) && (myPendingReq || bookSent) && (
          <div style={{background:"#fffbeb",border:"1.5px solid #f59e0b",borderRadius:"12px",padding:"0.85rem",textAlign:"center"}}>
            <div style={{fontWeight:700,color:"#92400e"}}>⏳ طلبك قيد المراجعة</div>
            <div style={{fontSize:"0.78rem",color:"#78350f",marginTop:"4px"}}>سيتم إشعارك عند الموافقة أو الرفض</div>
          </div>
        )}
        {/* إرجاع الوسيلة — للمستعير */}
        {!isOwner && liveTool.status==="borrowed" && liveTool.borrowedById===user.id && !myPendingReturn && !returnSent && (
          <button onClick={()=>{setReturnNote("");setShowReturnModal(true);}} style={{width:"100%",background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",borderRadius:"12px",padding:"0.85rem",color:"#fff",fontWeight:700,fontSize:"0.95rem",cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>
            ↩️ طلب إرجاع الوسيلة
          </button>
        )}
        {/* حالة بعد إرسال طلب الإرجاع */}
        {!isOwner && liveTool.status==="borrowed" && liveTool.borrowedById===user.id && (myPendingReturn || returnSent) && (
          <div style={{background:"#eff6ff",border:"1.5px solid #3b82f6",borderRadius:"12px",padding:"0.85rem",textAlign:"center"}}>
            <div style={{fontWeight:700,color:"#1e40af"}}>📤 طلب الإرجاع قيد المراجعة</div>
            <div style={{fontSize:"0.78rem",color:"#1d4ed8",marginTop:"4px"}}>سيتم إشعارك عند موافقة المعلم أو رفضه</div>
          </div>
        )}
        {/* حالة غير متاحة ومش مستعير ومش صاحب */}
        {!isOwner && liveTool.status!=="available" && liveTool.borrowedById!==user.id && !myPendingReq && !bookSent && (
          <div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:"12px",padding:"0.85rem",textAlign:"center"}}>
            <div style={{fontWeight:700,color:"#991b1b"}}>🔴 الوسيلة غير متاحة حالياً</div>
            <div style={{fontSize:"0.78rem",color:"#9ca3af",marginTop:"4px"}}>يمكنك متابعة حالتها وطلبها لاحقاً</div>
          </div>
        )}
        {/* معلومات الاستعارة */}
        {liveTool.status==="borrowed" && liveTool.dueDate && (
          <div style={{marginTop:"0.8rem",background:"#fffbeb",border:"1px solid #f59e0b44",borderRadius:"10px",padding:"0.7rem",display:"flex",alignItems:"center",gap:"0.6rem"}}>
            <span style={{fontSize:"1.2rem"}}>⏰</span>
            <div>
              <div style={{fontSize:"0.72rem",color:"#92400e"}}>موعد الإرجاع</div>
              <div style={{fontSize:"0.88rem",fontWeight:700,color:"#92400e"}}>{liveTool.dueDate}</div>
              {liveTool.borrowedBy && <div style={{fontSize:"0.72rem",color:"#9ca3af"}}>بواسطة: {liveTool.borrowedBy}</div>}
            </div>
          </div>
        )}
      </div>

      {/* Tabs */}
      <div style={{background:"#fff",display:"flex",borderBottom:"1px solid #f3f4f6",padding:"0 1.2rem",overflowX:"auto"}}>
        {tabs.map(t=>(
          <button key={t.k} onClick={()=>t.k==="manage"?openManage():setTab(t.k)} style={{flexShrink:0,padding:"0.8rem 0.7rem",border:"none",background:"none",borderBottom:tab===t.k?`2.5px solid ${d.color}`:"2.5px solid transparent",color:tab===t.k?d.color:"#9ca3af",fontWeight:tab===t.k?700:400,fontSize:"0.78rem",cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>{t.label}</button>
        ))}
      </div>

      <div style={{padding:"1.2rem"}}>

        {/* INFO TAB */}
        {tab==="info" && (
          <>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.7rem",marginBottom:"1rem"}}>
              {[{label:"الهدف التعليمي",val:liveTool.goal,icon:"🎯"},{label:"عدد الاستخدامات",val:`${liveTool.usageCount} مرة`,icon:"📊"}].map(m=>(
                <div key={m.label} style={{background:"#f9fafb",borderRadius:"12px",padding:"0.8rem"}}>
                  <div style={{fontSize:"0.7rem",color:"#9ca3af",marginBottom:"4px"}}>{m.icon} {m.label}</div>
                  <div style={{fontSize:"0.85rem",fontWeight:600,color:"#1f2937"}}>{m.val}</div>
                </div>
              ))}
            </div>
            <div style={{background:"#f9fafb",borderRadius:"12px",padding:"1rem",marginBottom:"1rem"}}>
              <div style={{fontSize:"0.75rem",color:"#9ca3af",marginBottom:"6px"}}>الوصف</div>
              <div style={{fontSize:"0.88rem",color:"#374151",lineHeight:1.7}}>{liveTool.desc}</div>
            </div>
            {liveTool.externalLink && (
              <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:"12px",padding:"0.9rem",marginBottom:"1rem",display:"flex",alignItems:"center",gap:"0.7rem"}}>
                <span style={{fontSize:"1.3rem"}}>🔗</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:"0.72rem",color:"#1d4ed8",fontWeight:700,marginBottom:"3px"}}>رابط خارجي</div>
                  <a href={liveTool.externalLink} target="_blank" rel="noopener noreferrer" style={{fontSize:"0.78rem",color:"#3b82f6",wordBreak:"break-all",textDecoration:"none"}} onClick={e=>e.stopPropagation()}>{liveTool.externalLink}</a>
                </div>
                <a href={liveTool.externalLink} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:"8px",padding:"0.35rem 0.7rem",fontSize:"0.72rem",fontWeight:700,cursor:"pointer",textDecoration:"none",whiteSpace:"nowrap"}}>فتح ↗</a>
              </div>
            )}
            <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap"}}>
              {(liveTool.tags||[]).map(tg=><span key={tg} style={{background:d.light,color:d.color,border:`1px solid ${d.color}33`,borderRadius:"8px",padding:"3px 10px",fontSize:"0.75rem",fontWeight:600}}>{tg}</span>)}
            </div>
            {(liveTool.photos||[]).length>0 && (
              <div style={{marginTop:"1rem"}}>
                <div style={{fontSize:"0.78rem",color:"#9ca3af",marginBottom:"6px"}}>📸 صور الوسيلة</div>
                <div style={{display:"flex",gap:"0.5rem",overflowX:"auto"}}>
                  {liveTool.photos.map((src,i)=><img key={i} src={src} alt="" onClick={()=>setLightbox(src)} style={{width:90,height:90,borderRadius:"10px",objectFit:"cover",flexShrink:0,cursor:"pointer"}}/>)}
                </div>
              </div>
            )}
          </>
        )}

        {/* HISTORY TAB */}
        {tab==="history" && (
          <div style={{display:"grid",gap:"0.7rem"}}>
            {(liveTool.history||[]).length===0 && <div style={{textAlign:"center",padding:"2rem",color:"#9ca3af"}}>لا يوجد سجل بعد</div>}
            {(liveTool.history||[]).map((h,i)=>(
              <div key={i} style={{background:"#f9fafb",borderRadius:"12px",padding:"0.8rem",display:"flex",gap:"0.7rem",alignItems:"flex-start"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:h.action==="استلام"?"#10b981":"#6366f1",marginTop:"6px",flexShrink:0}}/>
                <div><div style={{fontSize:"0.85rem",fontWeight:600,color:"#1f2937"}}>{h.action}</div><div style={{fontSize:"0.75rem",color:"#9ca3af"}}>{h.user} • {h.date}</div>{h.note&&<div style={{fontSize:"0.75rem",color:"#6b7280",marginTop:"2px"}}>"{h.note}"</div>}</div>
              </div>
            ))}
          </div>
        )}

        {/* REVIEWS TAB */}
        {tab==="reviews" && (
          <>
            <div style={{background:"#f9fafb",borderRadius:"12px",padding:"1rem",marginBottom:"1rem",display:"flex",gap:"0.5rem",alignItems:"center"}}>
              <div style={{fontSize:"1.8rem",fontWeight:900,color:"#0f172a"}}>{liveTool.rating}</div>
              <div><Stars val={liveTool.rating}/><div style={{fontSize:"0.72rem",color:"#9ca3af"}}>{liveTool.reviews} تقييم</div></div>
            </div>
            <div style={{marginBottom:"1rem"}}>
              <label style={lLabel}>تقييمك</label>
              <div style={{display:"flex",gap:"4px",marginBottom:"0.6rem"}}>
                {[1,2,3,4,5].map(s=><span key={s} onClick={()=>setMyRating(s)} style={{fontSize:"1.5rem",cursor:"pointer",color:myRating>=s?"#f59e0b":"#d1d5db"}}>★</span>)}
              </div>
              <textarea value={comment} onChange={e=>setComment(e.target.value)} rows={2} placeholder="أضف تعليقك..." style={{...lightInput,resize:"none",lineHeight:1.6,marginBottom:"0.6rem"}}/>
              <button onClick={()=>{ if(!comment.trim()||!myRating)return; const c={id:genId(),user:user.name,text:comment,rating:myRating,date:today}; const nc=[c,...comments]; setComments(nc); setTools(prev=>prev.map(t=>t.id===liveTool.id?{...t,comments:nc,rating:parseFloat(((t.rating*t.reviews+myRating)/(t.reviews+1)).toFixed(1)),reviews:t.reviews+1}:t)); setComment(""); setMyRating(0); }} style={{width:"100%",background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",borderRadius:"10px",padding:"0.6rem",color:"#fff",fontWeight:700,fontSize:"0.85rem",cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>إرسال التقييم</button>
            </div>
            {comments.map(c=>(
              <div key={c.id} style={{background:"#f9fafb",borderRadius:"12px",padding:"0.8rem",marginBottom:"0.6rem"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}><span style={{fontSize:"0.85rem",fontWeight:600,color:"#1f2937"}}>{c.user}</span><Stars val={c.rating}/></div>
                <div style={{fontSize:"0.83rem",color:"#374151"}}>{c.text}</div>
                <div style={{fontSize:"0.7rem",color:"#d1d5db",marginTop:"4px"}}>{c.date}</div>
              </div>
            ))}
          </>
        )}

        {/* REQUESTS TAB — للأدمن وصاحب الوسيلة */}
        {tab==="requests" && (
          <div style={{display:"grid",gap:"1rem"}}>
            {/* ── طلبات الحجز ── */}
            {pendingReqsForTool.length>0 && (
              <div>
                <div style={{fontSize:"0.82rem",fontWeight:700,color:"#6366f1",marginBottom:"0.6rem",display:"flex",alignItems:"center",gap:"0.4rem"}}>📋 طلبات الحجز <span style={{background:"#eef2ff",color:"#6366f1",borderRadius:"100px",padding:"1px 8px",fontSize:"0.72rem"}}>{pendingReqsForTool.length}</span></div>
                {pendingReqsForTool.map(req=>(
                  <div key={req.id} style={{background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:"16px",padding:"1rem",boxShadow:"0 2px 8px rgba(0,0,0,0.05)",marginBottom:"0.7rem"}}>
                    <div style={{display:"flex",gap:"0.8rem",alignItems:"flex-start",marginBottom:"0.8rem"}}>
                      <div style={{fontSize:"2rem"}}>{req.toolImg}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:"0.88rem",fontWeight:700,color:"#1f2937"}}>{req.requesterName}</div>
                        <div style={{fontSize:"0.78rem",color:"#6b7280",marginTop:"2px"}}>طلب حجز: <b>{req.toolName}</b></div>
                        <div style={{fontSize:"0.75rem",color:"#10b981",fontWeight:600,marginTop:"2px"}}>📅 موعد الإرجاع: {req.dueDate}</div>
                        {req.note && <div style={{fontSize:"0.75rem",color:"#9ca3af",marginTop:"4px",background:"#f9fafb",borderRadius:"8px",padding:"6px 8px"}}>"{req.note}"</div>}
                        <div style={{fontSize:"0.7rem",color:"#d1d5db",marginTop:"4px"}}>{req.date}</div>
                      </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem"}}>
                      <button onClick={()=>approveRequest(req)} style={{background:"linear-gradient(135deg,#10b981,#059669)",border:"none",borderRadius:"10px",padding:"0.6rem",color:"#fff",fontWeight:700,fontSize:"0.82rem",cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>✅ موافقة</button>
                      <button onClick={()=>rejectRequest(req)} style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:"10px",padding:"0.6rem",color:"#ef4444",fontWeight:700,fontSize:"0.82rem",cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>❌ رفض</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* ── طلبات الإرجاع ── */}
            {pendingReturnReqs.length>0 && (
              <div>
                <div style={{fontSize:"0.82rem",fontWeight:700,color:"#f59e0b",marginBottom:"0.6rem",display:"flex",alignItems:"center",gap:"0.4rem"}}>↩️ طلبات الإرجاع <span style={{background:"#fffbeb",color:"#f59e0b",borderRadius:"100px",padding:"1px 8px",fontSize:"0.72rem"}}>{pendingReturnReqs.length}</span></div>
                {pendingReturnReqs.map(req=>(
                  <ReturnApprovalCard key={req.id} req={req} onApprove={approveReturn} onReject={rejectReturn}/>
                ))}
              </div>
            )}

            {pendingReqsForTool.length===0 && pendingReturnReqs.length===0 && (
              <div style={{textAlign:"center",padding:"2rem",color:"#9ca3af"}}>
                <div style={{fontSize:"2.5rem",marginBottom:"0.6rem"}}>📭</div>
                <div>لا توجد طلبات معلقة</div>
              </div>
            )}
          </div>
        )}

        {/* MANAGE TAB */}
        {tab==="manage" && canEdit && (
          <div style={{display:"grid",gap:"0.8rem"}}>
            <div style={{background:"#f9fafb",borderRadius:"14px",padding:"1rem"}}>
              <div style={{fontSize:"0.85rem",fontWeight:700,color:"#0f172a",marginBottom:"0.8rem"}}>✏️ تعديل البيانات</div>
              <div style={{marginBottom:"0.7rem"}}><label style={lLabel}>اسم الوسيلة</label><input value={editName} onChange={e=>setEditName(e.target.value)} style={lightInput}/></div>
              <div style={{marginBottom:"0.7rem"}}><label style={lLabel}>الهدف التعليمي</label><input value={editGoal} onChange={e=>setEditGoal(e.target.value)} style={lightInput}/></div>
              <div style={{marginBottom:"0.7rem"}}><label style={lLabel}>القسم</label>
                <select value={editDept} onChange={e=>setEditDept(e.target.value)} style={{...lightInput,cursor:"pointer"}}>
                  {DEPTS.map(d=><option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
                </select>
              </div>
              <div style={{marginBottom:"0.7rem"}}><label style={lLabel}>الوصف</label><textarea value={editDesc} onChange={e=>setEditDesc(e.target.value)} rows={3} style={{...lightInput,resize:"none",lineHeight:1.6}}/></div>
              <div style={{marginBottom:"0.9rem"}}><label style={lLabel}>الوسوم (مفصولة بفاصلة)</label><input value={editTags} onChange={e=>setEditTags(e.target.value)} style={lightInput}/></div>
              <div style={{marginBottom:"0.9rem"}}><label style={lLabel}>🔗 رابط خارجي (اختياري)</label><input value={editLink} onChange={e=>setEditLink(e.target.value)} placeholder="رابط يوتيوب أو Drive..." style={lightInput} dir="ltr"/></div>
              {editSaved && <div style={{color:"#10b981",fontSize:"0.8rem",marginBottom:"0.6rem",fontWeight:700}}>✅ تم الحفظ</div>}
              <button onClick={saveEdits} style={{width:"100%",background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",borderRadius:"10px",padding:"0.7rem",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>حفظ التعديلات</button>
            </div>
            {/* تحديد حالة الوسيلة — للمعلم صاحب الوسيلة والأدمن */}
            <div style={{background:"linear-gradient(135deg,#f0fdf4,#f9fafb)",border:"1.5px solid #bbf7d0",borderRadius:"14px",padding:"1rem"}}>
              <div style={{display:"flex",alignItems:"center",gap:"0.5rem",marginBottom:"0.3rem"}}>
                <span style={{fontSize:"1.1rem"}}>🏷️</span>
                <div style={{fontSize:"0.88rem",fontWeight:800,color:"#065f46"}}>تحديد حالة الوسيلة</div>
              </div>
              <div style={{fontSize:"0.72rem",color:"#6b7280",marginBottom:"0.9rem"}}>يمكنك تغيير حالة الوسيلة يدوياً في أي وقت</div>
              <div style={{display:"grid",gap:"0.5rem"}}>
                {Object.entries(STATUS).map(([k,s])=>(
                  <button key={k} onClick={()=>changeStatus(k)}
                    style={{background:liveTool.status===k?s.bg:"#fff",border:`2px solid ${liveTool.status===k?s.color:"#e5e7eb"}`,borderRadius:"12px",padding:"0.7rem 1rem",display:"flex",alignItems:"center",gap:"0.7rem",cursor:"pointer",fontFamily:"Tajawal,sans-serif",transition:"all 0.15s",boxShadow:liveTool.status===k?"0 2px 8px rgba(0,0,0,0.08)":"none"}}>
                    <span style={{fontSize:"1.1rem"}}>{s.icon}</span>
                    <div style={{flex:1,textAlign:"right"}}>
                      <div style={{fontSize:"0.85rem",fontWeight:liveTool.status===k?700:500,color:liveTool.status===k?s.color:"#374151"}}>{s.label}</div>
                    </div>
                    {liveTool.status===k
                      ? <span style={{background:s.color,color:"#fff",borderRadius:"100px",padding:"2px 10px",fontSize:"0.68rem",fontWeight:700,flexShrink:0}}>● الحالية</span>
                      : <span style={{color:"#d1d5db",fontSize:"0.85rem"}}>→</span>
                    }
                  </button>
                ))}
              </div>
            </div>
            {/* صور */}
            <div style={{background:"#f9fafb",borderRadius:"14px",padding:"1rem"}}>
              <div style={{fontSize:"0.85rem",fontWeight:700,color:"#0f172a",marginBottom:"0.8rem"}}>📸 صور الوسيلة</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.5rem"}}>
                {(liveTool.photos||[]).map((src,i)=>(
                  <div key={i} style={{position:"relative",aspectRatio:"1",borderRadius:"10px",overflow:"hidden"}}>
                    <img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                    <button onClick={()=>setTools(prev=>prev.map(t=>t.id===liveTool.id?{...t,photos:(t.photos||[]).filter((_,j)=>j!==i)}:t))} style={{position:"absolute",top:3,left:3,background:"rgba(0,0,0,0.65)",color:"#fff",border:"none",borderRadius:"50%",width:20,height:20,fontSize:"0.65rem",cursor:"pointer"}}>✕</button>
                  </div>
                ))}
                <label htmlFor="tool-photo" style={{aspectRatio:"1",borderRadius:"10px",border:"2px dashed #d1d5db",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:"#fff",gap:"4px"}}>
                  <span style={{fontSize:"1.4rem"}}>➕</span>
                  <span style={{fontSize:"0.65rem",color:"#9ca3af"}}>صورة</span>
                </label>
                <input id="tool-photo" type="file" accept="image/*" onChange={handleToolPhoto} style={{display:"none"}}/>
              </div>
            </div>
            {/* حذف */}
            <button onClick={()=>setConfirmDelete(true)} style={{width:"100%",background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:"12px",padding:"0.75rem",color:"#ef4444",fontWeight:700,fontSize:"0.88rem",cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>🗑️ حذف الوسيلة نهائياً</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   ADD TOOL SCREEN
══════════════════════════════════════════════════ */
function AddToolScreen({ user, tools, setTools, allTags, setAllTags, onBack }) {
  if (user.role!=="teacher" && user.role!=="admin") return (
    <div style={{minHeight:"60vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem",textAlign:"center"}}>
      <div style={{fontSize:"3rem",marginBottom:"1rem"}}>🚫</div>
      <div style={{fontSize:"1rem",fontWeight:700,color:"#0f172a"}}>غير مصرح</div>
      <button onClick={onBack} style={{marginTop:"1rem",background:"#0f172a",color:"#fff",border:"none",borderRadius:"12px",padding:"0.7rem 1.5rem",fontFamily:"Tajawal,sans-serif",fontWeight:700,cursor:"pointer"}}>← رجوع</button>
    </div>
  );

  const [name,       setName]       = useState("");
  const [desc,       setDesc]       = useState("");
  const [goal,       setGoal]       = useState("");
  const [dept,       setDept]       = useState("autism");
  const [selTags,    setSelTags]    = useState([]);
  const [newTagInput,setNewTagInput]= useState("");
  const [photos,     setPhotos]     = useState([]);
  const [externalLink, setExternalLink] = useState("");
  const [err,        setErr]        = useState("");
  const [done,       setDone]       = useState(false);
  const EMOJIS = ["🎯","🎨","🔢","📖","🖐️","😊","🧩","🌟","🎭","🎲","📝","🎵","🏆","🌈","🧸"];
  const [chosenEmoji,setChosenEmoji]= useState("🎯");
  const [showEmoji,  setShowEmoji]  = useState(false);
  const availableTags = (allTags||INIT_TAGS).filter(t=>t!=="الكل");

  const toggleTag = t => setSelTags(prev=>prev.includes(t)?prev.filter(x=>x!==t):[...prev,t]);
  const addNewTag = () => {
    const t=newTagInput.trim(); if(!t) return;
    if(!(allTags||INIT_TAGS).includes(t)){ const u=[...(allTags||INIT_TAGS),t]; setAllTags(u); persist("app:tags",JSON.stringify(u)); }
    setSelTags(prev=>prev.includes(t)?prev:[...prev,t]);
    setNewTagInput("");
  };
  const handlePhoto = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    // Accept only image formats
    if (!["image/jpeg","image/jpg","image/png"].includes(file.type)) {
      return setErr("⚠️ يُقبل فقط JPG أو PNG");
    }
    const MAX = 2 * 1024 * 1024; // 2MB
    const processImage = (dataUrl) => setPhotos(prev => [...prev, dataUrl]);
    const compressImage = (file, callback) => {
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          let quality = 0.85;
          const canvas = document.createElement("canvas");
          // Scale down if very large
          const MAX_DIM = 1600;
          if (width > MAX_DIM || height > MAX_DIM) {
            const ratio = Math.min(MAX_DIM / width, MAX_DIM / height);
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }
          canvas.width = width;
          canvas.height = height;
          canvas.getContext("2d").drawImage(img, 0, 0, width, height);
          // Try compressing until under 2MB
          const tryCompress = (q) => {
            const result = canvas.toDataURL("image/jpeg", q);
            const sizeBytes = Math.round((result.length - "data:image/jpeg;base64,".length) * 3 / 4);
            if (sizeBytes < MAX || q <= 0.3) {
              if (sizeBytes >= MAX) {
                setErr("⚠️ تعذّر ضغط الصورة بما يكفي، يرجى اختيار صورة أصغر");
              } else {
                callback(result);
              }
            } else {
              tryCompress(Math.max(q - 0.15, 0.3));
            }
          };
          tryCompress(quality);
        };
        img.onerror = () => setErr("⚠️ تعذّر قراءة الصورة");
        img.src = ev.target.result;
      };
      reader.onerror = () => setErr("⚠️ تعذّر قراءة الملف");
      reader.readAsDataURL(file);
    };
    if (file.size <= MAX) {
      // Under 2MB → upload directly
      const r = new FileReader();
      r.onload = ev => processImage(ev.target.result);
      r.readAsDataURL(file);
    } else {
      // Over 2MB → compress first
      setErr("");
      compressImage(file, processImage);
    }
  };
  const submit = () => {
    if(!name.trim()) return setErr("اسم الوسيلة مطلوب");
    if(!desc.trim()) return setErr("الوصف مطلوب");
    if(!goal.trim()) return setErr("الهدف التعليمي مطلوب");
    const newTool = { id:genId(), name:name.trim(), desc:desc.trim(), goal:goal.trim(), dept, tags:selTags, status:"available", teacher:user.name, teacherId:user.id, rating:0, reviews:0, usageCount:0, img:chosenEmoji, photos, video:null, externalLink:externalLink.trim()||null, history:[], comments:[] };
    setTools(prev=>[newTool,...prev]);
    setDone(true);
    setTimeout(()=>onBack(), 1800);
  };

  if(done) return <div style={{minHeight:"60vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:"4rem",marginBottom:"1rem"}}>🎉</div><div style={{fontSize:"1.1rem",fontWeight:800,color:"#0f172a"}}>تمت إضافة الوسيلة!</div></div>;

  return (
    <div style={{paddingBottom:"2rem"}}>
      <div style={{background:"linear-gradient(135deg,#0f172a,#1e3a5f)",padding:"1.5rem 1.2rem"}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:"10px",padding:"0.4rem 0.8rem",color:"#fff",cursor:"pointer",fontSize:"0.85rem",marginBottom:"1rem",fontFamily:"Tajawal,sans-serif"}}>← رجوع</button>
        <div style={{color:"#fff",fontSize:"1.3rem",fontWeight:900}}>➕ إضافة وسيلة جديدة</div>
        <div style={{color:"rgba(255,255,255,0.5)",fontSize:"0.78rem",marginTop:"4px"}}>أضف وسيلتك للبنك المشترك — مرئية للجميع</div>
      </div>
      <div style={{padding:"1.2rem",display:"grid",gap:"1rem"}}>
        <div style={{background:"#fff",borderRadius:"16px",padding:"1rem",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:"0.88rem",fontWeight:700,color:"#0f172a",marginBottom:"0.9rem"}}>📋 معلومات الوسيلة</div>
          <div style={{marginBottom:"0.8rem"}}><label style={lLabel}>اسم الوسيلة *</label><input value={name} onChange={e=>{setName(e.target.value);setErr("");}} placeholder="مثال: بطاقات الأرقام" style={lightInput}/></div>
          <div style={{marginBottom:"0.8rem"}}><label style={lLabel}>القسم</label>
            <select value={dept} onChange={e=>setDept(e.target.value)} style={{...lightInput,cursor:"pointer"}}>
              {DEPTS.map(d=><option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
            </select>
          </div>
          <div style={{marginBottom:"0.8rem"}}><label style={lLabel}>الهدف التعليمي *</label><input value={goal} onChange={e=>{setGoal(e.target.value);setErr("");}} placeholder="مثال: تنمية الانتباه" style={lightInput}/></div>
          <div style={{marginBottom:"0.8rem"}}><label style={lLabel}>الوصف التفصيلي *</label><textarea value={desc} onChange={e=>{setDesc(e.target.value);setErr("");}} rows={3} placeholder="اشرح الوسيلة وكيفية استخدامها..." style={{...lightInput,resize:"none",lineHeight:1.6}}/></div>
          <div style={{marginBottom:"0.8rem"}}>
            <label style={lLabel}>🔗 رابط خارجي (اختياري)</label>
            <input value={externalLink} onChange={e=>setExternalLink(e.target.value)} placeholder="مثال: رابط يوتيوب أو Google Drive..." style={lightInput} dir="ltr"/>
            <div style={{fontSize:"0.68rem",color:"#9ca3af",marginTop:"4px"}}>فيديو توضيحي، ملف Drive، أو أي رابط مرتبط بالوسيلة</div>
          </div>
          <div>
            <label style={lLabel}>🏷️ الوسوم</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:"0.4rem",marginBottom:"0.7rem"}}>
              {availableTags.map(t=><span key={t} onClick={()=>toggleTag(t)} style={{cursor:"pointer",borderRadius:"100px",padding:"0.25rem 0.85rem",fontSize:"0.75rem",fontWeight:600,background:selTags.includes(t)?"#6366f1":"#f3f4f6",color:selTags.includes(t)?"#fff":"#6b7280",border:`1.5px solid ${selTags.includes(t)?"#6366f1":"#e5e7eb"}`}}>{selTags.includes(t)?"✓ ":""}{t}</span>)}
            </div>
            <div style={{display:"flex",gap:"0.5rem"}}>
              <input value={newTagInput} onChange={e=>setNewTagInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addNewTag()} placeholder="أضف وسماً جديداً..." style={{...lightInput,flex:1,padding:"0.5rem 0.8rem",fontSize:"0.8rem"}}/>
              <button onClick={addNewTag} style={{background:"#6366f1",color:"#fff",border:"none",borderRadius:"10px",padding:"0.5rem 0.9rem",fontSize:"0.8rem",fontWeight:700,cursor:"pointer",fontFamily:"Tajawal,sans-serif",flexShrink:0}}>+ إضافة</button>
            </div>
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:"16px",padding:"1rem",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:"0.88rem",fontWeight:700,color:"#0f172a",marginBottom:"0.9rem"}}>📸 صور الوسيلة</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"0.5rem"}}>
            {photos.map((src,i)=><div key={i} style={{position:"relative",aspectRatio:"1",borderRadius:"10px",overflow:"hidden"}}><img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/><button onClick={()=>setPhotos(prev=>prev.filter((_,j)=>j!==i))} style={{position:"absolute",top:3,left:3,background:"rgba(0,0,0,0.65)",color:"#fff",border:"none",borderRadius:"50%",width:20,height:20,fontSize:"0.65rem",cursor:"pointer"}}>✕</button></div>)}
            <label htmlFor="add-photo" style={{aspectRatio:"1",borderRadius:"10px",border:"2px dashed #d1d5db",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",background:"#f9fafb",gap:"4px"}}><span style={{fontSize:"1.4rem"}}>➕</span><span style={{fontSize:"0.65rem",color:"#9ca3af"}}>صورة</span></label>
            <input id="add-photo" type="file" accept="image/jpeg,image/jpg,image/png" onChange={handlePhoto} style={{display:"none"}}/>
          </div>
        </div>
        {err && <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:"12px",padding:"0.75rem",textAlign:"center",color:"#ef4444",fontSize:"0.82rem",fontWeight:600}}>{err}</div>}
        <button onClick={submit} style={{width:"100%",background:"linear-gradient(135deg,#10b981,#059669)",border:"none",borderRadius:"14px",padding:"1rem",color:"#fff",fontSize:"1rem",fontWeight:800,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>✅ إضافة الوسيلة للبنك</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   NOTIFICATIONS SCREEN
══════════════════════════════════════════════════ */
function NotificationsScreen({ user, notifications, setNotifications, requests, tools, setRequests, setTools }) {
  // إشعارات المستخدم الحالي فقط
  const myNotifs = notifications.filter(n=>n.toId===user.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  // طلبات الحجز المعلقة لوسائلي (كصاحب وسيلة أو أدمن)
  const myToolIds = tools.filter(t=>t.teacherId===user.id||user.role==="admin").map(t=>t.id);
  const pendingForMe = requests.filter(r=>myToolIds.includes(r.toolId) && r.status==="pending");
  const today = new Date().toISOString().split("T")[0];

  const markRead = (id) => {
    const updated = notifications.map(n=>n.id===id?{...n,read:true}:n);
    setNotifications(updated);
    persist("app:notifications", JSON.stringify(updated));
  };
  const clearAll = () => {
    const updated = notifications.filter(n=>n.toId!==user.id||!n.read);
    setNotifications(updated);
    persist("app:notifications", JSON.stringify(updated));
  };

  const approveReq = (req) => {
    const dateStr = new Date(req.dueDate).toLocaleDateString("ar-SA");
    setTools(prev=>prev.map(t=>t.id===req.toolId?{
      ...t, status:"borrowed", borrowedBy:req.requesterName, borrowedById:req.requesterId,
      dueDate:dateStr, dueDateISO:req.dueDate, usageCount:t.usageCount+1,
      history:[{date:today,user:req.requesterName,action:"استلام",note:req.note||""}, ...(t.history||[])],
    }:t));
    const updatedReqs = requests.map(r=>r.id===req.id?{...r,status:"approved"}:r);
    setRequests(updatedReqs);
    persist("app:requests", JSON.stringify(updatedReqs));
    const notif = { id:genId(), type:"approval", toId:req.requesterId, fromId:user.id, fromName:user.name, toolName:req.toolName, toolImg:req.toolImg, message:`تمت الموافقة على طلبك لحجز "${req.toolName}" — موعد الإرجاع: ${dateStr}`, date:today, read:false };
    const updatedNotifs = [notif,...notifications];
    setNotifications(updatedNotifs);
    persist("app:notifications", JSON.stringify(updatedNotifs));
  };

  const rejectReq = (req) => {
    const updatedReqs = requests.map(r=>r.id===req.id?{...r,status:"rejected"}:r);
    setRequests(updatedReqs);
    persist("app:requests", JSON.stringify(updatedReqs));
    const notif = { id:genId(), type:"rejection", toId:req.requesterId, fromId:user.id, fromName:user.name, toolName:req.toolName, toolImg:req.toolImg, message:`تم رفض طلبك لحجز "${req.toolName}"`, date:today, read:false };
    const updatedNotifs = [notif,...notifications];
    setNotifications(updatedNotifs);
    persist("app:notifications", JSON.stringify(updatedNotifs));
  };

  const unread = myNotifs.filter(n=>!n.read).length;

  const typeIcon = { request:"📋", approval:"✅", rejection:"❌", reminder:"⏰", returnRequest:"↩️", returnApproved:"✅", returnRejected:"❌" };
  const typeBg   = { request:"#eff6ff", approval:"#ecfdf5", rejection:"#fef2f2", reminder:"#fffbeb", returnRequest:"#fffbeb", returnApproved:"#ecfdf5", returnRejected:"#fef2f2" };
  const typeColor= { request:"#1d4ed8", approval:"#065f46", rejection:"#991b1b", reminder:"#92400e", returnRequest:"#92400e", returnApproved:"#065f46", returnRejected:"#991b1b" };

  return (
    <div style={{padding:"1.2rem",paddingBottom:"5.5rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.2rem"}}>
        <div style={{fontSize:"1rem",fontWeight:800,color:"#0f172a"}}>🔔 الإشعارات {unread>0&&<span style={{background:"#ef4444",color:"#fff",borderRadius:"50%",padding:"2px 7px",fontSize:"0.7rem",marginRight:"6px"}}>{unread}</span>}</div>
        {myNotifs.some(n=>n.read) && <button onClick={clearAll} style={{background:"#f3f4f6",border:"none",borderRadius:"8px",padding:"0.3rem 0.8rem",fontSize:"0.73rem",color:"#6b7280",cursor:"pointer",fontWeight:600,fontFamily:"Tajawal,sans-serif"}}>🗑️ مسح المقروءة</button>}
      </div>

      {/* طلبات معلقة لوسائلي */}
      {pendingForMe.length>0 && (
        <div style={{marginBottom:"1.2rem"}}>
          <div style={{fontSize:"0.82rem",fontWeight:700,color:"#f59e0b",marginBottom:"0.7rem"}}>⏳ طلبات تنتظر ردك ({pendingForMe.length})</div>
          {pendingForMe.map(req=>(
            <div key={req.id} style={{background:"#fff",border:"1.5px solid #f59e0b44",borderRadius:"16px",padding:"1rem",marginBottom:"0.8rem",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
              <div style={{display:"flex",gap:"0.8rem",alignItems:"flex-start",marginBottom:"0.9rem"}}>
                <div style={{fontSize:"1.8rem"}}>{req.toolImg}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:"0.88rem",fontWeight:700,color:"#1f2937"}}>{req.requesterName}</div>
                  <div style={{fontSize:"0.78rem",color:"#6b7280",marginTop:"2px"}}>يطلب حجز: <b>{req.toolName}</b></div>
                  <div style={{fontSize:"0.75rem",color:"#10b981",fontWeight:600,marginTop:"2px"}}>📅 موعد الإرجاع: {req.dueDate}</div>
                  {req.note && <div style={{fontSize:"0.75rem",color:"#9ca3af",marginTop:"4px",background:"#f9fafb",borderRadius:"8px",padding:"6px 8px"}}>"{req.note}"</div>}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem"}}>
                <button onClick={()=>approveReq(req)} style={{background:"linear-gradient(135deg,#10b981,#059669)",border:"none",borderRadius:"10px",padding:"0.6rem",color:"#fff",fontWeight:700,fontSize:"0.82rem",cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>✅ موافقة</button>
                <button onClick={()=>rejectReq(req)} style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:"10px",padding:"0.6rem",color:"#ef4444",fontWeight:700,fontSize:"0.82rem",cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>❌ رفض</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {myNotifs.length===0 && pendingForMe.length===0 && (
        <div style={{textAlign:"center",padding:"4rem 1rem",color:"#9ca3af"}}>
          <div style={{fontSize:"3.5rem",marginBottom:"0.8rem"}}>🔔</div>
          <div style={{fontWeight:600,marginBottom:"4px"}}>لا توجد إشعارات</div>
          <div style={{fontSize:"0.8rem"}}>ستظهر هنا الإشعارات المتعلقة بطلباتك</div>
        </div>
      )}

      {myNotifs.map(n=>(
        <div key={n.id} onClick={()=>markRead(n.id)} style={{background:n.read?"#fff":typeBg[n.type]||"#f9fafb",border:`1.5px solid ${n.read?"#f3f4f6":typeColor[n.type]+"33"}`,borderRadius:"14px",padding:"0.9rem",marginBottom:"0.8rem",cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.04)",opacity:n.read?0.7:1}}>
          <div style={{display:"flex",gap:"0.8rem",alignItems:"flex-start"}}>
            <div style={{fontSize:"1.6rem"}}>{typeIcon[n.type]||"📢"}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:"0.88rem",fontWeight:n.read?400:700,color:n.read?"#6b7280":typeColor[n.type]||"#1f2937",lineHeight:1.5}}>{n.message}</div>
              <div style={{fontSize:"0.72rem",color:"#d1d5db",marginTop:"4px"}}>{n.date}</div>
            </div>
            {!n.read && <div style={{width:8,height:8,borderRadius:"50%",background:"#ef4444",flexShrink:0,marginTop:"4px"}}/>}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════
   STATS SCREEN — للأدمن فقط
══════════════════════════════════════════════════ */
function StatsScreen({ tools, requests }) {
  const total     = tools.length;
  const available = tools.filter(t=>t.status==="available").length;
  const borrowed  = tools.filter(t=>t.status==="borrowed").length;
  const inuse     = tools.filter(t=>t.status==="inuse").length;
  const repair    = tools.filter(t=>t.status==="repair").length;
  const totalReqs = requests.length;
  const approved  = requests.filter(r=>r.status==="approved").length;
  const rejected  = requests.filter(r=>r.status==="rejected").length;
  const pending   = requests.filter(r=>r.status==="pending").length;

  // كفاءة الوسيلة = (usageCount * 0.6) + (rating * 0.4 * 10) → مئوي
  const getEfficiency = (t) => {
    const maxUsage = Math.max(...tools.map(x=>x.usageCount), 1);
    const usagePct = (t.usageCount / maxUsage) * 60;
    const ratingPct = ((t.rating || 0) / 5) * 40;
    return Math.round(usagePct + ratingPct);
  };

  const topByUsage = [...tools].sort((a,b)=>b.usageCount-a.usageCount).slice(0,5);

  const statCard = (label, val, color, bg="#f9fafb") => (
    <div style={{background:bg,borderRadius:"14px",padding:"1rem",textAlign:"center",border:`1.5px solid ${color}22`}}>
      <div style={{fontSize:"1.8rem",fontWeight:900,color}}>{val}</div>
      <div style={{fontSize:"0.73rem",color:"#6b7280",marginTop:"3px",fontWeight:600}}>{label}</div>
    </div>
  );

  return (
    <div style={{padding:"1.2rem",paddingBottom:"5.5rem"}}>
      <div style={{display:"flex",alignItems:"center",gap:"0.6rem",marginBottom:"1.2rem"}}>
        <span style={{fontSize:"1.4rem"}}>📊</span>
        <div>
          <div style={{fontSize:"1rem",fontWeight:800,color:"#0f172a"}}>لوحة الإحصائيات</div>
          <div style={{fontSize:"0.72rem",color:"#9ca3af"}}>متاحة للمدير فقط</div>
        </div>
      </div>

      {/* حالة الوسائل */}

        <div style={{fontSize:"0.88rem",fontWeight:700,color:"#0f172a",marginBottom:"0.9rem"}}>📦 حالة الوسائل</div>

        <div style={{fontSize:"0.72rem",color:"#9ca3af",marginBottom:"0.8rem"}}>يُحسب بناءً على عدد الاستخدامات (60%) + التقييم (40%)</div>
        {[...tools].sort((a,b)=>getEfficiency(b)-getEfficiency(a)).slice(0,5).map((t,i)=>{
          const eff = getEfficiency(t);
          const effColor = eff>=70?"#10b981":eff>=40?"#f59e0b":"#ef4444";
          return (
            <div key={t.id} style={{display:"flex",alignItems:"center",gap:"0.8rem",marginBottom:"0.7rem"}}>
              <span style={{fontSize:"1.1rem",width:28,textAlign:"center"}}>{t.img}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}>

    </div>
  );
}

   PROFILE SCREEN

function ProfileScreen({ user, setUser, users, setUsers, onLogout }) {
  const [name,  setName]  = useState(user.name);
  const [dept,  setDept]  = useState(user.dept||"");
  const [saved, setSaved] = useState(false);
  const [oldP,  setOldP]  = useState("");
  const [newP,  setNewP]  = useState("");
  const [newP2, setNewP2] = useState("");
  const [pErr,  setPErr]  = useState("");
  const [pOk,   setPOk]   = useState(false);
  const [photo, setPhoto] = useState(user.photo||null);

  const saveInfo = () => {
    if(!name.trim()) return;
    const updated = users.map(u=>u.id===user.id?{...u,name:name.trim(),dept:dept.trim()||u.dept}:u);
    setUsers(updated);
    setUser({...user,name:name.trim(),dept:dept.trim()||user.dept});
    persist("app:users",JSON.stringify(updated));
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  };

  const changePass = async () => {
    setPErr(""); setPOk(false);
    if(!oldP||!newP||!newP2) return setPErr("يرجى ملء جميع الحقول");
    if(newP!==newP2) return setPErr("كلمتا المرور غير متطابقتين");
    if(newP.length<4) return setPErr("كلمة المرور ٤ أحرف على الأقل");
    const hashedOld = await hashPassword(oldP);
    if(user.password!==hashedOld && user.password!==oldP) return setPErr("كلمة المرور الحالية غير صحيحة");
    const hashedNew = await hashPassword(newP);
    const updated = users.map(u=>u.id===user.id?{...u,password:hashedNew}:u);
    setUsers(updated);
    setUser({...user,password:hashedNew});
    persist("app:users",JSON.stringify(updated));
    setOldP(""); setNewP(""); setNewP2(""); setPOk(true); setTimeout(()=>setPOk(false),3000);
  };

  const handlePhoto = (e) => {
    const file=e.target.files[0]; if(!file) return;
    if(file.size>500*1024){alert("الصورة أكبر من 500KB");return;}
    const r=new FileReader(); r.onload=ev=>{
      setPhoto(ev.target.result);
      const updated=users.map(u=>u.id===user.id?{...u,photo:ev.target.result}:u);
      setUsers(updated); setUser({...user,photo:ev.target.result}); persist("app:users",JSON.stringify(updated));
    }; r.readAsDataURL(file);
  };

  const roleLabel = { admin:"مدير النظام ⚙️", teacher:"معلم 👨‍🏫" };
  const deptObj = DEPTS.find(d=>d.name===user.dept||d.id===user.dept);

  return (
    <div style={{padding:"1.2rem",paddingBottom:"5.5rem"}}>
      {/* Profile Header */}
      <div style={{background:"linear-gradient(135deg,#1e3a5f,#0f4c3a)",borderRadius:"20px",padding:"1.5rem",textAlign:"center",marginBottom:"1.2rem",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",left:"-1rem",top:"-1rem",fontSize:"6rem",opacity:0.06}}>👤</div>
        <label htmlFor="profile-photo" style={{cursor:"pointer",display:"inline-block",marginBottom:"0.8rem",position:"relative"}}>
          <Av initials={user.avatar} photo={photo} size={76} color="#6366f1"/>
          <div style={{position:"absolute",bottom:0,left:0,background:"rgba(0,0,0,0.65)",borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.7rem"}}>✏️</div>
        </label>
        <input id="profile-photo" type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>
        <div style={{color:"#fff",fontSize:"1.15rem",fontWeight:800}}>{user.name}</div>
        <div style={{color:"rgba(255,255,255,0.55)",fontSize:"0.78rem",marginTop:"4px"}}>{roleLabel[user.role]||user.role}</div>
        <div style={{color:"rgba(255,255,255,0.4)",fontSize:"0.72rem",marginTop:"2px"}}>@{user.username}</div>
      </div>

      {/* بيانات الحساب */}
      <div style={{background:"#fff",borderRadius:"18px",padding:"1.2rem",boxShadow:"0 4px 16px rgba(0,0,0,0.06)",marginBottom:"1rem"}}>
        <div style={{fontSize:"0.88rem",fontWeight:700,color:"#0f172a",marginBottom:"0.9rem"}}>📋 بيانات الحساب</div>
        <div style={{display:"grid",gap:"0.6rem"}}>
          {[
            {icon:"👤",label:"الاسم",val:user.name},
            {icon:"🏫",label:"القسم",val:user.dept||"—"},
            {icon:"🔑",label:"اسم المستخدم",val:`@${user.username}`},
            {icon:"⚙️",label:"الصلاحية",val:roleLabel[user.role]||user.role},
          ].map(item=>(
            <div key={item.label} style={{display:"flex",alignItems:"center",gap:"0.8rem",background:"#f9fafb",borderRadius:"10px",padding:"0.7rem 0.9rem"}}>
              <span style={{fontSize:"1rem",width:22,textAlign:"center"}}>{item.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:"0.65rem",color:"#9ca3af",marginBottom:"1px"}}>{item.label}</div>
                <div style={{fontSize:"0.85rem",fontWeight:600,color:"#1f2937"}}>{item.val}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* تغيير كلمة المرور */}
      <div style={{background:"#fff",borderRadius:"18px",padding:"1.2rem",boxShadow:"0 4px 16px rgba(0,0,0,0.06)",marginBottom:"1rem"}}>
        <div style={{fontSize:"0.88rem",fontWeight:700,color:"#0f172a",marginBottom:"0.8rem"}}>🔒 تغيير كلمة المرور</div>
        <div style={{display:"grid",gap:"0.7rem"}}>
          {[{label:"كلمة المرور الحالية",val:oldP,set:setOldP},{label:"كلمة المرور الجديدة",val:newP,set:setNewP},{label:"تأكيد كلمة المرور الجديدة",val:newP2,set:setNewP2}].map(f=>(
            <div key={f.label}><label style={lLabel}>{f.label}</label><input type="password" value={f.val} onChange={e=>{f.set(e.target.value);setPErr(""); setPOk(false);}} style={lightInput}/></div>
          ))}
        </div>
        {pErr && <div style={{color:"#ef4444",fontSize:"0.76rem",marginTop:"0.6rem",background:"#fef2f2",padding:"0.5rem 0.7rem",borderRadius:"8px"}}>{pErr}</div>}
        {pOk  && <div style={{color:"#10b981",fontSize:"0.76rem",marginTop:"0.6rem",fontWeight:700}}>✅ تم تغيير كلمة المرور</div>}
        <button onClick={changePass} style={{width:"100%",marginTop:"0.8rem",background:"linear-gradient(135deg,#10b981,#059669)",border:"none",borderRadius:"10px",padding:"0.75rem",color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>تغيير كلمة المرور</button>
      </div>

      <button onClick={onLogout} style={{width:"100%",background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:"16px",padding:"0.9rem",color:"#ef4444",fontWeight:700,fontSize:"0.95rem",cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>
        🚪 تسجيل الخروج
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════════ */
function App() {
  const [users,         setUsers]         = useState(INIT_USERS);
  const [user,          setUser]          = useState(null);   // لا auto-login
  const [tools,         setTools]         = useState(INIT_TOOLS);
  const [requests,      setRequests]      = useState([]);    // نظام الحجز الجديد
  const [notifications, setNotifications] = useState([]);
  const [allTags,       setAllTags]       = useState(INIT_TAGS);
  const [screen,        setScreen]        = useState("home");
  const [params,        setParams]        = useState({});
  const [loading,       setLoading]       = useState(true);
  const [saveErr,       setSaveErr]       = useState("");

  /* ── تحميل البيانات (بدون استرداد الجلسة — الأمان) ── */
  useEffect(()=>{
    let cancelled = false;
    const timeout = setTimeout(()=>{
      if(!cancelled){ setLoading(false); setSaveErr("⚠️ تعذّر الاتصال، يعمل بالبيانات الافتراضية"); }
    }, 9000);

    const load = async () => {
      try {
        const su = await window.fbStorage?.get("app:users");
        if(su) setUsers(JSON.parse(su.value));

        // تحميل الوسائل المشتركة للجميع
        const st = await window.fbStorage?.get("app:tools");
        if(st) setTools(JSON.parse(st.value));

        const sn = await window.fbStorage?.get("app:notifications");
        if(sn) setNotifications(JSON.parse(sn.value));

        const sr = await window.fbStorage?.get("app:requests");
        if(sr) setRequests(JSON.parse(sr.value));

        const sg = await window.fbStorage?.get("app:tags");
        if(sg) setAllTags(JSON.parse(sg.value));

        // ⚠️ لا نحمّل app:currentUser — كل جلسة تبدأ من تسجيل الدخول
      } catch(e){ console.warn("Load error",e); }
      clearTimeout(timeout);
      if(!cancelled) setLoading(false);
    };

    const tryLoad = () => {
      window.addEventListener("firebaseReady", load, {once:true});
      if(window.fbStorage?.get) { window.removeEventListener("firebaseReady",load); load(); }
    };
    tryLoad();
    return () => { cancelled=true; clearTimeout(timeout); };
  }, []);

  /* ── persist wrappers ── */
  const updateTools = useCallback((val)=>{
    setTools(prev=>{ const next=typeof val==="function"?val(prev):val; persist("app:tools",JSON.stringify(next)).catch(()=>setSaveErr("⚠️ فشل الحفظ")); return next; });
  },[]);
  const updateUsers = useCallback((val)=>{
    setUsers(prev=>{ const next=typeof val==="function"?val(prev):val; persist("app:users",JSON.stringify(next)); return next; });
  },[]);
  const updateRequests = useCallback((val)=>{
    setRequests(prev=>{ const next=typeof val==="function"?val(prev):val; persist("app:requests",JSON.stringify(next)); return next; });
  },[]);
  const updateNotifications = useCallback((val)=>{
    setNotifications(prev=>{ const next=typeof val==="function"?val(prev):val; persist("app:notifications",JSON.stringify(next)); return next; });
  },[]);
  const updateAllTags = useCallback((val)=>{
    setAllTags(prev=>{ const next=typeof val==="function"?val(prev):val; persist("app:tags",JSON.stringify(next)); return next; });
  },[]);

  /* ── auth ── */
  const loginUser  = (u) => { setUser(u); setScreen("home"); /* لا نحفظ الجلسة في Firebase */ };
  const logoutUser = () => {
    setUser(null);
    setScreen("home");
    setParams({});
    // لا نحتاج حذف شيء من Firebase لأننا لم نحفظه
  };

  const nav = (s, p={}) => { setScreen(s); setParams(p); };

  /* ── Loading Screen ── */
  if(loading) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(145deg,#0f172a,#1e3a5f)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Tajawal,sans-serif"}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{fontSize:"3.5rem",marginBottom:"1rem"}}>📚</div>
      <div style={{color:"#fff",fontSize:"1.2rem",fontWeight:700,marginBottom:"1.5rem"}}>بنك الوسائل التعليمية</div>
      <div style={{width:36,height:36,border:"3px solid rgba(255,255,255,0.2)",borderTop:"3px solid #10b981",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <div style={{color:"rgba(255,255,255,0.5)",fontSize:"0.78rem",marginTop:"1rem"}}>جارٍ تحميل البيانات...</div>
    </div>
  );

  /* ── Auth Screen ── */
  if(!user) return <AuthScreen users={users} setUsers={updateUsers} onLogin={loginUser}/>;

  /* ── Badges ── */
  const myNotifCount = notifications.filter(n=>n.toId===user.id&&!n.read).length;
  const myToolIds    = tools.filter(t=>t.teacherId===user.id||user.role==="admin").map(t=>t.id);
  const pendingCount = requests.filter(r=>myToolIds.includes(r.toolId)&&r.status==="pending").length;
  const totalBadge   = myNotifCount + pendingCount;

  const tabs = [
    {id:"home",    label:"الرئيسية", icon:"🏠"},
    {id:"tools",   label:"الوسائل",  icon:"📦"},
    {id:"notifs",  label:"إشعارات",  icon:"🔔", badge:totalBadge},
    ...(user.role==="admin"?[{id:"stats",label:"إحصائيات",icon:"📊"}]:[]),
    ...(user.role==="admin"?[{id:"adminusers",label:"المستخدمين",icon:"👥"}]:[]),
    {id:"profile", label:"حسابي",    icon:"👤"},
  ];

  const currentTool = params.tool ? tools.find(t=>t.id===params.tool.id)||params.tool : null;

  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#f8fafc",position:"relative",fontFamily:"Tajawal,sans-serif",direction:"rtl"}}>
      <style>{`
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{display:none;}
        textarea,button,input,select{font-family:Tajawal,sans-serif;}
        textarea{direction:rtl;}
        input::placeholder{color:#9ca3af;}
        select option{background:#fff;color:#1f2937;}
        @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeOut{0%{opacity:1}80%{opacity:1}100%{opacity:0}}
      `}</style>

      {saveErr && (
        <div onAnimationEnd={()=>setSaveErr("")} style={{position:"fixed",top:"4.5rem",left:"50%",transform:"translateX(-50%)",background:"#ef4444",color:"#fff",borderRadius:"12px",padding:"0.6rem 1.2rem",fontSize:"0.8rem",fontWeight:700,zIndex:999,animation:"fadeOut 3s forwards",whiteSpace:"nowrap"}}>
          {saveErr}
        </div>
      )}

      {/* Header */}
      {screen!=="detail" && (
        <div style={{background:"#fff",borderBottom:"1px solid #f3f4f6",padding:"0.8rem 1.2rem",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10,boxShadow:"0 1px 8px rgba(0,0,0,0.04)"}}>
          <div style={{fontSize:"0.95rem",fontWeight:800,color:"#0f172a"}}>📚 بنك الوسائل</div>
          <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
            {totalBadge>0 && (
              <div onClick={()=>nav("notifs")} style={{position:"relative",cursor:"pointer"}}>
                <span style={{fontSize:"1.2rem"}}>🔔</span>
                <span style={{position:"absolute",top:-4,left:-4,background:"#ef4444",color:"#fff",borderRadius:"50%",width:16,height:16,fontSize:"0.6rem",fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>{totalBadge}</span>
              </div>
            )}
            <Av initials={user.avatar} photo={user.photo} size={30} color="#6366f1"/>
          </div>
        </div>
      )}

      {/* Screens */}
      <div style={{overflowY:"auto"}}>
        {screen==="home"       && <HomeScreen       user={user} tools={tools} requests={requests} onNav={nav}/>}
        {screen==="tools"      && <ToolsScreen      user={user} tools={tools} initDept={params.dept} onNav={nav} allTags={allTags}/>}
        {screen==="addtool"    && <AddToolScreen    user={user} tools={tools} setTools={updateTools} allTags={allTags} setAllTags={updateAllTags} onBack={()=>nav("tools")}/>}
        {screen==="notifs"     && <NotificationsScreen user={user} notifications={notifications} setNotifications={updateNotifications} requests={requests} setRequests={updateRequests} tools={tools} setTools={updateTools}/>}
        {screen==="stats"      && <StatsScreen      tools={tools} requests={requests}/>}
        {screen==="adminusers" && <AdminUsersScreen users={users} setUsers={updateUsers} currentUser={user} allTags={allTags} setAllTags={updateAllTags}/>}
        {screen==="profile"    && <ProfileScreen    user={user} setUser={setUser} users={users} setUsers={updateUsers} onLogout={logoutUser}/>}
        {screen==="detail" && currentTool && (
          <DetailScreen
            user={user} tool={currentTool} tools={tools} setTools={updateTools}
            requests={requests} setRequests={updateRequests}
            notifications={notifications} setNotifications={updateNotifications}
            allTags={allTags} setAllTags={updateAllTags}
            onBack={()=>setScreen("tools")}
          />
        )}
      </div>

      {/* Bottom Navigation */}
      {screen!=="detail" && (
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#fff",borderTop:"1px solid #f3f4f6",display:"flex",padding:"0.5rem 0 0.8rem",boxShadow:"0 -4px 20px rgba(0,0,0,0.06)",zIndex:20}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>nav(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",padding:"0.3rem 0",position:"relative",fontFamily:"Tajawal,sans-serif"}}>
              <span style={{fontSize:"1.1rem",filter:screen===t.id?"none":"grayscale(1) opacity(0.5)"}}>{t.icon}</span>
              {t.badge>0 && <span style={{position:"absolute",top:0,right:"18%",background:"#ef4444",color:"#fff",borderRadius:"50%",width:14,height:14,fontSize:"0.55rem",fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</span>}
              <span style={{fontSize:"0.72rem",color:screen===t.id?"#6366f1":"#9ca3af",fontWeight:screen===t.id?700:400}}>{t.label}</span>
              {screen===t.id && <div style={{width:4,height:4,borderRadius:"50%",background:"#6366f1"}}/>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
