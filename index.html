}

/* ═══════════════════ ATTACHMENT HELPERS ═══════════════════ */
const FILE_TYPES = {
  pdf:  { icon:"📄", label:"PDF",        color:"#ef4444", bg:"#fef2f2", accept:".pdf",  mime:"application/pdf" },
  word: { icon:"📝", label:"Word",       color:"#2563eb", bg:"#eff6ff", accept:".doc,.docx", mime:"application/vnd.openxmlformats-officedocument.wordprocessingml.document" },
  ppt:  { icon:"📊", label:"PowerPoint", color:"#f97316", bg:"#fff7ed", accept:".ppt,.pptx", mime:"application/vnd.openxmlformats-officedocument.presentationml.presentation" },
  link: { icon:"🔗", label:"رابط",       color:"#10b981", bg:"#ecfdf5", accept:null,    mime:null },
};

// بطاقة عرض مرفق واحد
function AttachmentCard({ att, onDelete }) {
  const ft = FILE_TYPES[att.type] || FILE_TYPES.link;
  const handleOpen = () => {
    if (att.type==="link") { window.open(att.url,"_blank"); return; }
    if (att.data) {
      const a = document.createElement("a");
      a.href = att.data; a.download = att.name;
      document.body.appendChild(a); a.click();
      setTimeout(()=>document.body.removeChild(a),500);
    }
  };
  return (
    <div style={{ display:"flex", alignItems:"center", gap:"0.7rem", background:ft.bg, border:`1.5px solid ${ft.color}33`, borderRadius:"12px", padding:"0.7rem 0.9rem" }}>
      <span style={{ fontSize:"1.5rem", flexShrink:0 }}>{ft.icon}</span>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:"0.82rem", fontWeight:700, color:"#1f2937", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{att.name}</div>
        <div style={{ fontSize:"0.68rem", color:ft.color, fontWeight:600 }}>{ft.label}{att.size?" • "+att.size:""}</div>
      </div>
      <button onClick={handleOpen}
        style={{ background:ft.color, color:"#fff", border:"none", borderRadius:"8px", padding:"0.3rem 0.7rem", fontSize:"0.72rem", fontWeight:700, cursor:"pointer", fontFamily:"Tajawal,sans-serif", flexShrink:0 }}>
        {att.type==="link"?"فتح ↗":"تحميل ⬇"}
      </button>
      {onDelete && (
        <button onClick={onDelete} style={{ background:"none", border:"none", cursor:"pointer", color:"#9ca3af", fontSize:"1rem", padding:"2px", flexShrink:0 }}>✕</button>
      )}
    </div>
  );
}

// قسم إضافة مرفقات (يُستخدم في AddToolScreen)
function AddAttachmentsSection({ attachments, setAttachments }) {
  const [mode,    setMode]    = useState(null); // "link" | "file"
  const [linkUrl, setLinkUrl] = useState("");
  const [linkName,setLinkName]= useState("");
  const [fileErr, setFileErr] = useState("");
  const MAX_FILE_MB = 2;

  const addLink = () => {
    if (!linkUrl.trim()) return;
    let url = linkUrl.trim();
    if (!/^https?:\/\//i.test(url)) url = "https://"+url;
    const name = linkName.trim() || url;
    setAttachments(prev=>[...prev,{type:"link",name,url}]);
    setLinkUrl(""); setLinkName(""); setMode(null);
  };

  const addFile = (e, type) => {
    const file = e.target.files[0]; if(!file) return;
    setFileErr("");
    const sizeMB = file.size/(1024*1024);
    if (sizeMB > MAX_FILE_MB) { setFileErr(`الملف أكبر من ${MAX_FILE_MB}MB — اختر ملفاً أصغر`); e.target.value=""; return; }
    const reader = new FileReader();
    reader.onload = ev => {
      const sizeStr = sizeMB<1 ? Math.round(sizeMB*1024)+"KB" : sizeMB.toFixed(1)+"MB";
      setAttachments(prev=>[...prev,{type,name:file.name,data:ev.target.result,size:sizeStr}]);
      setMode(null); setFileErr("");
    };
    reader.readAsDataURL(file);
    e.target.value="";
  };

  const iS = { width:"100%", background:"#f9fafb", border:"1px solid #e5e7eb", borderRadius:"10px", padding:"0.6rem 0.9rem", fontSize:"0.82rem", outline:"none", fontFamily:"Tajawal,sans-serif", color:"#1f2937" };

  return (
    <div style={{ background:"#fff", borderRadius:"16px", padding:"1rem", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
      <div style={{ fontSize:"0.88rem", fontWeight:700, color:"#0f172a", marginBottom:"0.9rem" }}>📎 المرفقات</div>
      {attachments.length>0 && (
        <div style={{ display:"grid", gap:"0.5rem", marginBottom:"0.8rem" }}>
          {attachments.map((att,i)=>(
            <AttachmentCard key={i} att={att} onDelete={()=>setAttachments(prev=>prev.filter((_,j)=>j!==i))}/>
          ))}
        </div>
      )}
      {fileErr && <div style={{ color:"#ef4444", fontSize:"0.75rem", marginBottom:"0.6rem", fontWeight:600 }}>⚠️ {fileErr}</div>}

      {mode===null && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.5rem" }}>
          {[
            {k:"link", icon:"🔗", label:"إضافة رابط"},
            {k:"pdf",  icon:"📄", label:"رفع PDF"},
            {k:"word", icon:"📝", label:"رفع Word"},
            {k:"ppt",  icon:"📊", label:"رفع PowerPoint"},
          ].map(b=>(
            b.k==="link" ? (
              <button key={b.k} onClick={()=>setMode("link")}
                style={{ background:"#f9fafb", border:"1.5px dashed #d1d5db", borderRadius:"10px", padding:"0.6rem", display:"flex", alignItems:"center", justifyContent:"center", gap:"0.4rem", cursor:"pointer", fontSize:"0.75rem", fontWeight:600, color:"#6b7280", fontFamily:"Tajawal,sans-serif" }}>
                {b.icon} {b.label}
              </button>
            ) : (
              <label key={b.k} htmlFor={`att-${b.k}`}
                style={{ background:"#f9fafb", border:"1.5px dashed #d1d5db", borderRadius:"10px", padding:"0.6rem", display:"flex", alignItems:"center", justifyContent:"center", gap:"0.4rem", cursor:"pointer", fontSize:"0.75rem", fontWeight:600, color:"#6b7280" }}>
                {b.icon} {b.label}
                <input id={`att-${b.k}`} type="file" accept={FILE_TYPES[b.k].accept} onChange={e=>addFile(e,b.k)} style={{display:"none"}}/>
              </label>
            )
          ))}
        </div>
      )}

      {mode==="link" && (
        <div style={{ display:"grid", gap:"0.5rem" }}>
          <input value={linkName} onChange={e=>setLinkName(e.target.value)} placeholder="اسم الرابط (مثال: شرح الوسيلة)" style={iS}/>
          <input value={linkUrl} onChange={e=>setLinkUrl(e.target.value)} placeholder="https://..." style={iS} dir="ltr"
            onKeyDown={e=>e.key==="Enter"&&addLink()}/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.5rem" }}>
            <button onClick={()=>{setMode(null);setLinkUrl("");setLinkName("");}}
              style={{ background:"#f3f4f6", border:"none", borderRadius:"9px", padding:"0.55rem", color:"#6b7280", fontWeight:700, fontSize:"0.8rem", cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>إلغاء</button>
            <button onClick={addLink}
              style={{ background:"#10b981", border:"none", borderRadius:"9px", padding:"0.55rem", color:"#fff", fontWeight:700, fontSize:"0.8rem", cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>إضافة ✓</button>
          </div>
        </div>
      )}
      <div style={{ marginTop:"0.6rem", fontSize:"0.66rem", color:"#d1d5db", textAlign:"center" }}>📌 الحد الأقصى لحجم الملف: {MAX_FILE_MB}MB</div>
    </div>
  );
}

// مدير المرفقات في تبويب إدارة الوسيلة
function AttachmentsManager({ liveTool, setTools, lightInput, lLabel }) {
  const [mode,    setMode]    = useState(null);
  const [linkUrl, setLinkUrl] = useState("");
  const [linkName,setLinkName]= useState("");
  const [fileErr, setFileErr] = useState("");
  const MAX_FILE_MB = 2;

  const addLink = () => {
    if (!linkUrl.trim()) return;
    let url = linkUrl.trim();
    if (!/^https?:\/\//i.test(url)) url = "https://"+url;
    const name = linkName.trim() || url;
    setTools(prev=>prev.map(t=>t.id===liveTool.id?{...t,attachments:[...(t.attachments||[]),{type:"link",name,url}]}:t));
    setLinkUrl(""); setLinkName(""); setMode(null);
  };

  const addFile = (e, type) => {
    const file = e.target.files[0]; if(!file) return;
    setFileErr("");
    const sizeMB = file.size/(1024*1024);
    if (sizeMB > MAX_FILE_MB) { setFileErr(`الملف أكبر من ${MAX_FILE_MB}MB`); e.target.value=""; return; }
    const reader = new FileReader();
    reader.onload = ev => {
      const sizeStr = sizeMB<1 ? Math.round(sizeMB*1024)+"KB" : sizeMB.toFixed(1)+"MB";
      const newAtt = {type,name:file.name,data:ev.target.result,size:sizeStr};
      setTools(prev=>prev.map(t=>t.id===liveTool.id?{...t,attachments:[...(t.attachments||[]),newAtt]}:t));
      setMode(null); setFileErr("");
    };
    reader.readAsDataURL(file);
    e.target.value="";
  };

  const removeAtt = (idx) => {
    setTools(prev=>prev.map(t=>t.id===liveTool.id?{...t,attachments:(t.attachments||[]).filter((_,i)=>i!==idx)}:t));
  };

  const iS = { width:"100%", background:"#f9fafb", border:"1px solid #e5e7eb", borderRadius:"10px", padding:"0.6rem 0.9rem", fontSize:"0.82rem", outline:"none", fontFamily:"Tajawal,sans-serif", color:"#1f2937" };

  return (
    <div>
      <div style={{ fontSize:"0.82rem", fontWeight:700, color:"#0f172a", marginBottom:"0.9rem" }}>📎 إدارة المرفقات</div>
      {(liveTool.attachments||[]).length===0 && (
        <div style={{ textAlign:"center", padding:"1.5rem", color:"#9ca3af", background:"#f9fafb", borderRadius:"12px", marginBottom:"0.8rem" }}>
          <div style={{ fontSize:"2rem", marginBottom:"0.3rem" }}>📎</div>
          <div style={{ fontSize:"0.78rem" }}>لا توجد مرفقات بعد</div>
        </div>
      )}
      {(liveTool.attachments||[]).length>0 && (
        <div style={{ display:"grid", gap:"0.5rem", marginBottom:"0.8rem" }}>
          {liveTool.attachments.map((att,i)=>(
            <AttachmentCard key={i} att={att} onDelete={()=>removeAtt(i)}/>
          ))}
        </div>
      )}
      {fileErr && <div style={{ color:"#ef4444", fontSize:"0.75rem", marginBottom:"0.6rem", fontWeight:600 }}>⚠️ {fileErr}</div>}

      {mode===null && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.5rem", marginBottom:"0.5rem" }}>
          {[
            {k:"link",icon:"🔗",label:"رابط"},
            {k:"pdf", icon:"📄",label:"PDF"},
            {k:"word",icon:"📝",label:"Word"},
            {k:"ppt", icon:"📊",label:"PowerPoint"},
          ].map(b=>(
            b.k==="link" ? (
              <button key={b.k} onClick={()=>setMode("link")}
                style={{ background:"#f9fafb", border:"1.5px dashed #d1d5db", borderRadius:"10px", padding:"0.6rem", display:"flex", alignItems:"center", justifyContent:"center", gap:"0.4rem", cursor:"pointer", fontSize:"0.75rem", fontWeight:600, color:"#6b7280", fontFamily:"Tajawal,sans-serif" }}>
                {b.icon} {b.label}
              </button>
            ) : (
              <label key={b.k} htmlFor={`mgr-att-${b.k}`}
                style={{ background:"#f9fafb", border:"1.5px dashed #d1d5db", borderRadius:"10px", padding:"0.6rem", display:"flex", alignItems:"center", justifyContent:"center", gap:"0.4rem", cursor:"pointer", fontSize:"0.75rem", fontWeight:600, color:"#6b7280" }}>
                {b.icon} {b.label}
                <input id={`mgr-att-${b.k}`} type="file" accept={FILE_TYPES[b.k].accept} onChange={e=>addFile(e,b.k)} style={{display:"none"}}/>
              </label>
            )
          ))}
        </div>
      )}

      {mode==="link" && (
        <div style={{ display:"grid", gap:"0.5rem" }}>
          <input value={linkName} onChange={e=>setLinkName(e.target.value)} placeholder="اسم الرابط" style={iS}/>
          <input value={linkUrl} onChange={e=>setLinkUrl(e.target.value)} placeholder="https://..." style={iS} dir="ltr"
            onKeyDown={e=>e.key==="Enter"&&addLink()}/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.5rem" }}>
            <button onClick={()=>{setMode(null);setLinkUrl("");setLinkName("");}}
              style={{ background:"#f3f4f6", border:"none", borderRadius:"9px", padding:"0.55rem", color:"#6b7280", fontWeight:700, fontSize:"0.8rem", cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>إلغاء</button>
            <button onClick={addLink}
              style={{ background:"#10b981", border:"none", borderRadius:"9px", padding:"0.55rem", color:"#fff", fontWeight:700, fontSize:"0.8rem", cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>إضافة ✓</button>
          </div>
        </div>
      )}
      <div style={{ marginTop:"0.5rem", fontSize:"0.66rem", color:"#d1d5db", textAlign:"center" }}>📌 الحد الأقصى لحجم الملف: {MAX_FILE_MB}MB</div>
    </div>
  );
}

/* ═══════════════════ ADD TOOL ═══════════════════ */
function AddToolScreen({ user, tools, setTools, allTags, setAllTags, onBack }) {
  // FIX: block parent role from accessing this screen
  if (user.role==="parent") return (
    <div style={{ minHeight:"60vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"2rem", textAlign:"center" }}>
      <div style={{ fontSize:"3rem", marginBottom:"1rem" }}>🚫</div>
      <div style={{ fontSize:"1rem", fontWeight:700, color:"#0f172a", marginBottom:"0.4rem" }}>غير مصرح</div>
      <div style={{ fontSize:"0.82rem", color:"#9ca3af", marginBottom:"1.2rem" }}>هذه الصفحة للمعلمين والإدارة فقط</div>
      <button onClick={onBack} style={{ background:"#0f172a", color:"#fff", border:"none", borderRadius:"12px", padding:"0.7rem 1.5rem", fontFamily:"Tajawal,sans-serif", fontWeight:700, cursor:"pointer" }}>← رجوع</button>
    </div>
  );

  const [name,    setName]    = useState("");
  const [desc,    setDesc]    = useState("");
  const [goal,    setGoal]    = useState("");
  const [dept,    setDept]    = useState("autism");
  // FIX: tags as selected chips from allTags instead of free text
  const [selTags, setSelTags] = useState([]);
  const [newTagInput, setNewTagInput] = useState("");
  const [attachments, setAttachments] = useState([]);
  const [photos,  setPhotos]  = useState([]);
  const [video,   setVideo]   = useState(null);
  const [err,     setErr]     = useState("");
  const [done,    setDone]    = useState(false);

  const EMOJIS = ["🎯","🎨","🔢","📖","🖐️","😊","🧩","🌟","🎭","🎲","📝","🎵","🏆","🌈","🧸"];
  const [chosenEmoji, setChosenEmoji] = useState("🎯");
  const [showEmoji,   setShowEmoji]   = useState(false);

  // available tags excluding "الكل"
  const availableTags = (allTags||INIT_TAGS).filter(t=>t!=="الكل");

  const toggleTag = (t) => {
    setSelTags(prev=> prev.includes(t) ? prev.filter(x=>x!==t) : [...prev, t]);
  };

  // FIX: add new tag to allTags list directly from here
  const addNewTag = () => {
    const t = newTagInput.trim();
    if (!t) return;
    if ((allTags||INIT_TAGS).includes(t)) { setSelTags(prev=>prev.includes(t)?prev:[...prev,t]); setNewTagInput(""); return; }
    const updated = [...(allTags||INIT_TAGS), t];
    setAllTags(updated);
    setSelTags(prev=>[...prev, t]);
    setNewTagInput("");
  };

  const handlePhoto = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => setPhotos(prev=>[...prev, ev.target.result]);
    reader.readAsDataURL(file);
  };
  const handleVideo = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => setVideo(ev.target.result);
    reader.readAsDataURL(file);
  };

  const submit = () => {
    if (!name.trim()) return setErr("اسم الوسيلة مطلوب");
    if (!desc.trim()) return setErr("الوصف مطلوب");
    if (!goal.trim()) return setErr("الهدف التعليمي مطلوب");
    const newTool = {
      id: Date.now(), name:name.trim(), desc:desc.trim(), goal:goal.trim(), dept, tags:selTags,
      status:"available", teacher:user.name, teacherId:user.id,
      rating:0, reviews:0, usageCount:0, img:chosenEmoji, photos, video, attachments, history:[],
    };
    setTools(prev=>[newTool,...prev]);
    setDone(true);
    setTimeout(()=>onBack(), 1800);
  };

  const iStyle2 = { width:"100%", background:"#f9fafb", border:"1px solid #e5e7eb", borderRadius:"12px", padding:"0.75rem 1rem", color:"#1f2937", fontSize:"0.88rem", outline:"none", fontFamily:"Tajawal,sans-serif" };
  const lStyle2 = { color:"#6b7280", fontSize:"0.76rem", display:"block", marginBottom:"5px" };

  if (done) return (
    <div style={{ minHeight:"60vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"2rem" }}>
      <div style={{ fontSize:"4rem", marginBottom:"1rem" }}>🎉</div>
      <div style={{ fontSize:"1.1rem", fontWeight:800, color:"#0f172a", marginBottom:"0.4rem" }}>تمت إضافة الوسيلة!</div>
      <div style={{ fontSize:"0.82rem", color:"#9ca3af" }}>جارٍ العودة...</div>
    </div>
  );

  return (
    <div style={{ paddingBottom:"2rem" }}>
      <div style={{ background:"linear-gradient(135deg,#0f172a,#1e3a5f)", padding:"1.5rem 1.2rem", position:"relative" }}>
        <button onClick={onBack} style={{ background:"rgba(255,255,255,0.15)", border:"none", borderRadius:"10px", padding:"0.4rem 0.8rem", color:"#fff", cursor:"pointer", fontSize:"0.85rem", marginBottom:"1rem", fontFamily:"Tajawal,sans-serif" }}>← رجوع</button>
        <div style={{ color:"#fff", fontSize:"1.3rem", fontWeight:900 }}>➕ إضافة وسيلة جديدة</div>
        <div style={{ color:"rgba(255,255,255,0.5)", fontSize:"0.78rem", marginTop:"4px" }}>أضف وسيلتك التعليمية للبنك المشترك</div>
      </div>
      <div style={{ padding:"1.2rem", display:"grid", gap:"1rem" }}>
        {/* ── أيقونة ── */}
        <div style={{ background:"#fff", borderRadius:"16px", padding:"1rem", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
          <label style={lStyle2}>أيقونة الوسيلة</label>
          <div style={{ display:"flex", alignItems:"center", gap:"0.8rem" }}>
            <div onClick={()=>setShowEmoji(!showEmoji)} style={{ width:56, height:56, borderRadius:"14px", background:"#f3f4f6", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"2rem", cursor:"pointer", border:"2px solid #e5e7eb" }}>{chosenEmoji}</div>
            <div style={{ fontSize:"0.78rem", color:"#9ca3af" }}>اضغط لاختيار أيقونة</div>
          </div>
          {showEmoji && (
            <div style={{ display:"flex", flexWrap:"wrap", gap:"0.4rem", marginTop:"0.7rem" }}>
              {EMOJIS.map(e=>(
                <span key={e} onClick={()=>{setChosenEmoji(e);setShowEmoji(false);}} style={{ fontSize:"1.6rem", cursor:"pointer", padding:"4px", borderRadius:"8px", background:chosenEmoji===e?"#eef2ff":"transparent", border:chosenEmoji===e?"2px solid #6366f1":"2px solid transparent" }}>{e}</span>
              ))}
            </div>
          )}
        </div>

        {/* ── معلومات ── */}
        <div style={{ background:"#fff", borderRadius:"16px", padding:"1rem", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
          <div style={{ fontSize:"0.88rem", fontWeight:700, color:"#0f172a", marginBottom:"0.9rem" }}>📋 معلومات الوسيلة</div>
          <div style={{ marginBottom:"0.8rem" }}><label style={lStyle2}>اسم الوسيلة *</label><input value={name} onChange={e=>{setName(e.target.value);setErr("");}} placeholder="مثال: بطاقات الأرقام" style={iStyle2}/></div>
          <div style={{ marginBottom:"0.8rem" }}><label style={lStyle2}>القسم</label>
            <select value={dept} onChange={e=>setDept(e.target.value)} style={{...iStyle2,cursor:"pointer"}}>
              {DEPTS.map(d=><option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
            </select>
          </div>
          <div style={{ marginBottom:"0.8rem" }}><label style={lStyle2}>الهدف التعليمي *</label><input value={goal} onChange={e=>{setGoal(e.target.value);setErr("");}} placeholder="مثال: تنمية الانتباه" style={iStyle2}/></div>
          <div style={{ marginBottom:"0.8rem" }}><label style={lStyle2}>الوصف التفصيلي *</label><textarea value={desc} onChange={e=>{setDesc(e.target.value);setErr("");}} rows={3} placeholder="اشرح الوسيلة وكيفية استخدامها..." style={{...iStyle2,resize:"none",lineHeight:1.6}}/></div>

          {/* ── اختيار التاگات من المجموعة ── */}
          <div>
            <label style={lStyle2}>🏷️ الوسوم — اضغط للاختيار</label>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"0.4rem", marginBottom:"0.7rem" }}>
              {availableTags.map(t=>(
                <span key={t} onClick={()=>toggleTag(t)}
                  style={{ cursor:"pointer", borderRadius:"100px", padding:"0.25rem 0.85rem", fontSize:"0.75rem", fontWeight:600,
                    background: selTags.includes(t)?"#6366f1":"#f3f4f6",
                    color:      selTags.includes(t)?"#fff":"#6b7280",
                    border:     `1.5px solid ${selTags.includes(t)?"#6366f1":"#e5e7eb"}`,
                    transition:"all 0.15s" }}>
                  {selTags.includes(t)?"✓ ":""}{t}
                </span>
              ))}
            </div>
            {/* إضافة تاگ جديد */}
            <div style={{ display:"flex", gap:"0.5rem" }}>
              <input value={newTagInput} onChange={e=>setNewTagInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&addNewTag()}
                placeholder="أضف تاگ جديد..."
                style={{...iStyle2, flex:1, padding:"0.5rem 0.8rem", fontSize:"0.8rem"}}/>
              <button onClick={addNewTag}
                style={{ background:"#6366f1", color:"#fff", border:"none", borderRadius:"10px", padding:"0.5rem 0.9rem", fontSize:"0.8rem", fontWeight:700, cursor:"pointer", fontFamily:"Tajawal,sans-serif", flexShrink:0 }}>+ إضافة</button>
            </div>
            {selTags.length>0 && (
              <div style={{ marginTop:"0.6rem", fontSize:"0.72rem", color:"#6366f1", fontWeight:600 }}>
                ✅ المختار: {selTags.join(" • ")}
              </div>
            )}
          </div>
        </div>

        {/* ── صور ── */}
        <div style={{ background:"#fff", borderRadius:"16px", padding:"1rem", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
          <div style={{ fontSize:"0.88rem", fontWeight:700, color:"#0f172a", marginBottom:"0.9rem" }}>📸 صور الوسيلة</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:"0.5rem" }}>
            {photos.map((src,i)=>(
              <div key={i} style={{ position:"relative", aspectRatio:"1", borderRadius:"10px", overflow:"hidden" }}>
                <img src={src} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                <button onClick={()=>setPhotos(prev=>prev.filter((_,j)=>j!==i))} style={{ position:"absolute", top:3, left:3, background:"rgba(0,0,0,0.65)", color:"#fff", border:"none", borderRadius:"50%", width:20, height:20, fontSize:"0.65rem", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
              </div>
            ))}
            <label htmlFor="add-tool-photo" style={{ aspectRatio:"1", borderRadius:"10px", border:"2px dashed #d1d5db", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", cursor:"pointer", background:"#f9fafb", gap:"4px" }}>
              <span style={{ fontSize:"1.4rem" }}>➕</span>
              <span style={{ fontSize:"0.62rem", color:"#9ca3af" }}>صورة</span>
            </label>
            <input id="add-tool-photo" type="file" accept="image/*" onChange={handlePhoto} style={{ display:"none" }}/>
          </div>
        </div>

        {/* ── فيديو ── */}
        <div style={{ background:"#fff", borderRadius:"16px", padding:"1rem", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
          <div style={{ fontSize:"0.88rem", fontWeight:700, color:"#0f172a", marginBottom:"0.9rem" }}>🎬 فيديو توضيحي</div>
          {video ? (
            <div>
              <video src={video} controls style={{ width:"100%", borderRadius:"12px", marginBottom:"0.6rem", maxHeight:180 }}/>
              <button onClick={()=>setVideo(null)} style={{ width:"100%", background:"#fef2f2", color:"#ef4444", border:"1.5px solid #fecaca", borderRadius:"10px", padding:"0.55rem", fontSize:"0.82rem", fontWeight:700, cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>🗑️ حذف الفيديو</button>
            </div>
          ) : (
            <label htmlFor="add-tool-video" style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"0.5rem", border:"2px dashed #d1d5db", borderRadius:"14px", padding:"1.5rem", cursor:"pointer", background:"#f9fafb" }}>
              <span style={{ fontSize:"2rem" }}>🎬</span>
              <span style={{ fontSize:"0.82rem", fontWeight:600, color:"#374151" }}>اضغط لرفع فيديو</span>
              <span style={{ fontSize:"0.7rem", color:"#9ca3af" }}>MP4, MOV</span>
            </label>
          )}
          <input id="add-tool-video" type="file" accept="video/*" onChange={handleVideo} style={{ display:"none" }}/>
        </div>

        {/* ── مرفقات ── */}
        <AddAttachmentsSection attachments={attachments} setAttachments={setAttachments}/>

        {err && <div style={{ background:"#fef2f2", border:"1px solid #fecaca", borderRadius:"12px", padding:"0.75rem", textAlign:"center", color:"#ef4444", fontSize:"0.82rem", fontWeight:600 }}>{err}</div>}
        <button onClick={submit} style={{ width:"100%", background:"linear-gradient(135deg,#10b981,#059669)", border:"none", borderRadius:"14px", padding:"1rem", color:"#fff", fontSize:"1rem", fontWeight:800, cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>✅ إضافة الوسيلة للبنك</button>
      </div>
    </div>
  );
}

/* ═══════════════════ NOTIFICATIONS ═══════════════════ */
function NotificationsScreen({ user, notifications, setNotifications, tools, setTools, overdueTools, upcomingReminders, todayISO }) {
  const incoming  = notifications.filter(n=>n.type==="request" && n.toId===user.id && n.status==="pending");
  const sent      = notifications.filter(n=>n.type==="request" && n.fromId===user.id);
  const responses = notifications.filter(n=>n.type==="response" && n.toId===user.id);
  const [confirmClear, setConfirmClear] = useState(false);

  const approve = (notif) => {
    const today = new Date().toLocaleDateString("ar-SA");
    const dueDate = new Date(); dueDate.setDate(dueDate.getDate()+7);
    const dueDateStr = dueDate.toLocaleDateString("ar-SA");
    setTools(prev=>prev.map(t=>t.id===notif.toolId?{
      ...t,
      status:"borrowed",
      borrowedBy: notif.from,
      borrowedById: notif.fromId,
      dueDate: dueDateStr,
      dueDateISO: dueDate.toISOString().split("T")[0], // FIX: missing field for overdue detection
      usageCount: t.usageCount+1,
      history:[{date:today, user:notif.from, action:"استلام", note:notif.note||""}, ...t.history]
    }:t));
    setNotifications(prev=>[
      ...prev.filter(n=>n.id!==notif.id),
      { id:Date.now(), type:"response", toolName:notif.toolName, toolImg:notif.toolImg,
        from:user.name, fromId:user.id, toId:notif.fromId, status:"approved", date:today }
    ]);
  };

  const reject = (notif) => {
    const today = new Date().toLocaleDateString("ar-SA");
    setNotifications(prev=>[
      ...prev.filter(n=>n.id!==notif.id),
      { id:Date.now(), type:"response", toolName:notif.toolName, toolImg:notif.toolImg,
        from:user.name, fromId:user.id, toId:notif.fromId, status:"rejected", date:today }
    ]);
  };

  const clearOld = () => {
    // FIX: keep pending + unread responses - only delete dismissed reminders and old sent items
    setNotifications(prev=>prev.filter(n=>
      n.status==="pending" || n.type==="response"
    ));
    setConfirmClear(false);
  };

  const hasOld = notifications.some(n=>n.status!=="pending");
  const isEmpty = incoming.length===0 && sent.length===0 && responses.length===0 && (!overdueTools||overdueTools.length===0) && (!upcomingReminders||upcomingReminders.length===0);

  return (
    <div style={{ padding:"1.2rem", paddingBottom:"5rem" }}>
      {confirmClear && <ConfirmDialog message="هل تريد مسح الإشعارات المنتهية؟ ستبقى الطلبات المعلقة." onConfirm={clearOld} onCancel={()=>setConfirmClear(false)}/>}

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"1.2rem" }}>
        <div style={{ fontSize:"1rem", fontWeight:800, color:"#0f172a" }}>🔔 الإشعارات</div>
        {hasOld && (
          <button onClick={()=>setConfirmClear(true)} style={{ background:"#f3f4f6", border:"none", borderRadius:"8px", padding:"0.3rem 0.8rem", fontSize:"0.73rem", color:"#6b7280", cursor:"pointer", fontWeight:600, fontFamily:"Tajawal,sans-serif" }}>🗑️ مسح المنتهية</button>
        )}
      </div>

      {isEmpty && (
        <div style={{ textAlign:"center", padding:"4rem 1rem", color:"#9ca3af" }}>
          <div style={{ fontSize:"3.5rem", marginBottom:"0.8rem" }}>🔔</div>
          <div style={{ fontWeight:600, marginBottom:"4px" }}>لا توجد إشعارات</div>
          <div style={{ fontSize:"0.8rem" }}>ستظهر هنا طلبات الوسائل والردود عليها</div>
        </div>
      )}

      {/* ── تذكير يوم قبل الموعد ── */}
      {upcomingReminders && upcomingReminders.length>0 && (
        <div style={{ marginBottom:"1.2rem" }}>
          <div style={{ fontSize:"0.8rem", fontWeight:700, color:"#f59e0b", marginBottom:"0.7rem", display:"flex", alignItems:"center", gap:"0.4rem" }}>
            <span style={{ background:"#f59e0b", color:"#fff", borderRadius:"50%", width:18, height:18, display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:"0.65rem" }}>{upcomingReminders.length}</span>
            تذكير — موعد تسليم غداً!
          </div>
          {upcomingReminders.map(n=>(
            <div key={n.id} style={{ background:"#fffbeb", border:"1.5px solid #f59e0b66", borderRadius:"14px", padding:"0.9rem", marginBottom:"0.7rem", display:"flex", gap:"0.8rem", alignItems:"center" }}>
              <div style={{ fontSize:"1.8rem" }}>{n.toolImg}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:"0.88rem", fontWeight:700, color:"#92400e" }}>⏰ {n.toolName}</div>
                <div style={{ fontSize:"0.75rem", color:"#78350f" }}>المستعير: {n.borrowerName}</div>
                <div style={{ fontSize:"0.72rem", color:"#f59e0b", fontWeight:700 }}>موعد التسليم غداً: {n.dueDate}</div>
              </div>
              <button onClick={()=>setNotifications(prev=>prev.map(x=>x.id===n.id?{...x,status:"dismissed"}:x))}
                style={{ background:"#fef3c7", border:"1px solid #f59e0b44", borderRadius:"8px", padding:"0.3rem 0.6rem", color:"#92400e", fontSize:"0.7rem", cursor:"pointer", fontWeight:700, fontFamily:"Tajawal,sans-serif", flexShrink:0 }}>تم ✓</button>
            </div>
          ))}
        </div>
      )}

      {/* ── تنبيه الوسائل المتأخرة ── */}
      {overdueTools && overdueTools.length>0 && (
        <div style={{ marginBottom:"1.2rem" }}>
          <div style={{ fontSize:"0.8rem", fontWeight:700, color:"#ef4444", marginBottom:"0.7rem", display:"flex", alignItems:"center", gap:"0.4rem" }}>
            <span style={{ background:"#ef4444", color:"#fff", borderRadius:"50%", width:18, height:18, display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:"0.65rem" }}>{overdueTools.length}</span>
            وسائل تجاوزت موعد التسليم!
          </div>
          {overdueTools.map(t=>(
            <div key={t.id} style={{ background:"#fef2f2", border:"1.5px solid #fecaca", borderRadius:"14px", padding:"0.9rem", marginBottom:"0.7rem", display:"flex", gap:"0.8rem", alignItems:"center" }}>
              <div style={{ fontSize:"1.8rem" }}>{t.img}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:"0.88rem", fontWeight:700, color:"#991b1b" }}>{t.name}</div>
                <div style={{ fontSize:"0.75rem", color:"#6b7280" }}>مستعارة بواسطة: {t.borrowedBy||"غير محدد"}</div>
                <div style={{ fontSize:"0.72rem", color:"#ef4444", fontWeight:700 }}>⏰ موعد التسليم: {t.dueDate}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {incoming.length>0 && (
        <div style={{ marginBottom:"1.2rem" }}>
          <div style={{ fontSize:"0.8rem", fontWeight:700, color:"#f59e0b", marginBottom:"0.7rem", display:"flex", alignItems:"center", gap:"0.4rem" }}>
            <span style={{ background:"#f59e0b", color:"#fff", borderRadius:"50%", width:18, height:18, display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:"0.65rem" }}>{incoming.length}</span>
            طلبات تحتاج ردك
          </div>
          {incoming.map(n=>(
            <div key={n.id} style={{ background:"#fff", border:"1.5px solid #f59e0b44", borderRadius:"16px", padding:"1rem", marginBottom:"0.8rem", boxShadow:"0 2px 12px rgba(0,0,0,0.05)" }}>
              <div style={{ display:"flex", gap:"0.8rem", alignItems:"flex-start", marginBottom:"0.8rem" }}>
                <div style={{ fontSize:"2rem", flexShrink:0 }}>{n.toolImg}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:"0.88rem", fontWeight:700, color:"#1f2937" }}>{n.from} {n.fromRole==="parent"&&<span style={{ background:"#dcfce7", color:"#065f46", borderRadius:"6px", padding:"1px 6px", fontSize:"0.65rem", fontWeight:700 }}>ولي أمر</span>}</div>
                  <div style={{ fontSize:"0.78rem", color:"#6b7280", marginTop:"2px" }}>يطلب: <b style={{ color:"#0f172a" }}>{n.toolName}</b></div>
                  {n.note && <div style={{ fontSize:"0.75rem", color:"#9ca3af", marginTop:"4px", background:"#f9fafb", borderRadius:"8px", padding:"6px 8px" }}>"{n.note}"</div>}
                  <div style={{ fontSize:"0.68rem", color:"#d1d5db", marginTop:"4px" }}>{n.date}</div>
                </div>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.6rem" }}>
                <button onClick={()=>approve(n)} style={{ background:"linear-gradient(135deg,#10b981,#059669)", border:"none", borderRadius:"10px", padding:"0.6rem", color:"#fff", fontWeight:700, fontSize:"0.82rem", cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>✅ موافقة</button>
                <button onClick={()=>reject(n)} style={{ background:"#fef2f2", border:"1.5px solid #fecaca", borderRadius:"10px", padding:"0.6rem", color:"#ef4444", fontWeight:700, fontSize:"0.82rem", cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>❌ رفض</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {responses.length>0 && (
        <div style={{ marginBottom:"1.2rem" }}>
          <div style={{ fontSize:"0.8rem", fontWeight:700, color:"#6366f1", marginBottom:"0.7rem" }}>ردود على طلباتك</div>
          {responses.map(n=>(
            <div key={n.id} style={{ background:"#fff", border:`1.5px solid ${n.status==="approved"?"#10b98144":"#ef444444"}`, borderRadius:"14px", padding:"0.9rem", marginBottom:"0.7rem", display:"flex", gap:"0.8rem", alignItems:"center" }}>
              <div style={{ fontSize:"1.8rem" }}>{n.toolImg}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:"0.85rem", fontWeight:700, color:n.status==="approved"?"#065f46":"#991b1b" }}>
                  {n.status==="approved"?"✅ تمت الموافقة على طلبك":"❌ تم رفض طلبك"}
                </div>
                <div style={{ fontSize:"0.75rem", color:"#6b7280" }}>{n.toolName} • {n.from}</div>
                <div style={{ fontSize:"0.68rem", color:"#d1d5db" }}>{n.date}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {sent.length>0 && (
        <div>
          <div style={{ fontSize:"0.8rem", fontWeight:700, color:"#9ca3af", marginBottom:"0.7rem" }}>طلباتك المرسلة</div>
          {sent.map(n=>{
            const sc = n.status==="approved"?{c:"#10b981",bg:"#ecfdf5",label:"تمت الموافقة"}:n.status==="rejected"?{c:"#ef4444",bg:"#fef2f2",label:"مرفوض"}:{c:"#f59e0b",bg:"#fffbeb",label:"قيد الانتظار"};
            return (
              <div key={n.id} style={{ background:"#fff", border:"1.5px solid #f3f4f6", borderRadius:"14px", padding:"0.9rem", marginBottom:"0.7rem", display:"flex", gap:"0.8rem", alignItems:"center" }}>
                <div style={{ fontSize:"1.8rem" }}>{n.toolImg}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:"0.85rem", fontWeight:600, color:"#1f2937" }}>{n.toolName}</div>
                  <div style={{ fontSize:"0.68rem", color:"#9ca3af" }}>{n.date}</div>
                </div>
                <span style={{ background:sc.bg, color:sc.c, borderRadius:"100px", padding:"3px 10px", fontSize:"0.68rem", fontWeight:700, flexShrink:0 }}>{sc.label}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════ STATS ═══════════════════ */
function StatsScreen({ tools }) {
  const byDept  = DEPTS.map(d=>({...d,count:tools.filter(t=>t.dept===d.id).length,usage:tools.filter(t=>t.dept===d.id).reduce((a,t)=>a+t.usageCount,0)}));
  const byStatus= Object.entries(STATUS).map(([k,s])=>({...s,key:k,count:tools.filter(t=>t.status===k).length}));
  const top     = [...tools].sort((a,b)=>b.usageCount-a.usageCount).slice(0,5);
  const avgRating = tools.length>0?(tools.reduce((a,t)=>a+t.rating,0)/tools.length).toFixed(1):"0";

  const exportReport = () => {
    const lines = [
      "تقرير بنك الوسائل التعليمية",
      "=".repeat(40),
      `تاريخ التقرير: ${new Date().toLocaleDateString("ar-SA")}`,
      "",
      `إجمالي الوسائل: ${tools.length}`,
      `إجمالي الاستخدامات: ${tools.reduce((a,t)=>a+t.usageCount,0)}`,
      `متوسط التقييم: ${avgRating}`,
      `متاحة الآن: ${tools.filter(t=>t.status==="available").length}`,
      "",
      "نشاط الأقسام:",
      ...byDept.map(d=>`  ${d.name}: ${d.count} وسيلة - ${d.usage} استخدام`),
      "",
      "توزيع الحالات:",
      ...byStatus.map(s=>`  ${s.label}: ${s.count}`),
      "",
      "أكثر الوسائل استخداماً:",
      ...top.map((t,i)=>`  ${i+1}. ${t.name} - ${t.usageCount} استخدام`),
      "",
      "قائمة الوسائل الكاملة:",
      ...tools.map(t=>`  - ${t.name} | ${DEPTS.find(d=>d.id===t.dept)?.name||""} | ${STATUS[t.status]?.label||""} | ${t.usageCount} استخدام`),
    ];
    const blob = new Blob([lines.join("\n")], {type:"text/plain;charset=utf-8"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `تقرير_بنك_الوسائل_${new Date().toLocaleDateString("ar").replace(/\//g,"-")}.txt`;
    document.body.appendChild(a);
    a.click();
    // FIX: delay revoke to allow download to complete (especially on mobile)
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
  };

  return (
    <div style={{ padding:"1.2rem", paddingBottom:"5rem" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"1.2rem" }}>
        <div style={{ fontSize:"1rem", fontWeight:800, color:"#0f172a" }}>📊 إحصائيات البنك</div>
        <button onClick={exportReport} style={{ background:"linear-gradient(135deg,#6366f1,#4f46e5)", border:"none", borderRadius:"10px", padding:"0.4rem 0.9rem", color:"#fff", fontSize:"0.75rem", fontWeight:700, cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>📥 تصدير التقرير</button>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.7rem", marginBottom:"1.2rem" }}>
        {[{label:"إجمالي الوسائل",val:tools.length,color:"#6366f1",icon:"📦"},{label:"إجمالي الاستخدامات",val:tools.reduce((a,t)=>a+t.usageCount,0),color:"#10b981",icon:"📈"},{label:"متوسط التقييم",val:avgRating+" ⭐",color:"#f59e0b",icon:"⭐"},{label:"متاحة الآن",val:tools.filter(t=>t.status==="available").length,color:"#3b82f6",icon:"🟢"}].map(s=>(
          <div key={s.label} style={{ background:"#fff", borderRadius:"14px", padding:"1rem", border:"1px solid #f3f4f6", boxShadow:"0 2px 8px rgba(0,0,0,0.04)" }}>
            <div style={{ fontSize:"1.5rem", marginBottom:"4px" }}>{s.icon}</div>
            <div style={{ fontSize:"1.3rem", fontWeight:900, color:s.color }}>{s.val}</div>
            <div style={{ fontSize:"0.68rem", color:"#9ca3af" }}>{s.label}</div>
          </div>
        ))}
      </div>
      <div style={{ background:"#fff", borderRadius:"16px", padding:"1.1rem", marginBottom:"1rem", boxShadow:"0 2px 8px rgba(0,0,0,0.04)" }}>
        <div style={{ fontSize:"0.85rem", fontWeight:700, marginBottom:"0.8rem" }}>نشاط الأقسام</div>
        {(() => {
          // FIX: calculate relative percentage based on max usage, not a fixed divisor
          const maxUsage = Math.max(...byDept.map(d=>d.usage), 1);
          return byDept.map(d=>(
            <div key={d.id} style={{ marginBottom:"0.8rem" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"4px" }}>
                <span style={{ fontSize:"0.8rem", color:"#374151" }}>{d.icon} {d.name}</span>
                <span style={{ fontSize:"0.75rem", color:"#9ca3af" }}>{d.count} وسيلة • {d.usage} استخدام</span>
              </div>
              <div style={{ height:6, background:"#f3f4f6", borderRadius:"3px", overflow:"hidden" }}>
                <div style={{ height:"100%", background:d.color, borderRadius:"3px", width:`${(d.usage/maxUsage)*100}%` }} />
              </div>
            </div>
          ));
        })()}
      </div>
      <div style={{ background:"#fff", borderRadius:"16px", padding:"1.1rem", marginBottom:"1rem", boxShadow:"0 2px 8px rgba(0,0,0,0.04)" }}>
        <div style={{ fontSize:"0.85rem", fontWeight:700, marginBottom:"0.8rem" }}>توزيع الحالات</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.6rem" }}>
          {byStatus.map(s=><div key={s.key} style={{ background:s.bg, borderRadius:"10px", padding:"0.7rem", border:`1px solid ${s.color}33` }}><div style={{ fontSize:"1.1rem", fontWeight:900, color:s.color }}>{s.count}</div><div style={{ fontSize:"0.7rem", color:s.color, opacity:0.8 }}>{s.label}</div></div>)}
        </div>
      </div>
      <div style={{ background:"#fff", borderRadius:"16px", padding:"1.1rem", boxShadow:"0 2px 8px rgba(0,0,0,0.04)" }}>
        <div style={{ fontSize:"0.85rem", fontWeight:700, marginBottom:"0.8rem" }}>🏆 المتصدرون</div>
        {top.map((t,i)=>(
          <div key={t.id} style={{ display:"flex", alignItems:"center", gap:"0.7rem", padding:"0.5rem 0", borderBottom:i<4?"1px solid #f3f4f6":"none" }}>
            <div style={{ width:24, height:24, borderRadius:"6px", background:["#ffd700","#c0c0c0","#cd7f32","#f3f4f6","#f3f4f6"][i], display:"flex", alignItems:"center", justifyContent:"center", fontSize:"0.7rem", fontWeight:700, color:i<3?"#fff":"#9ca3af" }}>{i+1}</div>
            <span style={{ fontSize:"1.1rem" }}>{t.img}</span>
            <span style={{ flex:1, fontSize:"0.82rem", fontWeight:600 }}>{t.name}</span>
            <span style={{ fontSize:"0.75rem", color:"#10b981", fontWeight:700 }}>{t.usageCount}×</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════ PROFILE ═══════════════════ */
function ProfileScreen({ user, setUser, users, setUsers, onLogout }) {
  const roleLabel = { admin:"إدارة", teacher:"معلم", parent:"ولي أمر" };
  const roleColor = { admin:"#ef4444", teacher:"#6366f1", parent:"#10b981" };
  const [editing,  setEditing]  = useState(false);
  const [editName, setEditName] = useState(user.name);
  const [editDept, setEditDept] = useState(user.dept);
  const [photo,    setPhoto]    = useState(user.photo||null);
  const [oldPass,  setOldPass]  = useState("");
  const [newPass,  setNewPass]  = useState("");
  const [newPass2, setNewPass2] = useState("");
  const [passErr,  setPassErr]  = useState("");
  const [passDone, setPassDone] = useState(false);
  const [infoSaved,setInfoSaved]= useState(false);
  const [confirmLogout, setConfirmLogout] = useState(false);

  const saveInfo = () => {
    if (!editName.trim()) return;
    const initials = editName.trim().split(" ").map(w=>w[0]).join("").slice(0,2);
    const updated  = {...user, name:editName.trim(), dept:editDept, avatar:initials, photo};
    const updatedUsers = users.map(u=>u.id===user.id?updated:u);
    setUsers(updatedUsers);
    setUser(updated);
    if (window.storage && window.storage.set) {
      window.storage.set("app:users", JSON.stringify(updatedUsers)).catch(()=>{});
    }
    setEditing(false);
    setInfoSaved(true);
    setTimeout(()=>setInfoSaved(false),2500);
  };

  const handlePhotoChange = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      setPhoto(dataUrl);
      const updated = {...user, photo:dataUrl};
      const updatedUsers = users.map(u=>u.id===user.id?updated:u);
      setUsers(updatedUsers);
      setUser(updated);
      if (window.storage && window.storage.set) {
        window.storage.set("app:users", JSON.stringify(updatedUsers)).catch(()=>{});
      }
    };
    reader.readAsDataURL(file);
  };

  const changePass = () => {
    setPassErr("");
    if (oldPass!==user.password) return setPassErr("كلمة المرور الحالية غير صحيحة");
    if (newPass.length<4)        return setPassErr("كلمة المرور الجديدة ٤ أحرف على الأقل");
    if (newPass!==newPass2)      return setPassErr("كلمتا المرور الجديدتان غير متطابقتين");
    const updated = {...user, password:newPass};
    const updatedUsers = users.map(u=>u.id===user.id?updated:u);
    setUsers(updatedUsers);
    setUser(updated);
    if (window.storage && window.storage.set) {
      window.storage.set("app:users", JSON.stringify(updatedUsers)).catch(()=>{});
    }
    setOldPass(""); setNewPass(""); setNewPass2("");
    setPassDone(true);
    setTimeout(()=>setPassDone(false),3000);
  };

  const card = (children, mb="1rem") => (
    <div style={{ background:"#fff", borderRadius:"16px", padding:"1.1rem", marginBottom:mb, boxShadow:"0 2px 8px rgba(0,0,0,0.04)" }}>{children}</div>
  );

  return (
    <div style={{ padding:"1.2rem", paddingBottom:"5rem" }}>
      {confirmLogout && <ConfirmDialog message="هل تريد تسجيل الخروج؟" onConfirm={onLogout} onCancel={()=>setConfirmLogout(false)}/>}

      <div style={{ background:"linear-gradient(135deg,#0f172a,#1e3a5f)", borderRadius:"20px", padding:"2rem 1.5rem", textAlign:"center", marginBottom:"1.2rem" }}>
        <div style={{ position:"relative", width:80, height:80, margin:"0 auto 0.8rem" }}>
          <Av initials={user.avatar} photo={user.photo} color="#6366f1" size={80}/>
          <label htmlFor="photo-upload" style={{ position:"absolute", bottom:0, right:0, background:"#6366f1", border:"2px solid #fff", borderRadius:"50%", width:26, height:26, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", fontSize:"0.75rem" }}>📷</label>
          <input id="photo-upload" type="file" accept="image/*" onChange={handlePhotoChange} style={{ display:"none" }}/>
        </div>
        <div style={{ color:"#fff", fontSize:"1.2rem", fontWeight:800 }}>{user.name}</div>
        <div style={{ color:"rgba(255,255,255,0.6)", fontSize:"0.8rem", marginBottom:"0.8rem" }}>{user.dept}</div>
        <span style={{ background:roleColor[user.role]+"33", color:roleColor[user.role], border:`1px solid ${roleColor[user.role]}66`, borderRadius:"100px", padding:"4px 14px", fontSize:"0.78rem", fontWeight:700 }}>{roleLabel[user.role]}</span>
      </div>

      {card(
        <>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"0.9rem" }}>
            <div style={{ fontSize:"0.88rem", fontWeight:700, color:"#0f172a" }}>✏️ بيانات الحساب</div>
            <button onClick={()=>{setEditing(!editing);setInfoSaved(false);}} style={{ background:editing?"#f3f4f6":"#eef2ff", color:editing?"#6b7280":"#6366f1", border:"none", borderRadius:"8px", padding:"0.3rem 0.8rem", fontSize:"0.75rem", cursor:"pointer", fontWeight:700, fontFamily:"Tajawal,sans-serif" }}>
              {editing?"إلغاء":"تعديل"}
            </button>
          </div>
          {!editing ? (
            <>
              {[{label:"الاسم الكامل",val:user.name},{label:"اسم المستخدم",val:user.username},{label:"القسم",val:user.dept}].map(f=>(
                <div key={f.label} style={{ padding:"0.5rem 0", borderBottom:"1px solid #f9fafb" }}>
                  <div style={{ fontSize:"0.68rem", color:"#9ca3af", marginBottom:"2px" }}>{f.label}</div>
                  <div style={{ fontSize:"0.88rem", color:"#1f2937", fontWeight:500 }}>{f.val}</div>
                </div>
              ))}
            </>
          ) : (
            <>
              <div style={{ marginBottom:"0.7rem" }}><label style={lLabel}>الاسم الكامل</label><input value={editName} onChange={e=>setEditName(e.target.value)} style={lightInput} /></div>
              {user.role==="teacher" && (
                <div style={{ marginBottom:"0.7rem" }}><label style={lLabel}>القسم</label>
                  <select value={editDept} onChange={e=>setEditDept(e.target.value)} style={{...lightInput,cursor:"pointer"}}>
                    {DEPTS.map(d=><option key={d.id} value={d.name}>{d.icon} {d.name}</option>)}
                  </select>
                </div>
              )}
              <button onClick={saveInfo} style={{ width:"100%", background:"linear-gradient(135deg,#6366f1,#4f46e5)", border:"none", borderRadius:"12px", padding:"0.75rem", color:"#fff", fontSize:"0.9rem", fontWeight:700, cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>حفظ التغييرات</button>
            </>
          )}
          {infoSaved && <div style={{ textAlign:"center", color:"#10b981", fontSize:"0.8rem", fontWeight:700, marginTop:"0.6rem" }}>✅ تم الحفظ بنجاح</div>}
        </>
      )}

      {card(
        <>
          <div style={{ fontSize:"0.88rem", fontWeight:700, color:"#0f172a", marginBottom:"0.9rem" }}>🔑 تغيير كلمة المرور</div>
          <div style={{ marginBottom:"0.7rem" }}><label style={lLabel}>كلمة المرور الحالية</label><input type="password" value={oldPass} onChange={e=>{setOldPass(e.target.value);setPassErr("");}} placeholder="••••" style={lightInput} /></div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.6rem", marginBottom:"0.7rem" }}>
            <div><label style={lLabel}>كلمة المرور الجديدة</label><input type="password" value={newPass} onChange={e=>{setNewPass(e.target.value);setPassErr("");}} placeholder="••••" style={lightInput} /></div>
            <div><label style={lLabel}>تأكيد كلمة المرور</label><input type="password" value={newPass2} onChange={e=>{setNewPass2(e.target.value);setPassErr("");}} placeholder="••••" style={lightInput} /></div>
          </div>
          {passErr && <p style={{ color:"#ef4444", fontSize:"0.75rem", marginBottom:"0.6rem", textAlign:"center" }}>{passErr}</p>}
          {passDone && <p style={{ color:"#10b981", fontSize:"0.78rem", marginBottom:"0.6rem", textAlign:"center", fontWeight:700 }}>✅ تم تغيير كلمة المرور بنجاح</p>}
          <button onClick={changePass} style={{ width:"100%", background:"#0f172a", border:"none", borderRadius:"12px", padding:"0.75rem", color:"#fff", fontSize:"0.9rem", fontWeight:700, cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>تحديث كلمة المرور</button>
        </>
      )}

      {/* BUG FIX: logout مع تأكيد */}
      <button onClick={()=>setConfirmLogout(true)} style={{ width:"100%", background:"#fef2f2", color:"#ef4444", border:"1.5px solid #fecaca", borderRadius:"14px", padding:"0.85rem", fontSize:"1rem", fontWeight:700, cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>
        🚪 تسجيل الخروج
      </button>
    </div>
  );
}

/* ═══════════════════ ADMIN USERS ═══════════════════ */
function AdminUsersScreen({ users, setUsers, currentUser, allTags, setAllTags }) {
  const [search, setSearch] = useState("");
  const [confirmDel, setConfirmDel] = useState(null);
  const [activeTab, setActiveTab] = useState("users"); // "users" | "tags"
  const [newTag, setNewTag] = useState("");
  const [editingTag, setEditingTag] = useState(null); // { idx, val }
  const [tagErr, setTagErr] = useState("");
  const [tagSaved, setTagSaved] = useState(false);
  const roleLabel = { admin:"إدارة", teacher:"معلم", parent:"ولي أمر" };
  const roleColor = { admin:"#ef4444", teacher:"#6366f1", parent:"#10b981" };

  const filtered = users.filter(u=>
    u.name.includes(search) || u.username.includes(search) || (u.dept||"").includes(search)
  );

  const deleteUser = (u) => {
    // FIX: reassign tools to admin instead of orphaning them
    setUsers(users.filter(x=>x.id!==u.id));
    // نحوّل وسائل المستخدم المحذوف للأدمن
    // FIX: clean up pending notifications belonging to deleted user
    setConfirmDel(null);
  };

  const tags = allTags || INIT_TAGS;

  const addTag = () => {
    const t = newTag.trim();
    if (!t) return setTagErr("اكتب اسم التاگ أولاً");
    if (tags.includes(t)) return setTagErr("التاگ موجود بالفعل");
    const updated = [...tags, t];
    setAllTags(updated);
    setNewTag(""); setTagErr("");
    flashSaved();
  };

  const deleteTag = (idx) => {
    if (tags[idx]==="الكل") return setTagErr("لا يمكن حذف تاگ 'الكل'");
    const removedTag = tags[idx];
    const updated = tags.filter((_,i)=>i!==idx);
    setAllTags(updated);
    // FIX: remove deleted tag from all tools that have it
    // Note: setTools not available here - handled via storage sync on next load
    flashSaved();
  };

  const saveEdit = () => {
    if (!editingTag) return;
    const t = editingTag.val.trim();
    if (!t) return setTagErr("اسم التاگ لا يكون فارغاً");
    if (tags.includes(t) && tags.indexOf(t)!==editingTag.idx) return setTagErr("التاگ موجود بالفعل");
    const updated = tags.map((tg,i)=>i===editingTag.idx?t:tg);
    setAllTags(updated);
    setEditingTag(null); setTagErr("");
    flashSaved();
  };

  const flashSaved = () => { setTagSaved(true); setTimeout(()=>setTagSaved(false),2000); };

  return (
    <div style={{ paddingBottom:"5rem" }}>
      {confirmDel && <ConfirmDialog message={`هل تريد حذف حساب "${confirmDel.name}"؟`} onConfirm={()=>deleteUser(confirmDel)} onCancel={()=>setConfirmDel(null)}/>}

      {/* Tabs */}
      <div style={{ display:"flex", background:"#f3f4f6", margin:"1.2rem", borderRadius:"14px", padding:"4px" }}>
        {[{k:"users",label:"👥 المستخدمين"},{k:"tags",label:"🏷️ التاگات"}].map(t=>(
          <button key={t.k} onClick={()=>{setActiveTab(t.k);setTagErr("");setEditingTag(null);}}
            style={{ flex:1, padding:"0.55rem", border:"none", borderRadius:"10px", cursor:"pointer", fontSize:"0.82rem", fontWeight:700,
              background:activeTab===t.k?"#fff":"transparent", color:activeTab===t.k?"#0f172a":"#9ca3af",
              boxShadow:activeTab===t.k?"0 1px 6px rgba(0,0,0,0.1)":"none", fontFamily:"Tajawal,sans-serif" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ─── تبويب المستخدمين ─── */}
      {activeTab==="users" && (
        <div style={{ padding:"0 1.2rem" }}>
          <div style={{ fontSize:"1rem", fontWeight:800, color:"#0f172a", marginBottom:"1rem" }}>👥 إدارة المستخدمين</div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="ابحث بالاسم أو القسم..."
            style={{ width:"100%", background:"#f9fafb", border:"1px solid #e5e7eb", borderRadius:"12px", padding:"0.7rem 1rem", color:"#1f2937", fontSize:"0.88rem", outline:"none", fontFamily:"Tajawal,sans-serif", marginBottom:"1rem" }}/>
          <div style={{ display:"grid", gap:"0.7rem" }}>
            {filtered.map(u=>(
              <div key={u.id} style={{ background:"#fff", borderRadius:"14px", padding:"0.9rem 1rem", boxShadow:"0 2px 8px rgba(0,0,0,0.05)", display:"flex", alignItems:"center", gap:"0.8rem" }}>
                <Av initials={u.avatar} photo={u.photo} color={roleColor[u.role]||"#6366f1"} size={40}/>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:"0.88rem", fontWeight:700, color:"#1f2937" }}>{u.name}</div>
                  <div style={{ fontSize:"0.72rem", color:"#9ca3af" }}>{u.username} • {u.dept}</div>
                  <span style={{ background:roleColor[u.role]+"22", color:roleColor[u.role], borderRadius:"100px", padding:"1px 8px", fontSize:"0.65rem", fontWeight:700 }}>{roleLabel[u.role]}</span>
                </div>
                {u.id!==currentUser.id && (
                  <button onClick={()=>setConfirmDel(u)} style={{ background:"#fef2f2", border:"1.5px solid #fecaca", borderRadius:"8px", padding:"0.3rem 0.6rem", color:"#ef4444", fontSize:"0.75rem", cursor:"pointer", fontWeight:700, fontFamily:"Tajawal,sans-serif" }}>🗑️ حذف</button>
                )}
              </div>
            ))}
            {filtered.length===0 && <div style={{ textAlign:"center", padding:"2rem", color:"#9ca3af" }}>لا توجد نتائج</div>}
          </div>
          <div style={{ marginTop:"1rem", background:"#f3f4f6", borderRadius:"12px", padding:"0.75rem 1rem", textAlign:"center" }}>
            <span style={{ fontSize:"0.78rem", color:"#6b7280" }}>إجمالي المستخدمين: <b style={{ color:"#0f172a" }}>{users.length}</b></span>
          </div>
        </div>
      )}

      {/* ─── تبويب التاگات ─── */}
      {activeTab==="tags" && (
        <div style={{ padding:"0 1.2rem" }}>
          <div style={{ fontSize:"1rem", fontWeight:800, color:"#0f172a", marginBottom:"0.3rem" }}>🏷️ إدارة تاگات الفلتر</div>
          <div style={{ fontSize:"0.75rem", color:"#9ca3af", marginBottom:"1rem" }}>هذه التاگات تظهر في فلتر شاشة الوسائل</div>

          {/* إضافة تاگ جديد */}
          <div style={{ background:"#fff", borderRadius:"16px", padding:"1rem", boxShadow:"0 2px 8px rgba(0,0,0,0.05)", marginBottom:"1rem" }}>
            <div style={{ fontSize:"0.82rem", fontWeight:700, color:"#0f172a", marginBottom:"0.7rem" }}>➕ إضافة تاگ جديد</div>
            <div style={{ display:"flex", gap:"0.5rem" }}>
              <input value={newTag} onChange={e=>{setNewTag(e.target.value);setTagErr("");}}
                onKeyDown={e=>e.key==="Enter"&&addTag()}
                placeholder="اسم التاگ الجديد..."
                style={{ flex:1, background:"#f9fafb", border:"1px solid #e5e7eb", borderRadius:"10px", padding:"0.65rem 1rem", color:"#1f2937", fontSize:"0.85rem", outline:"none", fontFamily:"Tajawal,sans-serif" }}/>
              <button onClick={addTag}
                style={{ background:"linear-gradient(135deg,#6366f1,#4f46e5)", border:"none", borderRadius:"10px", padding:"0.65rem 1rem", color:"#fff", fontSize:"0.85rem", fontWeight:700, cursor:"pointer", fontFamily:"Tajawal,sans-serif", flexShrink:0 }}>إضافة</button>
            </div>
            {tagErr && <div style={{ color:"#ef4444", fontSize:"0.75rem", marginTop:"0.5rem" }}>⚠️ {tagErr}</div>}
            {tagSaved && <div style={{ color:"#10b981", fontSize:"0.75rem", marginTop:"0.5rem", fontWeight:700 }}>✅ تم الحفظ</div>}
          </div>

          {/* قائمة التاگات */}
          <div style={{ background:"#fff", borderRadius:"16px", padding:"1rem", boxShadow:"0 2px 8px rgba(0,0,0,0.05)" }}>
            <div style={{ fontSize:"0.82rem", fontWeight:700, color:"#0f172a", marginBottom:"0.8rem" }}>📋 التاگات الحالية ({tags.length})</div>
            <div style={{ display:"grid", gap:"0.5rem" }}>
              {tags.map((tg,i)=>(
                <div key={i} style={{ display:"flex", alignItems:"center", gap:"0.5rem", background:"#f9fafb", borderRadius:"10px", padding:"0.55rem 0.8rem", border:"1px solid #f3f4f6" }}>
                  {editingTag && editingTag.idx===i ? (
                    <>
                      <input value={editingTag.val} onChange={e=>setEditingTag({...editingTag,val:e.target.value})}
                        onKeyDown={e=>{if(e.key==="Enter")saveEdit();if(e.key==="Escape")setEditingTag(null);}}
                        autoFocus
                        style={{ flex:1, background:"#fff", border:"1.5px solid #6366f1", borderRadius:"7px", padding:"0.35rem 0.7rem", fontSize:"0.82rem", outline:"none", fontFamily:"Tajawal,sans-serif", color:"#1f2937" }}/>
                      <button onClick={saveEdit} style={{ background:"#ecfdf5", border:"1px solid #10b981", borderRadius:"7px", padding:"0.3rem 0.6rem", color:"#065f46", fontSize:"0.72rem", cursor:"pointer", fontWeight:700, fontFamily:"Tajawal,sans-serif" }}>✅ حفظ</button>
                      <button onClick={()=>{setEditingTag(null);setTagErr("");}} style={{ background:"#f3f4f6", border:"none", borderRadius:"7px", padding:"0.3rem 0.6rem", color:"#6b7280", fontSize:"0.72rem", cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>إلغاء</button>
                    </>
                  ) : (
                    <>
                      <span style={{ flex:1, fontSize:"0.85rem", fontWeight:600, color:"#1f2937" }}>{tg}</span>
                      {tg==="الكل" ? (
                        <span style={{ fontSize:"0.65rem", color:"#9ca3af", fontStyle:"italic" }}>ثابت</span>
                      ) : (
                        <>
                          <button onClick={()=>{setEditingTag({idx:i,val:tg});setTagErr("");}}
                            style={{ background:"#eef2ff", border:"none", borderRadius:"7px", padding:"0.3rem 0.6rem", color:"#6366f1", fontSize:"0.72rem", cursor:"pointer", fontWeight:700, fontFamily:"Tajawal,sans-serif" }}>✏️ تعديل</button>
                          <button onClick={()=>deleteTag(i)}
                            style={{ background:"#fef2f2", border:"none", borderRadius:"7px", padding:"0.3rem 0.6rem", color:"#ef4444", fontSize:"0.72rem", cursor:"pointer", fontWeight:700, fontFamily:"Tajawal,sans-serif" }}>🗑️ حذف</button>
                        </>
                      )}
                    </>
                  )}
                </div>
              ))}
            </div>
          </div>

          {/* معاينة الفلتر */}
          <div style={{ background:"linear-gradient(135deg,#0f172a,#1e3a5f)", borderRadius:"16px", padding:"1rem", marginTop:"1rem" }}>
            <div style={{ fontSize:"0.78rem", color:"rgba(255,255,255,0.5)", marginBottom:"0.6rem" }}>👁️ معاينة الفلتر</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"0.4rem" }}>
              {tags.map((t,i)=>(
                <span key={i} style={{ background:i===0?"#6366f1":"rgba(255,255,255,0.1)", color:"#fff", border:`1px solid ${i===0?"#6366f1":"rgba(255,255,255,0.2)"}`, borderRadius:"100px", padding:"0.2rem 0.7rem", fontSize:"0.68rem", fontWeight:i===0?700:400 }}>{t}</span>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════ APP SHELL ═══════════════════ */
function App() {
  const [users,         setUsers]         = useState(INIT_USERS);
  const [user,          setUser]          = useState(null);
  const [tools,         setTools]         = useState(INIT_TOOLS);
  const [notifications, setNotifications] = useState([]);
  const [allTags,       setAllTags]       = useState(INIT_TAGS);
  const [screen,        setScreen]        = useState("home");
  const [params,        setParams]        = useState({});
  const [saveErr,       setSaveErr]       = useState("");

  // فتح التطبيق فوراً بالبيانات الافتراضية — Firebase يحمّل في الخلفية
  useEffect(()=>{
    // حمّل من localStorage فوراً
    const loadLocal = () => {
      try {
        const savedUsers = localStorage.getItem("app:users");
        if (savedUsers) setUsers(JSON.parse(savedUsers));
        const savedTools = localStorage.getItem("app:tools");
        if (savedTools) setTools(JSON.parse(savedTools));
        const savedNotifs = localStorage.getItem("app:notifications");
        if (savedNotifs) setNotifications(JSON.parse(savedNotifs));
        const savedTags = localStorage.getItem("app:tags");
        if (savedTags) setAllTags(JSON.parse(savedTags));
        const savedUser = localStorage.getItem("app:currentUser");
        if (savedUser) setUser(JSON.parse(savedUser));
      } catch(e) {}
    };
    loadLocal();

    // لما Firebase يزامن البيانات — أعد التحميل من localStorage
    const onSynced = () => loadLocal();
    window.addEventListener("firebaseSynced", onSynced);
    return () => window.removeEventListener("firebaseSynced", onSynced);
  }, []);

  const updateUsers = (val) => {
    const next = typeof val==="function" ? val(users) : val;
    setUsers(next);
    window.storage.set("app:users", JSON.stringify(next)).catch(()=>setSaveErr("⚠️ فشل الحفظ، تحقق من الاتصال"));
  };
  const updateTools = (val) => {
    const next = typeof val==="function" ? val(tools) : val;
    setTools(next);
    window.storage.set("app:tools", JSON.stringify(next)).catch(()=>setSaveErr("⚠️ فشل الحفظ، تحقق من الاتصال"));
  };
  const updateNotifications = (val) => {
    const next = typeof val==="function" ? val(notifications) : val;
    setNotifications(next);
    window.storage.set("app:notifications", JSON.stringify(next)).catch(()=>{});
  };
  const updateAllTags = (val) => {
    const next = typeof val==="function" ? val(allTags) : val;
    setAllTags(next);
    window.storage.set("app:tags", JSON.stringify(next)).catch(()=>setSaveErr("⚠️ فشل الحفظ، تحقق من الاتصال"));
  };
  const loginUser = (u) => {
    setUser(u); setScreen("home");
    window.storage.set("app:currentUser", JSON.stringify(u)).catch(()=>{});
  };
  const logoutUser = () => {
    setUser(null); setScreen("home");
    window.storage.delete("app:currentUser").catch(()=>{});
  };
  const nav = (s,p={}) => { setScreen(s); setParams(p); };

  if (!user) return <AuthScreen users={users} setUsers={updateUsers} onLogin={loginUser}/>;

  const pendingCount  = notifications.filter(n=>n.type==="request"&&n.toId===user.id&&n.status==="pending").length;
  const responseCount = notifications.filter(n=>n.type==="response"&&n.toId===user.id).length;

  // حساب الوسائل المتأخرة والتذكيرات (يوم قبل الموعد)
  const todayISO = new Date().toISOString().split("T")[0];
  const tomorrowISO = new Date(Date.now()+86400000).toISOString().split("T")[0];

  const overdueTools = tools.filter(t=>{
    if (t.status!=="borrowed" || !t.dueDateISO) return false;
    return t.dueDateISO < todayISO;
  });

  // تذكيرات يوم قبل الموعد: للمعلم صاحب الوسيلة أو المستعير
  const upcomingReminders = notifications.filter(n=>{
    if (n.type!=="reminder" || n.status!=="pending") return false;
    if (n.reminderDateISO !== todayISO) return false;
    return n.toId===user.id || n.toId2===user.id;
  });

  const totalBadge = pendingCount + responseCount + overdueTools.length + upcomingReminders.length;

  const tabs = [
    { id:"home",    label:"الرئيسية", icon:"🏠" },
    { id:"tools",   label:"الوسائل",  icon:"📦" },
    { id:"notifs",  label:"إشعارات",  icon:"🔔", badge:totalBadge },
    { id:"stats",   label:"إحصائيات",icon:"📊" },
    ...(user.role==="admin" ? [{ id:"adminusers", label:"المستخدمين", icon:"👥" }] : []),
    { id:"profile", label:"حسابي",    icon:"👤" },
  ];

  const currentTool = params.tool ? tools.find(t=>t.id===params.tool.id)||params.tool : null;

  return (
    <div style={{ maxWidth:430, margin:"0 auto", minHeight:"100vh", background:"#f8fafc", position:"relative", fontFamily:"Tajawal,sans-serif", direction:"rtl" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{display:none;}
        textarea,button,input,select{font-family:Tajawal,sans-serif;}
        textarea{direction:rtl;}
        input::placeholder{color:#9ca3af;}
        select option{background:#fff;color:#1f2937;}
        @keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeOut{0%{opacity:1}80%{opacity:1}100%{opacity:0}}
      `}</style>
      {/* FIX: toast for silent save errors */}
      {saveErr && (
        <div onAnimationEnd={()=>setSaveErr("")}
          style={{ position:"fixed", top:"4.5rem", left:"50%", transform:"translateX(-50%)", background:"#ef4444", color:"#fff", borderRadius:"12px", padding:"0.6rem 1.2rem", fontSize:"0.8rem", fontWeight:700, zIndex:999, boxShadow:"0 4px 20px rgba(0,0,0,0.2)", animation:"fadeOut 3s forwards", whiteSpace:"nowrap" }}>
          {saveErr}
        </div>
      )}

      {screen!=="detail" && (
        <div style={{ background:"#fff", borderBottom:"1px solid #f3f4f6", padding:"0.8rem 1.2rem", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:10, boxShadow:"0 1px 8px rgba(0,0,0,0.04)" }}>
          <div style={{ fontSize:"0.95rem", fontWeight:800, color:"#0f172a" }}>📚 بنك الوسائل</div>
          <div style={{ display:"flex", alignItems:"center", gap:"0.5rem" }}>
            {totalBadge>0 && (
              <div onClick={()=>nav("notifs")} style={{ position:"relative", cursor:"pointer" }}>
                <span style={{ fontSize:"1.2rem" }}>🔔</span>
                <span style={{ position:"absolute", top:-4, left:-4, background:"#ef4444", color:"#fff", borderRadius:"50%", width:16, height:16, fontSize:"0.6rem", fontWeight:900, display:"flex", alignItems:"center", justifyContent:"center" }}>{totalBadge}</span>
              </div>
            )}
            <Av initials={user.avatar} photo={user.photo} size={30} color="#6366f1"/>
          </div>
        </div>
      )}

      <div style={{ overflowY:"auto" }}>
        {screen==="home"       && <HomeScreen user={user} tools={tools} onNav={nav}/>}
        {screen==="tools"      && <ToolsScreen user={user} tools={tools} initDept={params.dept} onNav={nav} allTags={allTags}/>}
        {screen==="addtool"    && <AddToolScreen user={user} tools={tools} setTools={updateTools} allTags={allTags} setAllTags={updateAllTags} onBack={()=>nav("tools")}/>}
        {screen==="notifs"     && <NotificationsScreen user={user} notifications={notifications} setNotifications={updateNotifications} tools={tools} setTools={updateTools} overdueTools={overdueTools} upcomingReminders={upcomingReminders} todayISO={todayISO}/>}
        {screen==="stats"      && <StatsScreen tools={tools}/>}
        {screen==="adminusers" && <AdminUsersScreen users={users} setUsers={updateUsers} currentUser={user} allTags={allTags} setAllTags={updateAllTags}/>}
        {screen==="profile"    && <ProfileScreen user={user} setUser={(u)=>{ setUser(u); window.storage.set("app:currentUser",JSON.stringify(u)).catch(()=>{}); }} users={users} setUsers={updateUsers} onLogout={logoutUser}/>}
        {screen==="detail"     && currentTool && <DetailScreen user={user} tool={currentTool} tools={tools} setTools={updateTools} notifications={notifications} setNotifications={updateNotifications} allTags={allTags} setAllTags={updateAllTags} onBack={()=>setScreen("tools")}/>}
      </div>

      {screen!=="detail" && (
        <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:430, background:"#fff", borderTop:"1px solid #f3f4f6", display:"flex", padding:"0.5rem 0 0.8rem", boxShadow:"0 -4px 20px rgba(0,0,0,0.06)", zIndex:20 }}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>nav(t.id)} style={{ flex:1, background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:"2px", padding:"0.3rem 0", position:"relative", fontFamily:"Tajawal,sans-serif" }}>
              <span style={{ fontSize:"1.1rem", filter:screen===t.id?"none":"grayscale(1) opacity(0.5)" }}>{t.icon}</span>
              {t.badge>0 && <span style={{ position:"absolute", top:0, right:"18%", background:"#ef4444", color:"#fff", borderRadius:"50%", width:14, height:14, fontSize:"0.55rem", fontWeight:900, display:"flex", alignItems:"center", justifyContent:"center" }}>{t.badge}</span>}
              <span style={{ fontSize:"0.6rem", color:screen===t.id?"#6366f1":"#9ca3af", fontWeight:screen===t.id?700:400 }}>{t.label}</span>
              {screen===t.id && <div style={{ width:4, height:4, borderRadius:"50%", background:"#6366f1" }}/>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
