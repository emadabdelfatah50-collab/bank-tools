    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    window.fbStorage = {
      _encode: k => k.replace(/:/g,"__COLON__"),
      _decode: id => id.replace(/__COLON__/g,":"),
      get: async function(key) {
        try {
          const snap = await getDoc(doc(db,"appdata",this._encode(key)));
          return snap.exists() ? { value: snap.data().value } : null;
        } catch(e) { console.error("FB get",e); return null; }
      },
      set: async function(key,value) {
        try {
          await setDoc(doc(db,"appdata",this._encode(key)),{ value });
          return { key,value };
        } catch(e) { console.error("FB set",e); return null; }
      },
      delete: async function(key) {
        try {
          await deleteDoc(doc(db,"appdata",this._encode(key)));
          return { key,deleted:true };
        } catch(e) { return null; }
      },
      list: async function(prefix) {
        try {
          const snap = await getDocs(collection(db,"appdata"));
          const keys = snap.docs.map(d=>this._decode(d.id)).filter(k=>!prefix||k.startsWith(prefix));
          return { keys };
        } catch(e) { return { keys:[] }; }
      }
    };
    window.dispatchEvent(new Event("firebaseReady"));
  </script>

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false};}
  static getDerivedStateFromError(){return{hasError:true};}
  componentDidCatch(e,i){console.error("App crash:",e,i);}
  render(){
    if(this.state.hasError) return(
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"2rem",textAlign:"center",background:"#f8fafc"}}>

      </div>
    );
    return this.props.children;
  }
}

/* ══════════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════════ */
async function hashPassword(plain) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(plain));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function genId() {
  return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
}

// حفظ في Firebase مع fallback لـ sessionStorage (لا يُستخدم للجلسة)
async function persist(key, value) {
  if (window.fbStorage) {
    window.fbStorage.set(key, value).catch(()=>{});
  }
}
async function load(key) {
  if (window.fbStorage) {
    return window.fbStorage.get(key);
  }
  return null;
}

            </div>

        {/* FORGOT */}
        {mode==="forgot" && (
          <>
            <div style={{display:"flex",alignItems:"center",gap:"0.6rem",marginBottom:"1.2rem"}}>
              <button onClick={()=>switchMode("login")} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:"8px",padding:"0.3rem 0.7rem",color:"#fff",cursor:"pointer",fontSize:"0.8rem",fontFamily:"Tajawal,sans-serif"}}>← رجوع</button>

              {[1,2,3].map(s=><div key={s} style={{flex:1,height:4,borderRadius:2,background:fStep>=s?"#10b981":"rgba(255,255,255,0.15)",transition:"background 0.3s"}}/>)}

            {!fDone && fStep===1 && (<>
              <div style={{color:"rgba(255,255,255,0.6)",fontSize:"0.8rem",marginBottom:"1rem"}}>أدخل اسم المستخدم للبحث عن حسابك</div>

              {fErr && <p style={{color:"#f87171",fontSize:"0.76rem",marginBottom:"0.8rem",textAlign:"center"}}>{fErr}</p>}
              <button onClick={fCheckUser} style={{width:"100%",background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",borderRadius:"12px",padding:"0.85rem",color:"#fff",fontSize:"0.9rem",fontWeight:700,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>التالي ←</button>
            </>)}
            {!fDone && fStep===2 && fFound && (<>
              <div style={{background:"rgba(255,255,255,0.07)",borderRadius:"12px",padding:"0.9rem",marginBottom:"1rem"}}>
                <div style={{color:"rgba(255,255,255,0.5)",fontSize:"0.72rem",marginBottom:"4px"}}>السؤال السري</div>

              <div style={{marginBottom:"0.9rem"}}><label style={dLabel}>إجابتك</label><input value={fAns} onChange={e=>{setFAns(e.target.value);setFErr("");}} placeholder="اكتب الإجابة" style={darkInput} onKeyDown={e=>e.key==="Enter"&&fCheckAnswer()}/></div>

              <button onClick={fCheckAnswer} style={{width:"100%",background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",borderRadius:"12px",padding:"0.85rem",color:"#fff",fontSize:"0.9rem",fontWeight:700,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>التحقق ✓</button>
            </>)}
            {!fDone && fStep===3 && (<>

              <div style={{marginBottom:"0.9rem"}}><label style={dLabel}>تأكيد كلمة المرور</label><input type="password" value={fNew2} onChange={e=>{setFNew2(e.target.value);setFErr("");}} placeholder="أعد الكتابة" style={darkInput} onKeyDown={e=>e.key==="Enter"&&fResetPass()}/></div>
              {fErr && <p style={{color:"#f87171",fontSize:"0.76rem",marginBottom:"0.8rem",textAlign:"center"}}>{fErr}</p>}
              <button onClick={fResetPass} style={{width:"100%",background:"linear-gradient(135deg,#10b981,#059669)",border:"none",borderRadius:"12px",padding:"0.85rem",color:"#fff",fontSize:"0.9rem",fontWeight:700,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>حفظ كلمة المرور ✅</button>
            </>)}
            {fDone && (<div style={{textAlign:"center",padding:"1.5rem 0"}}>
              <div style={{fontSize:"3.5rem",marginBottom:"0.8rem"}}>🎉</div>
              <div style={{color:"#fff",fontSize:"1.1rem",fontWeight:800}}>تم تغيير كلمة المرور!</div>
              <div style={{color:"rgba(255,255,255,0.5)",fontSize:"0.82rem",marginTop:"0.5rem"}}>جارٍ العودة لتسجيل الدخول...</div>
            </div>)}
          </>
        )}

        {/* REGISTER */}
        {mode==="register" && !rDone && (
          <>
            {/* أدوار: teacher و admin فقط */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.5rem",marginBottom:"1.1rem"}}>
              {[{k:"teacher",icon:"👨‍🏫",label:"معلم",desc:"حجز • إضافة"},{k:"admin",icon:"⚙️",label:"إدارة",desc:"كامل الصلاحيات"}].map(r=>(
                <div key={r.k} onClick={()=>setRRole(r.k)} style={{borderRadius:"12px",padding:"0.75rem 0.5rem",cursor:"pointer",textAlign:"center",border:`2px solid ${rRole===r.k?"#60a5fa":"rgba(255,255,255,0.1)"}`,background:rRole===r.k?"rgba(96,165,250,0.12)":"rgba(255,255,255,0.03)",transition:"all 0.2s"}}>
                  <div style={{fontSize:"1.5rem",marginBottom:"3px"}}>{r.icon}</div>

                  <div style={{color:"rgba(255,255,255,0.35)",fontSize:"0.7rem",marginTop:"2px"}}>{r.desc}</div>

              ))}
            </div>
            <div style={{marginBottom:"0.8rem"}}><label style={dLabel}>الاسم الكامل</label><input value={rName} onChange={e=>{setRName(e.target.value);setRErr("");}} placeholder="مثال: أ. عماد عبدالفتاح" style={darkInput}/></div>
            <div style={{marginBottom:"0.8rem"}}><label style={dLabel}>اسم المستخدم</label><input value={rUser} onChange={e=>{setRUser(e.target.value.replace(/\s/g,""));setRErr("");}} placeholder="بالإنجليزية بدون مسافات" style={darkInput}/></div>
            {rRole==="teacher" && (
              <div style={{marginBottom:"0.8rem"}}><label style={dLabel}>القسم</label>
                <select value={rDept} onChange={e=>setRDept(e.target.value)} style={{...darkInput,cursor:"pointer"}}>
                  {DEPTS.map(d=><option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
                </select>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.7rem",marginBottom:"0.8rem"}}>
              <div><label style={dLabel}>كلمة المرور</label><input type="password" value={rPass} onChange={e=>{setRPass(e.target.value);setRErr("");}} placeholder="٤ أحرف+" style={darkInput}/></div>
              <div><label style={dLabel}>تأكيدها</label><input type="password" value={rPass2} onChange={e=>{setRPass2(e.target.value);setRErr("");}} placeholder="أعد الكتابة" style={darkInput}/></div>
            </div>
            <div style={{background:"rgba(251,191,36,0.08)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:"12px",padding:"0.9rem",marginBottom:"0.8rem"}}>
              <div style={{color:"#fbbf24",fontSize:"0.78rem",fontWeight:700,marginBottom:"0.5rem"}}>🔐 كود التسجيل ({rRole==="teacher"?"للمعلمين":"للإدارة"})</div>
              <input value={rCode} onChange={e=>{setRCode(e.target.value);setRErr("");}} placeholder="أدخل الكود السري" style={darkInput}/>
            </div>
            <div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"12px",padding:"0.9rem",marginBottom:"0.9rem"}}>
              <div style={{color:"#fbbf24",fontSize:"0.78rem",fontWeight:700,marginBottom:"0.6rem"}}>🔑 سؤال الأمان</div>
              <div style={{marginBottom:"0.7rem"}}><label style={dLabel}>اختر السؤال</label>
                <select value={rQ} onChange={e=>setRQ(e.target.value)} style={{...darkInput,cursor:"pointer"}}>
                  {SECRET_QUESTIONS.map(q=><option key={q} value={q}>{q}</option>)}
                </select>
              </div>
              <div><label style={dLabel}>الإجابة السرية</label><input value={rA} onChange={e=>{setRa(e.target.value);setRErr("");}} placeholder="إجابتك السرية" style={darkInput}/></div>
            </div>
            {rErr && <p style={{color:"#f87171",fontSize:"0.76rem",marginBottom:"0.8rem",textAlign:"center"}}>{rErr}</p>}
            <button onClick={doRegister} style={{width:"100%",background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",borderRadius:"12px",padding:"0.85rem",color:"#fff",fontSize:"0.95rem",fontWeight:700,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>إنشاء الحساب ✨</button>
            <p style={{color:"rgba(255,255,255,0.4)",fontSize:"0.73rem",textAlign:"center",marginTop:"1rem"}}>لديك حساب؟ <span onClick={()=>switchMode("login")} style={{color:"#34d399",cursor:"pointer",textDecoration:"underline"}}>سجّل دخولك</span></p>
          </>
        )}
        {mode==="register" && rDone && (
          <div style={{textAlign:"center",padding:"1.5rem 0"}}>
            <div style={{fontSize:"3.5rem",marginBottom:"0.8rem"}}>🎉</div>
            <div style={{color:"#fff",fontSize:"1.1rem",fontWeight:800,marginBottom:"0.4rem"}}>تم إنشاء حسابك!</div>
            <div style={{height:4,background:"rgba(255,255,255,0.1)",borderRadius:"2px",overflow:"hidden",marginTop:"1rem"}}>
              <div style={{height:"100%",background:"#10b981",borderRadius:"2px",animation:"fill 1.8s linear forwards"}}/>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   HOME SCREEN
══════════════════════════════════════════════════ */
function HomeScreen({ user, tools, requests, onNav }) {
  const top = [...tools].sort((a,b)=>b.usageCount-a.usageCount).slice(0,3);
  const myPendingRequests = requests.filter(r=>r.requesterId===user.id && r.status==="pending");
  const availableCount = tools.filter(t=>t.status==="available").length;
  const borrowedCount  = tools.filter(t=>t.status==="borrowed").length;
  const inuseCount     = tools.filter(t=>t.status==="inuse").length;
  const repairCount    = tools.filter(t=>t.status==="repair").length;

  return (
    <div style={{padding:"1.2rem",paddingBottom:"5.5rem"}}>
      {/* Welcome Banner */}
      <div style={{background:"linear-gradient(135deg,#1e3a5f,#0f4c3a)",borderRadius:"20px",padding:"1.5rem",marginBottom:"1.2rem",position:"relative",overflow:"hidden",textAlign:"center"}}>
        <div style={{position:"absolute",left:"-1rem",top:"-1rem",fontSize:"8rem",opacity:0.06}}>📚</div>
        <div style={{color:"rgba(255,255,255,0.65)",fontSize:"0.82rem",marginBottom:"4px"}}>👋 مرحباً، {user.name}</div>
        <div style={{color:"#fff",fontSize:"1.4rem",fontWeight:900,marginBottom:"0.5rem",letterSpacing:"-0.3px"}}>بنك الوسائل التعليمية</div>
        <div style={{color:"rgba(255,255,255,0.55)",fontSize:"0.75rem",lineHeight:1.7,maxWidth:340,margin:"0 auto"}}>
          منصة رقمية تفاعلية تهدف إلى تنظيم وإدارة ومشاركة الوسائل التعليمية بين المعلمين داخل المؤسسة التعليمية، حيث تتيح إضافة الوسائل، تصفحها، حجزها، ومتابعة حالتها، بالإضافة إلى تقييمها وتبادل الخبرات، بما يسهم في تحسين جودة العملية التعليمية.
        </div>
      </div>

      {/* طلباتي المعلقة */}
      {myPendingRequests.length > 0 && (
        <div onClick={()=>onNav("notifs")} style={{background:"#fffbeb",border:"1.5px solid #f59e0b66",borderRadius:"16px",padding:"0.9rem 1rem",marginBottom:"1.2rem",cursor:"pointer",display:"flex",alignItems:"center",gap:"0.8rem"}}>
          <span style={{fontSize:"1.5rem"}}>⏳</span>
          <div>
            <div style={{fontSize:"0.88rem",fontWeight:700,color:"#92400e"}}>لديك {myPendingRequests.length} طلب حجز معلق</div>
            <div style={{fontSize:"0.75rem",color:"#78350f"}}>اضغط لمتابعة الطلبات</div>
          </div>
        </div>
      )}

      {/* الأقسام */}
      <div style={{marginBottom:"1.2rem"}}>
        <div style={{fontSize:"0.9rem",fontWeight:700,color:"#0f172a",marginBottom:"0.8rem"}}>📂 أقسام الوسائل</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.6rem"}}>
          {DEPTS.map(d=>{
            const count = tools.filter(t=>t.dept===d.id).length;
            return (
              <div key={d.id} onClick={()=>onNav("tools",{dept:d.id})} style={{background:d.light,borderRadius:"14px",padding:"0.9rem",cursor:"pointer",border:`1.5px solid ${d.color}22`}}>
                <div style={{fontSize:"1.5rem",marginBottom:"4px"}}>{d.icon}</div>
                <div style={{fontSize:"0.85rem",fontWeight:700,color:d.color}}>{d.name}</div>
                <div style={{fontSize:"0.72rem",color:"#9ca3af",marginTop:"2px"}}>{count} وسيلة</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* حالة الوسائل */}
      <div style={{background:"#fff",borderRadius:"18px",padding:"1.2rem",boxShadow:"0 4px 20px rgba(0,0,0,0.06)",marginBottom:"1.2rem"}}>
        <div style={{fontSize:"0.9rem",fontWeight:700,color:"#0f172a",marginBottom:"0.9rem"}}>📊 حالة الوسائل</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"0.4rem",marginBottom:"0.9rem"}}>
          {[
            {label:"الإجمالي",val:tools.length,color:"#0f172a",bg:"#f9fafb"},
            {label:"متاحة",val:availableCount,color:"#10b981",bg:"#ecfdf5"},
            {label:"مستعارة",val:borrowedCount,color:"#f59e0b",bg:"#fffbeb"},
            {label:"قيد الاستخدام",val:inuseCount,color:"#3b82f6",bg:"#eff6ff"},
            {label:"تحتاج صيانة",val:repairCount,color:"#ef4444",bg:"#fef2f2"},
          ].map(s=>(
            <div key={s.label} style={{background:s.bg,borderRadius:"10px",padding:"0.6rem 0.3rem",textAlign:"center"}}>
              <div style={{fontSize:"1.2rem",fontWeight:900,color:s.color}}>{s.val}</div>
              <div style={{fontSize:"0.58rem",color:"#9ca3af",marginTop:"2px",lineHeight:1.3}}>{s.label}</div>
            </div>
          ))}
        </div>
        {tools.length>0 && <div style={{height:8,borderRadius:4,overflow:"hidden",display:"flex",gap:2}}>
          {[[availableCount,"#10b981"],[borrowedCount,"#f59e0b"],[inuseCount,"#3b82f6"],[repairCount,"#ef4444"]].map(([v,c],i)=>
            v>0?<div key={i} style={{flex:v/tools.length,background:c,transition:"flex 0.5s"}}/>:null
          )}
        </div>}
      </div>

      {/* أكثر الوسائل استخداماً — للأدمن فقط */}
      {user.role==="admin" && (
      <div style={{background:"#fff",borderRadius:"18px",padding:"1.2rem",boxShadow:"0 4px 20px rgba(0,0,0,0.08)",marginBottom:"1.2rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.9rem"}}>
          <div style={{fontSize:"0.9rem",fontWeight:700,color:"#0f172a"}}>🏆 أكثر الوسائل استخداماً</div>
          <span onClick={()=>onNav("tools")} style={{fontSize:"0.72rem",color:"#6366f1",cursor:"pointer",fontWeight:600}}>عرض الكل ←</span>
        </div>
        {top.map((t,i)=>{
          const d = DEPTS.find(x=>x.id===t.dept)||DEPTS[0];
          return (
            <div key={t.id} onClick={()=>onNav("detail",{tool:t})} style={{display:"flex",alignItems:"center",gap:"0.8rem",padding:"0.7rem 0",borderBottom:i<top.length-1?"1px solid #f3f4f6":"none",cursor:"pointer"}}>
              <div style={{width:32,height:32,borderRadius:"8px",background:d.light,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem"}}>{t.img}</div>
              <div style={{flex:1}}><div style={{fontSize:"0.85rem",fontWeight:600,color:"#1f2937"}}>{t.name}</div><Stars val={t.rating}/></div>
              <div style={{fontSize:"0.75rem",color:"#9ca3af"}}>{t.usageCount}×</div>
            </div>
          );
        })}
      </div>
      )}

      {/* تعليمات الاستخدام */}
      <div style={{background:"linear-gradient(135deg,#1e3a5f,#0f4c3a)",borderRadius:"18px",padding:"1.2rem"}}>
        <div style={{fontSize:"0.9rem",fontWeight:700,color:"#fff",marginBottom:"0.8rem"}}>📋 تعليمات الاستخدام</div>
        {[
          "ابحث عن الوسيلة من خلال قسم الوسائل",
          "تحقق من حالة الوسيلة قبل الحجز",
          "احجز الوسيلة وانتظر التأكيد",
          "سلّم الوسيلة في الوقت المحدد",
        ].map((s,i)=>(
          <div key={i} style={{display:"flex",gap:"0.6rem",alignItems:"flex-start",marginBottom:"0.6rem"}}>
            <span style={{background:"rgba(255,255,255,0.2)",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.7rem",color:"#fff",flexShrink:0,fontWeight:700}}>{i+1}</span>
            <span style={{color:"rgba(255,255,255,0.85)",fontSize:"0.82rem",lineHeight:1.5}}>{s}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   TOOLS LIST SCREEN
══════════════════════════════════════════════════ */
function ToolsScreen({ user, tools, initDept, onNav, allTags }) {
  const [search, setSearch] = useState("");
  const [dept,   setDept]   = useState(initDept||"all");
  const [status, setStatus] = useState("all");
  const [tag,    setTag]    = useState("الكل");

  // جميع الوسائل مرئية للجميع — لا فلترة حسب المستخدم
  const filtered = useMemo(()=>tools.filter(t=>{
    if (dept!=="all"   && t.dept!==dept)          return false;
    if (status!=="all" && t.status!==status)      return false;
    if (tag!=="الكل"   && !t.tags.includes(tag))  return false;
    if (search && !t.name.includes(search) && !t.tags.some(tg=>tg.includes(search)) && !(t.desc||"").includes(search) && !(t.teacher||"").includes(search)) return false;
    return true;
  }),[tools,dept,status,tag,search]);

  return (
    <div style={{paddingBottom:"5.5rem"}}>
      <div style={{background:"#0f172a",padding:"1rem 1.2rem 1.2rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.8rem"}}>
          <div style={{color:"#fff",fontSize:"1rem",fontWeight:700}}>🔍 استكشاف الوسائل</div>
          {(user.role==="teacher"||user.role==="admin") && (
            <button onClick={()=>onNav("addtool")} style={{background:"linear-gradient(135deg,#10b981,#059669)",border:"none",borderRadius:"10px",padding:"0.4rem 0.9rem",color:"#fff",fontSize:"0.8rem",fontWeight:700,cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>➕ إضافة وسيلة</button>
          )}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="ابحث عن وسيلة..."
          style={{width:"100%",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:"12px",padding:"0.7rem 1rem",color:"#fff",fontSize:"0.9rem",outline:"none",fontFamily:"Tajawal,sans-serif"}}/>
      </div>

      {/* Dept filter */}
      <div style={{background:"#fff",borderBottom:"1px solid #f3f4f6",padding:"0.8rem 1.2rem"}}>
        <div style={{display:"flex",gap:"0.5rem",overflowX:"auto",paddingBottom:"0.5rem",marginBottom:"0.5rem"}}>
          {[{id:"all",name:"الكل",icon:"📋"},...DEPTS].map(d=>(
            <button key={d.id} onClick={()=>setDept(d.id)} style={{flexShrink:0,background:dept===d.id?"#0f172a":"#f3f4f6",color:dept===d.id?"#fff":"#6b7280",border:"none",borderRadius:"100px",padding:"0.3rem 0.9rem",fontSize:"0.75rem",cursor:"pointer",fontWeight:dept===d.id?700:400,fontFamily:"Tajawal,sans-serif"}}>{d.icon} {d.name}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:"0.4rem",overflowX:"auto"}}>
          {[{k:"all",label:"جميع الحالات"},...Object.entries(STATUS).map(([k,v])=>({k,label:v.label}))].map(s=>(
            <button key={s.k} onClick={()=>setStatus(s.k)} style={{flexShrink:0,background:status===s.k?"#10b981":"#f3f4f6",color:status===s.k?"#fff":"#6b7280",border:"none",borderRadius:"100px",padding:"0.25rem 0.8rem",fontSize:"0.7rem",cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>{s.label}</button>
          ))}
        </div>
      </div>

      {/* Tag filter */}
      <div style={{padding:"0.6rem 1.2rem",display:"flex",gap:"0.4rem",overflowX:"auto",background:"#fafafa",borderBottom:"1px solid #f3f4f6"}}>
        {(allTags||INIT_TAGS).map(t=>(
          <button key={t} onClick={()=>setTag(t)} style={{flexShrink:0,background:tag===t?"#6366f1":"transparent",color:tag===t?"#fff":"#9ca3af",border:`1px solid ${tag===t?"#6366f1":"#e5e7eb"}`,borderRadius:"100px",padding:"0.2rem 0.7rem",fontSize:"0.72rem",cursor:"pointer",fontFamily:"Tajawal,sans-serif"}}>{t}</button>
        ))}
      </div>

      <div style={{padding:"0.6rem 1.2rem",fontSize:"0.75rem",color:"#9ca3af"}}>{filtered.length} وسيلة</div>

      <div style={{padding:"0 1.2rem",display:"grid",gap:"0.9rem"}}>
        {filtered.map(t=>{
          const d = DEPTS.find(x=>x.id===t.dept)||DEPTS[0];
          return (
            <div key={t.id} onClick={()=>onNav("detail",{tool:t})} style={{background:"#fff",borderRadius:"16px",padding:"1rem",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",border:"1.5px solid #f3f4f6",cursor:"pointer",display:"flex",gap:"0.9rem",alignItems:"flex-start"}}>
              <div style={{width:54,height:54,borderRadius:"14px",background:d.light,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.8rem",flexShrink:0,overflow:"hidden"}}>
                {(t.photos&&t.photos[0]) ? <img src={t.photos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : t.img}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"4px"}}>
                  <div style={{fontSize:"0.95rem",fontWeight:700,color:"#1f2937"}}>{t.name}</div>
                  <StatusBadge status={t.status}/>
                </div>
                <div style={{fontSize:"0.72rem",color:"#9ca3af",marginBottom:"4px"}}>{t.teacher} • {d.icon} {d.name}</div>
                <Stars val={t.rating}/>
                <div style={{display:"flex",gap:"0.3rem",flexWrap:"wrap",marginTop:"6px"}}>
                  {(t.tags||[]).map(tg=><span key={tg} style={{background:"#f3f4f6",color:"#6b7280",borderRadius:"6px",padding:"1px 6px",fontSize:"0.65rem"}}>{tg}</span>)}
                </div>
              </div>
            </div>
          );
        })}
        {filtered.length===0 && <div style={{textAlign:"center",padding:"3rem",color:"#9ca3af"}}><div style={{fontSize:"3rem"}}>🔍</div><div>لا توجد نتائج</div></div>}
      </div>
    </div>
  );
}
