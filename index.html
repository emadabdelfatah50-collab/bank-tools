  <!-- Storage: localStorage فوري + Firebase مزامنة اختيارية -->
  <script>
    // ✅ localStorage يشتغل فوراً بدون إنترنت
    window.storage = {
      get: async function(key) {
        try {
          const val = localStorage.getItem(key);
          return val ? { value: val } : null;
        } catch(e) { return null; }
      },
      set: async function(key, value) {
        try {
          localStorage.setItem(key, value);
          // مزامنة مع Firebase في الخلفية لو متاح
          if (window._fbStorage) window._fbStorage.set(key, value).catch(()=>{});
          return { key, value };
        } catch(e) { return null; }
      },
      delete: async function(key) {
        try {
          localStorage.removeItem(key);
          if (window._fbStorage) window._fbStorage.delete(key).catch(()=>{});
          return { key, deleted: true };
        } catch(e) { return null; }
      },
      list: async function(prefix) {
        try {
          const keys = Object.keys(localStorage).filter(k=>!prefix||k.startsWith(prefix));
          return { keys };
        } catch(e) { return { keys: [] }; }
      }
    };
  </script>

  <!-- Firebase SDK: اختياري للمزامنة بين الأجهزة -->
  <script type="module">
    try {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      const { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

      const firebaseConfig = {
        apiKey: "AIzaSyC7-REyPo1mfvNT_0nhVg4LMkzl-e3NAxM",
        authDomain: "bank-tools-bb29b.firebaseapp.com",
        projectId: "bank-tools-bb29b",
        storageBucket: "bank-tools-bb29b.firebasestorage.app",
        messagingSenderId: "377303084142",
        appId: "1:377303084142:web:01d56d23caa3baae97ca7f"
      };

      const app = initializeApp(firebaseConfig);
      const db  = getFirestore(app);

      const encode = (key) => key.replace(/:/g,"__COLON__");
      const decode = (id)  => id.replace(/__COLON__/g,":");

      // Firebase storage للمزامنة فقط
      window._fbStorage = {
        get: async (key) => {
          const snap = await getDoc(doc(db, "appdata", encode(key)));
          return snap.exists() ? { value: snap.data().value } : null;
        },
        set: async (key, value) => {
          await setDoc(doc(db, "appdata", encode(key)), { value });
        },
        delete: async (key) => {
          await deleteDoc(doc(db, "appdata", encode(key)));
        }
      };

      // مزامنة البيانات من Firebase لـ localStorage عند أول تحميل
      const syncFromFirebase = async () => {
        const keys = ["app:users","app:tools","app:notifications","app:tags","app:currentUser"];
        for (const key of keys) {
          try {
            const remote = await window._fbStorage.get(key);
            if (remote) localStorage.setItem(key, remote.value);
          } catch(e) {}
        }
        window.dispatchEvent(new Event("firebaseSynced"));
      };
      syncFromFirebase();

    } catch(e) {
      console.log("Firebase غير متاح — التطبيق يعمل بـ localStorage فقط");
    }
  </script>

              <>
                <div style={{ color:"rgba(255,255,255,0.6)", fontSize:"0.8rem", marginBottom:"1rem" }}>أدخل اسم المستخدم للبحث عن حسابك</div>
                <div style={{ marginBottom:"0.9rem" }}>
                  <label style={dLabel}>اسم المستخدم</label>
                  <input value={fUser} onChange={e=>{setFUser(e.target.value);setFErr("");}} placeholder="اسم المستخدم" style={darkInput} onKeyDown={e=>e.key==="Enter"&&fCheckUser()}/>
                </div>
                {fErr && <p style={{ color:"#f87171", fontSize:"0.76rem", marginBottom:"0.8rem", textAlign:"center" }}>{fErr}</p>}
                <button onClick={fCheckUser} style={{ width:"100%", background:"linear-gradient(135deg,#6366f1,#4f46e5)", border:"none", borderRadius:"12px", padding:"0.85rem", color:"#fff", fontSize:"0.9rem", fontWeight:700, cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>التالي ←</button>
              </>
            )}

            {!fDone && fStep===2 && fFound && (
              <>
                <div style={{ background:"rgba(255,255,255,0.07)", borderRadius:"12px", padding:"0.9rem", marginBottom:"1rem" }}>
                  <div style={{ color:"rgba(255,255,255,0.5)", fontSize:"0.72rem", marginBottom:"4px" }}>السؤال السري</div>
                  <div style={{ color:"#fff", fontSize:"0.9rem", fontWeight:600 }}>❓ {fFound.secretQ}</div>
                </div>
                <div style={{ marginBottom:"0.9rem" }}>
                  <label style={dLabel}>إجابتك</label>
                  <input value={fAns} onChange={e=>{setFAns(e.target.value);setFErr("");}} placeholder="اكتب الإجابة" style={darkInput} onKeyDown={e=>e.key==="Enter"&&fCheckAnswer()}/>
                </div>
                {fErr && <p style={{ color:"#f87171", fontSize:"0.76rem", marginBottom:"0.8rem", textAlign:"center" }}>{fErr}</p>}
                <button onClick={fCheckAnswer} style={{ width:"100%", background:"linear-gradient(135deg,#6366f1,#4f46e5)", border:"none", borderRadius:"12px", padding:"0.85rem", color:"#fff", fontSize:"0.9rem", fontWeight:700, cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>التحقق ✓</button>
              </>
            )}

            {!fDone && fStep===3 && (
              <>
                <div style={{ color:"rgba(255,255,255,0.6)", fontSize:"0.8rem", marginBottom:"1rem" }}>✅ تم التحقق! أدخل كلمة مرور جديدة</div>
                <div style={{ marginBottom:"0.8rem" }}>
                  <label style={dLabel}>كلمة المرور الجديدة</label>
                  <input type="password" value={fNew} onChange={e=>{setFNew(e.target.value);setFErr("");}} placeholder="٤ أحرف على الأقل" style={darkInput}/>
                </div>
                <div style={{ marginBottom:"0.9rem" }}>
                  <label style={dLabel}>تأكيد كلمة المرور</label>
                  <input type="password" value={fNew2} onChange={e=>{setFNew2(e.target.value);setFErr("");}} placeholder="أعد الكتابة" style={darkInput} onKeyDown={e=>e.key==="Enter"&&fResetPass()}/>
                </div>
                {fErr && <p style={{ color:"#f87171", fontSize:"0.76rem", marginBottom:"0.8rem", textAlign:"center" }}>{fErr}</p>}
                <button onClick={fResetPass} style={{ width:"100%", background:"linear-gradient(135deg,#10b981,#059669)", border:"none", borderRadius:"12px", padding:"0.85rem", color:"#fff", fontSize:"0.9rem", fontWeight:700, cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>حفظ كلمة المرور ✅</button>
              </>
            )}

            {fDone && (
              <div style={{ textAlign:"center", padding:"1.5rem 0" }}>
                <div style={{ fontSize:"3.5rem", marginBottom:"0.8rem", animation:"pop 0.4s ease" }}>🎉</div>
                <div style={{ color:"#fff", fontSize:"1.1rem", fontWeight:800 }}>تم تغيير كلمة المرور!</div>
                <div style={{ color:"rgba(255,255,255,0.5)", fontSize:"0.82rem", marginTop:"0.5rem" }}>جارٍ العودة لتسجيل الدخول...</div>
              </div>
            )}
          </>
        )}

        {/* ── REGISTER ── */}
        {mode==="register" && !rDone && (
          <>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"0.5rem", marginBottom:"1.1rem" }}>
              {[{k:"teacher",icon:"👨‍🏫",label:"معلم",desc:"حجز • إضافة"},{k:"parent",icon:"👨‍👩‍👧",label:"ولي أمر",desc:"استعارة • عرض"},{k:"admin",icon:"⚙️",label:"إدارة",desc:"كامل الصلاحيات"}].map(r=>(
                <div key={r.k} onClick={()=>setRRole(r.k)}
                  style={{ borderRadius:"12px", padding:"0.75rem 0.5rem", cursor:"pointer", textAlign:"center", border:`2px solid ${rRole===r.k?"#60a5fa":"rgba(255,255,255,0.1)"}`, background:rRole===r.k?"rgba(96,165,250,0.12)":"rgba(255,255,255,0.03)", transition:"all 0.2s" }}>
                  <div style={{ fontSize:"1.3rem", marginBottom:"3px" }}>{r.icon}</div>
                  <div style={{ color:rRole===r.k?"#fff":"rgba(255,255,255,0.7)", fontWeight:700, fontSize:"0.78rem" }}>{r.label}</div>
                  <div style={{ color:"rgba(255,255,255,0.35)", fontSize:"0.58rem", marginTop:"2px" }}>{r.desc}</div>
                </div>
              ))}
            </div>
            <div style={{ marginBottom:"0.8rem" }}><label style={dLabel}>الاسم الكامل</label><input value={rName} onChange={e=>{setRName(e.target.value);setRErr("");}} placeholder="مثال: أ. عماد عبدالفتاح" style={darkInput} /></div>
            <div style={{ marginBottom:"0.8rem" }}><label style={dLabel}>اسم المستخدم</label><input value={rUser} onChange={e=>{setRUser(e.target.value.replace(/\s/g,""));setRErr("");}} placeholder="اكتب اسمك بالإنجليزية بدون مسافات" style={darkInput} /></div>
            {rRole==="teacher" && (
              <div style={{ marginBottom:"0.8rem" }}><label style={dLabel}>القسم</label>
                <select value={rDept} onChange={e=>setRDept(e.target.value)} style={{...darkInput,cursor:"pointer"}}>
                  {DEPTS.map(d=><option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
                </select>
              </div>
            )}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.7rem", marginBottom:"0.8rem" }}>
              <div><label style={dLabel}>كلمة المرور</label><input type="password" value={rPass} onChange={e=>{setRPass(e.target.value);setRErr("");}} placeholder="٤ أحرف+" style={darkInput} /></div>
              <div><label style={dLabel}>تأكيد كلمة المرور</label><input type="password" value={rPass2} onChange={e=>{setRPass2(e.target.value);setRErr("");}} placeholder="أعد الكتابة" style={darkInput} /></div>
            </div>
            {/* Registration Code for teacher/admin */}
            {(rRole==="teacher"||rRole==="admin") && (
              <div style={{ background:"rgba(251,191,36,0.08)", border:"1px solid rgba(251,191,36,0.3)", borderRadius:"12px", padding:"0.9rem", marginBottom:"0.8rem" }}>
                <div style={{ color:"#fbbf24", fontSize:"0.78rem", fontWeight:700, marginBottom:"0.5rem" }}>🔐 كود التسجيل ({rRole==="teacher"?"للمعلمين":"للإدارة"})</div>
                <input value={rCode} onChange={e=>{setRCode(e.target.value);setRErr("");}} placeholder="أدخل الكود السري" style={darkInput}/>
              </div>
            )}
            {/* Secret Question */}
            <div style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"12px", padding:"0.9rem", marginBottom:"0.9rem" }}>
              <div style={{ color:"#fbbf24", fontSize:"0.78rem", fontWeight:700, marginBottom:"0.6rem" }}>🔑 سؤال الأمان (لاسترجاع كلمة المرور)</div>
              <div style={{ marginBottom:"0.7rem" }}>
                <label style={dLabel}>اختر السؤال</label>
                <select value={rQ} onChange={e=>setRQ(e.target.value)} style={{...darkInput,cursor:"pointer"}}>
                  {SECRET_QUESTIONS.map(q=><option key={q} value={q}>{q}</option>)}
                </select>
              </div>
              <div>
                <label style={dLabel}>الإجابة السرية</label>
                <input value={rA} onChange={e=>{setRa(e.target.value);setRErr("");}} placeholder="إجابتك السرية" style={darkInput}/>
              </div>
            </div>
            {rErr && <p style={{ color:"#f87171", fontSize:"0.76rem", marginBottom:"0.8rem", textAlign:"center" }}>{rErr}</p>}
            <button onClick={doRegister} style={{ width:"100%", background:"linear-gradient(135deg,#6366f1,#4f46e5)", border:"none", borderRadius:"12px", padding:"0.85rem", color:"#fff", fontSize:"0.95rem", fontWeight:700, cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>إنشاء الحساب ✨</button>
            <p style={{ color:"rgba(255,255,255,0.4)", fontSize:"0.73rem", textAlign:"center", marginTop:"1rem" }}>لديك حساب؟ <span onClick={()=>switchMode("login")} style={{ color:"#34d399", cursor:"pointer", textDecoration:"underline" }}>سجّل دخولك</span></p>
          </>
        )}

        {mode==="register" && rDone && (
          <div style={{ textAlign:"center", padding:"1.5rem 0" }}>
            <div style={{ fontSize:"3.5rem", marginBottom:"0.8rem", animation:"pop 0.4s ease" }}>🎉</div>
            <div style={{ color:"#fff", fontSize:"1.1rem", fontWeight:800, marginBottom:"0.4rem" }}>تم إنشاء حسابك!</div>
            <div style={{ color:"rgba(255,255,255,0.5)", fontSize:"0.82rem", marginBottom:"1rem" }}>جارٍ تسجيل الدخول...</div>
            <div style={{ height:4, background:"rgba(255,255,255,0.1)", borderRadius:"2px", overflow:"hidden" }}>
              <div style={{ height:"100%", background:"#10b981", borderRadius:"2px", animation:"fill 1.8s linear forwards" }} />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════ HOME ═══════════════════ */
function HomeScreen({ user, tools, onNav }) {
  const avail    = tools.filter(t=>t.status==="available").length;
  const borrowed = tools.filter(t=>t.status==="borrowed").length;
  const inuse    = tools.filter(t=>t.status==="inuse").length;
  const repair   = tools.filter(t=>t.status==="repair").length;
  const top   = [...tools].sort((a,b)=>b.usageCount-a.usageCount).slice(0,5);
  const firstName = user.name.split(" ").find(w=>w!=="أ."&&w!=="أم")||user.name.split(" ")[0];
  return (
    <div style={{ paddingBottom:"5rem" }}>
      <div style={{ background:"linear-gradient(135deg,#0f172a,#1e3a5f)", padding:"2rem 1.5rem 3rem", position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", inset:0, background:"radial-gradient(ellipse at 20% 80%,rgba(16,185,129,0.2),transparent 60%)" }} />
        <div style={{ position:"absolute", right:"-20px", top:"-20px", fontSize:"8rem", opacity:0.05 }}>📚</div>
        <div style={{ position:"relative" }}>
          <div style={{ color:"rgba(255,255,255,0.6)", fontSize:"0.8rem", marginBottom:"4px" }}>مرحباً، {firstName} 👋</div>
          <div style={{ color:"#fff", fontSize:"1.5rem", fontWeight:900, lineHeight:1.2, marginBottom:"1.2rem" }}>بنك الوسائل<br/>التعليمية</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.5rem" }}>
            {[{val:avail,label:"متاحة",color:"#34d399"},{val:borrowed,label:"مستعارة",color:"#fbbf24"},{val:inuse,label:"قيد الاستخدام",color:"#60a5fa"},{val:repair,label:"تحتاج صيانة",color:"#f87171"}].map(s=>(
              <div key={s.label} style={{ background:"rgba(255,255,255,0.1)", borderRadius:"12px", padding:"0.5rem 0.8rem", textAlign:"center" }}>
                <div style={{ color:s.color, fontSize:"1.3rem", fontWeight:900 }}>{s.val}</div>
                <div style={{ color:"rgba(255,255,255,0.6)", fontSize:"0.65rem" }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{ padding:"1.2rem 1.2rem 0", marginTop:"-1rem" }}>
        <div style={{ background:"#fff", borderRadius:"18px", padding:"1.2rem", boxShadow:"0 4px 20px rgba(0,0,0,0.08)", marginBottom:"1.2rem" }}>
          <div style={{ fontSize:"0.9rem", fontWeight:700, color:"#0f172a", marginBottom:"0.9rem" }}>الأقسام الأربعة</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.7rem" }}>
            {DEPTS.map(d=>(
              <div key={d.id} onClick={()=>onNav("tools",{dept:d.id})} style={{ background:d.light, borderRadius:"14px", padding:"1rem 0.8rem", cursor:"pointer", border:`1.5px solid ${d.color}22`, display:"flex", alignItems:"center", gap:"0.6rem" }}>
                <span style={{ fontSize:"1.4rem" }}>{d.icon}</span>
                <div>
                  <div style={{ fontSize:"0.78rem", fontWeight:700, color:d.color }}>{d.name}</div>
                  <div style={{ fontSize:"0.65rem", color:"#9ca3af" }}>{tools.filter(t=>t.dept===d.id).length} وسيلة</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Parent: quick borrow guide */}
        {user.role==="parent" && (
          <div style={{ background:"linear-gradient(135deg,#f0fdf4,#dcfce7)", border:"1.5px solid #86efac", borderRadius:"18px", padding:"1.2rem", marginBottom:"1.2rem" }}>
            <div style={{ fontSize:"0.9rem", fontWeight:700, color:"#065f46", marginBottom:"0.7rem" }}>👨‍👩‍👧 دليل ولي الأمر</div>
            {["تصفح الوسائل من قائمة الوسائل","اختر وسيلة متاحة واضغط استعارة","أو أرسل طلب للمعلم إذا كانت مشغولة","تابع طلباتك من قسم الإشعارات"].map((s,i)=>(
              <div key={i} style={{ display:"flex", gap:"0.6rem", alignItems:"flex-start", marginBottom:"0.5rem" }}>
                <span style={{ background:"#10b981", borderRadius:"50%", width:20, height:20, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"0.65rem", color:"#fff", flexShrink:0, fontWeight:700 }}>{i+1}</span>
                <span style={{ color:"#065f46", fontSize:"0.8rem" }}>{s}</span>
              </div>
            ))}
          </div>
        )}

        <div style={{ background:"#fff", borderRadius:"18px", padding:"1.2rem", boxShadow:"0 4px 20px rgba(0,0,0,0.08)", marginBottom:"1.2rem" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"0.9rem" }}>
            <div style={{ fontSize:"0.9rem", fontWeight:700, color:"#0f172a" }}>🏆 أكثر الوسائل استخداماً</div>
            <span onClick={()=>onNav("tools")} style={{ fontSize:"0.72rem", color:"#6366f1", cursor:"pointer", fontWeight:600 }}>عرض الكل ←</span>

            const d=DEPTS.find(x=>x.id===t.dept)||DEPTS[0];
            return (
              <div key={t.id} onClick={()=>onNav("detail",{tool:t})} style={{ display:"flex", alignItems:"center", gap:"0.8rem", padding:"0.7rem 0", borderBottom:i<top.length-1?"1px solid #f3f4f6":"none", cursor:"pointer" }}>
                <div style={{ width:28, height:28, borderRadius:"8px", background:d.light, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"1rem" }}>{t.img}</div>
                <div style={{ flex:1 }}><div style={{ fontSize:"0.85rem", fontWeight:600, color:"#1f2937" }}>{t.name}</div><Stars val={t.rating}/></div>
                <div style={{ fontSize:"0.75rem", color:"#9ca3af" }}>{t.usageCount}× استخدام</div>
              </div>
            );
          })}
        </div>

        {user.role!=="parent" && (
          <div style={{ background:"linear-gradient(135deg,#1e3a5f,#0f4c3a)", borderRadius:"18px", padding:"1.2rem", marginBottom:"1.2rem" }}>
            <div style={{ fontSize:"0.9rem", fontWeight:700, color:"#fff", marginBottom:"0.7rem" }}>📋 تعليمات الاستخدام</div>
            {["ابحث عن الوسيلة من خلال قسم الاستكشاف","تحقق من حالة الوسيلة قبل الحجز","احجز الوسيلة وانتظر التأكيد","سلّم الوسيلة في الوقت المحدد"].map((s,i)=>(
              <div key={i} style={{ display:"flex", gap:"0.6rem", alignItems:"flex-start", marginBottom:"0.5rem" }}>
                <span style={{ background:"rgba(255,255,255,0.2)", borderRadius:"50%", width:20, height:20, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"0.65rem", color:"#fff", flexShrink:0 }}>{i+1}</span>
                <span style={{ color:"rgba(255,255,255,0.8)", fontSize:"0.8rem" }}>{s}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════ TOOLS ═══════════════════ */
function ToolsScreen({ user, tools, initDept, onNav, allTags }) {
  const [search,setSearch] = useState("");
  const [dept,  setDept]   = useState(initDept||"all");
  const [status,setStatus] = useState("all");
  const [tag,   setTag]    = useState("الكل");

  const filtered = useMemo(()=>tools.filter(t=>{
    if (dept!=="all"  && t.dept!==dept)          return false;
    if (status!=="all"&& t.status!==status)      return false;
    if (tag!=="الكل"  && !t.tags.includes(tag))  return false;
    if (search && !t.name.includes(search) && !t.tags.some(tg=>tg.includes(search)) && !(t.desc||"").includes(search) && !(t.goal||"").includes(search) && !(t.teacher||"").includes(search)) return false;
    return true;
  }),[tools,dept,status,tag,search]);

  return (
    <div style={{ paddingBottom:"5rem" }}>
      <div style={{ background:"#0f172a", padding:"1rem 1.2rem 1.2rem" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"0.8rem" }}>
          <div style={{ color:"#fff", fontSize:"1rem", fontWeight:700 }}>🔍 استكشاف الوسائل</div>
          {(user.role==="teacher"||user.role==="admin") && (
            <button onClick={()=>onNav("addtool")}
              style={{ background:"linear-gradient(135deg,#10b981,#059669)", border:"none", borderRadius:"10px", padding:"0.4rem 0.9rem", color:"#fff", fontSize:"0.8rem", fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:"4px", fontFamily:"Tajawal,sans-serif" }}>
              ➕ إضافة وسيلة
            </button>
          )}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="ابحث عن وسيلة..."
          style={{ width:"100%", background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:"12px", padding:"0.7rem 1rem", color:"#fff", fontSize:"0.9rem", outline:"none", fontFamily:"Tajawal,sans-serif" }} />
      </div>
      <div style={{ background:"#fff", borderBottom:"1px solid #f3f4f6", padding:"0.8rem 1.2rem" }}>
        <div style={{ display:"flex", gap:"0.5rem", overflowX:"auto", paddingBottom:"0.5rem", marginBottom:"0.5rem" }}>
          {[{id:"all",name:"الكل",icon:"📋"},...DEPTS].map(d=>(
            <button key={d.id} onClick={()=>setDept(d.id)} style={{ flexShrink:0, background:dept===d.id?"#0f172a":"#f3f4f6", color:dept===d.id?"#fff":"#6b7280", border:"none", borderRadius:"100px", padding:"0.3rem 0.9rem", fontSize:"0.75rem", cursor:"pointer", fontWeight:dept===d.id?700:400, fontFamily:"Tajawal,sans-serif" }}>
              {d.icon} {d.name}
            </button>
          ))}
        </div>
        <div style={{ display:"flex", gap:"0.4rem", overflowX:"auto" }}>
          {[{k:"all",label:"جميع الحالات"},...Object.entries(STATUS).map(([k,v])=>({k,label:v.label}))].map(s=>(
            <button key={s.k} onClick={()=>setStatus(s.k)} style={{ flexShrink:0, background:status===s.k?"#10b981":"#f3f4f6", color:status===s.k?"#fff":"#6b7280", border:"none", borderRadius:"100px", padding:"0.25rem 0.8rem", fontSize:"0.7rem", cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>
              {s.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{ padding:"0.6rem 1.2rem", display:"flex", gap:"0.4rem", overflowX:"auto", background:"#fafafa", borderBottom:"1px solid #f3f4f6" }}>
        {(allTags||INIT_TAGS).map(t=>(
          <button key={t} onClick={()=>setTag(t)} style={{ flexShrink:0, background:tag===t?"#6366f1":"transparent", color:tag===t?"#fff":"#9ca3af", border:`1px solid ${tag===t?"#6366f1":"#e5e7eb"}`, borderRadius:"100px", padding:"0.2rem 0.7rem", fontSize:"0.68rem", cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>{t}</button>
        ))}
      </div>
      <div style={{ padding:"0.6rem 1.2rem", fontSize:"0.75rem", color:"#9ca3af" }}>{filtered.length} وسيلة</div>
      <div style={{ padding:"0 1.2rem", display:"grid", gap:"0.9rem" }}>
        {filtered.map(t=>{
          const d=DEPTS.find(x=>x.id===t.dept)||DEPTS[0]; // FIX: fallback
          return (
            <div key={t.id} onClick={()=>onNav("detail",{tool:t})} style={{ background:"#fff", borderRadius:"16px", padding:"1rem", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", border:"1.5px solid #f3f4f6", cursor:"pointer", display:"flex", gap:"0.9rem", alignItems:"flex-start" }}>
              <div style={{ width:54, height:54, borderRadius:"14px", background:d.light, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"1.8rem", flexShrink:0, overflow:"hidden" }}>
                {(t.photos&&t.photos[0]) ? <img src={t.photos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : t.img}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"4px" }}>
                  <div style={{ fontSize:"0.95rem", fontWeight:700, color:"#1f2937" }}>{t.name}</div>
                  <Badge status={t.status}/>
                </div>
                <div style={{ fontSize:"0.72rem", color:"#9ca3af", marginBottom:"4px" }}>{t.teacher} • {d.icon} {d.name}</div>
                <Stars val={t.rating}/>
                <div style={{ display:"flex", gap:"0.3rem", flexWrap:"wrap", marginTop:"6px" }}>
                  {t.tags.map(tg=><span key={tg} style={{ background:"#f3f4f6", color:"#6b7280", borderRadius:"6px", padding:"1px 6px", fontSize:"0.65rem" }}>{tg}</span>)}
                </div>
              </div>
            </div>
          );
        })}
        {filtered.length===0 && <div style={{ textAlign:"center", padding:"3rem", color:"#9ca3af" }}><div style={{ fontSize:"3rem" }}>🔍</div><div>لا توجد نتائج</div></div>}
      </div>
    </div>
  );
}

/* ═══════════════════ DETAIL ═══════════════════ */
function DetailScreen({ user, tool, tools, setTools, notifications, setNotifications, allTags, setAllTags, onBack }) {
  // ✅ FIX: تعريف liveTool أولاً قبل استخدامه في useState
  const liveTool = tools.find(t=>t.id===tool.id)||tool;

  const [tab,      setTab]      = useState("info");
  const [lightbox, setLightbox] = useState(null);
  const [comment,  setComment]  = useState(""); const [myRating,setMyRating] = useState(0);
  const [comments, setComments] = useState(liveTool.comments||[]);
  const [reqNote,  setReqNote]  = useState("");
  const [reqSent,  setReqSent]  = useState(false);
  const [editName,  setEditName]  = useState("");
  const [editDesc,  setEditDesc]  = useState("");
  const [editGoal,  setEditGoal]  = useState("");
  const [editDept,  setEditDept]  = useState("");
  const [editTags,  setEditTags]  = useState("");
  const [editSaved, setEditSaved] = useState(false);
  const [mediaTab,  setMediaTab]  = useState("info");
  const [confirmDelete, setConfirmDelete] = useState(false);
  const d        = DEPTS.find(x=>x.id===liveTool.dept) || DEPTS[0]; // FIX: fallback to avoid undefined crash
  const canEdit  = user.role==="admin" || (user.role==="teacher" && liveTool.teacherId===user.id);

  // FIX: استثنِ صاحب الوسيلة من زر الحجز والطلب
  const canBook  = liveTool.status==="available" && !canEdit;
  const canReq   = liveTool.status!=="available" && !canEdit;

  const [booked,         setBooked]         = useState(false);
  const [showDatePicker, setShowDatePicker] = useState(false);
  const [selectedDue,    setSelectedDue]    = useState("");

  const openManage = () => {
    setEditName(liveTool.name);
    setEditDesc(liveTool.desc);
    setEditGoal(liveTool.goal);
    setEditDept(liveTool.dept);
    setEditTags((liveTool.tags||[]).join("، "));
    setEditSaved(false);
    setMediaTab("info"); // FIX: reset sub-tab to "info" every time
    setTab("manage");
  };

  const saveToolEdits = () => {
    const tagsArr = editTags.split(/[،,]/).map(t=>t.trim()).filter(Boolean);
    // BUG FIX: use updateTools via setTools (which is now updateTools in App)
    setTools(prev=>prev.map(t=>t.id===liveTool.id?{...t,name:editName,desc:editDesc,goal:editGoal,dept:editDept,tags:tagsArr}:t));
    setEditSaved(true);
    setTimeout(()=>setEditSaved(false),2500);
  };

  const handleToolPhoto = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      setTools(prev=>prev.map(t=>t.id===liveTool.id?{...t,photos:[...(t.photos||[]),ev.target.result]}:t));
    };
    reader.readAsDataURL(file);
  };

  const handleToolVideo = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      setTools(prev=>prev.map(t=>t.id===liveTool.id?{...t,video:ev.target.result}:t));
    };
    reader.readAsDataURL(file);
  };

  const removePhoto = (idx) => {
    setTools(prev=>prev.map(t=>t.id===liveTool.id?{...t,photos:(t.photos||[]).filter((_,i)=>i!==idx)}:t));
  };

  // الحجز مع تحديد موعد التسليم يدوياً
  const doBook = (dueDateISO) => {
    const today    = new Date().toLocaleDateString("ar-SA");
    const dueDate  = new Date(dueDateISO);
    const dueDateStr = dueDate.toLocaleDateString("ar-SA");

    if (user.role==="parent") {
      // FIX: parent sends a request only - no direct booking, no invalid date
      const targetId = liveTool.teacherId || 1;
      const notif = {
        id: Date.now(), type:"request", toolId:liveTool.id, toolName:liveTool.name,
        toolImg:liveTool.img, from:user.name, fromId:user.id, fromRole:user.role,
        toId:targetId, note:"طلب استعارة مباشر", status:"pending", date:today,
      };
      setNotifications(prev=>[notif,...prev]);
      setBooked(true);
      setShowDatePicker(false);
      return;
    }

    // إشعار تذكير يوم قبل (يُضاف كـ reminder يُعرض عند فتح التطبيق)
    const reminderDate = new Date(dueDateISO);
    reminderDate.setDate(reminderDate.getDate()-1);
    const reminder = {
      id: Date.now()+1,
      type: "reminder",
      toolId: liveTool.id,
      toolName: liveTool.name,
      toolImg: liveTool.img,
      from: "النظام",
      fromId: 0,
      toId: user.id,
      toId2: liveTool.teacherId||1,
      borrowerName: user.name,
      dueDate: dueDateStr,
      dueDateISO: dueDateISO,
      reminderDateISO: reminderDate.toISOString().split("T")[0],
      status: "pending",
      date: today,
    };
    setNotifications(prev=>[reminder,...prev]);

    setTools(prev=>prev.map(t=>t.id===liveTool.id?{
      ...t,
      status:"borrowed",
      borrowedBy: user.name,
      borrowedById: user.id,
      dueDate: dueDateStr,
      dueDateISO: dueDateISO,
      usageCount: t.usageCount+1,
      history:[{date:today, user:user.name, action:"استلام", note:`موعد التسليم: ${dueDateStr}`}, ...t.history]
    }:t));
    setBooked(true);
    setShowDatePicker(false);
  };

  const sendRequest = () => {
    // FIX: prevent duplicate pending requests for same tool
    const alreadySent = notifications.some(n=>
      n.type==="request" && n.fromId===user.id &&
      n.toolId===liveTool.id && n.status==="pending"
    );
    if (alreadySent) { setReqSent(true); return; }
    const targetId = liveTool.teacherId || 1;
    const notif = {
      id: Date.now(),
      type: "request",
      toolId: liveTool.id,
      toolName: liveTool.name,
      toolImg: liveTool.img,
      from: user.name,
      fromId: user.id,
      fromRole: user.role,
      toId: targetId,
      note: reqNote,
      status: "pending",
      date: new Date().toLocaleDateString("ar-SA"),
    };
    setNotifications(prev=>[notif,...prev]);
    setReqSent(true);
  };

  // FIX: clear borrower data on return, prevent double usageCount
  const changeStatus = (k) => {
    const today = new Date().toLocaleDateString("ar-SA");
    setTools(prev=>prev.map(t=>{
      if(t.id!==liveTool.id) return t;
      const wasNotBorrowed = t.status!=="borrowed" && t.status!=="inuse";
      const histEntry = k==="available"
        ? {date:today, user:user.name, action:"تسليم", note:""}
        : k==="borrowed"||k==="inuse"
        ? {date:today, user:user.name, action:"استلام", note:""}
        : null;
      const base = {
        ...t,
        status: k,
        history: histEntry ? [histEntry, ...t.history] : t.history,
      };
      // FIX: only increment usageCount if transitioning FROM non-borrowed state
      if ((k==="borrowed"||k==="inuse") && wasNotBorrowed) base.usageCount = t.usageCount+1;
      // FIX: clear borrower info when tool is returned
      if (k==="available") {
        base.borrowedBy    = null;
        base.borrowedById  = null;
        base.dueDate       = null;
        base.dueDateISO    = null;
      }
      return base;
    }));
  };

  const deleteTool = () => {
    setTools(prev=>prev.filter(t=>t.id!==liveTool.id));
    onBack();
  };

  return (
    <div style={{ paddingBottom:"5rem" }}>
      {confirmDelete && <ConfirmDialog message={`هل أنت متأكد من حذف "${liveTool.name}"؟ لا يمكن التراجع.`} onConfirm={deleteTool} onCancel={()=>setConfirmDelete(false)}/>}
      {lightbox && (
        <div onClick={()=>setLightbox(null)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.92)", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center", padding:"1rem" }}>
          <img src={lightbox} alt="" style={{ maxWidth:"100%", maxHeight:"90vh", borderRadius:"12px", objectFit:"contain" }}/>
          <button onClick={()=>setLightbox(null)} style={{ position:"absolute", top:"1rem", left:"1rem", background:"rgba(255,255,255,0.2)", border:"none", borderRadius:"50%", width:36, height:36, color:"#fff", fontSize:"1.2rem", cursor:"pointer" }}>✕</button>
        </div>
      )}

      <div style={{ background:`linear-gradient(135deg,${d.color}dd,${d.color}99)`, padding:"1.5rem 1.2rem 2rem", position:"relative", overflow:"hidden" }}>
        <button onClick={onBack} style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:"10px", padding:"0.4rem 0.8rem", color:"#fff", cursor:"pointer", fontSize:"0.85rem", marginBottom:"1rem", fontFamily:"Tajawal,sans-serif" }}>← رجوع</button>
        {(liveTool.photos&&liveTool.photos[0]) ? (
          <img src={liveTool.photos[0]} alt="" style={{ position:"absolute", left:"1rem", top:"50%", transform:"translateY(-50%)", width:110, height:110, borderRadius:"16px", objectFit:"cover", opacity:0.35 }}/>
        ) : (
          <div style={{ position:"absolute", left:"1rem", top:"50%", transform:"translateY(-50%)", fontSize:"6rem", opacity:0.15 }}>{liveTool.img}</div>
        )}
        <Badge status={liveTool.status}/>
        <div style={{ color:"#fff", fontSize:"1.6rem", fontWeight:900, marginTop:"0.5rem", marginBottom:"0.3rem" }}>{liveTool.name}</div>
        <div style={{ color:"rgba(255,255,255,0.8)", fontSize:"0.8rem" }}>{liveTool.teacher} • {d.name}</div>
        <div style={{ marginTop:"0.5rem" }}><Stars val={liveTool.rating}/></div>
      </div>

      <div style={{ background:"#fff", display:"flex", borderBottom:"1px solid #f3f4f6", padding:"0 1.2rem" }}>
        {[{k:"info",label:"التفاصيل"},{k:"history",label:"السجل"},{k:"reviews",label:"التقييمات"},...(canEdit?[{k:"manage",label:"⚙️ إدارة"}]:[])].map(t=>(
          <button key={t.k} onClick={()=>t.k==="manage"?openManage():setTab(t.k)} style={{ flex:1, padding:"0.8rem 0.5rem", border:"none", background:"none", borderBottom:tab===t.k?`2.5px solid ${d.color}`:"2.5px solid transparent", color:tab===t.k?d.color:"#9ca3af", fontWeight:tab===t.k?700:400, fontSize:"0.78rem", cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{ padding:"1.2rem" }}>
        {tab==="info" && (
          <>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.7rem", marginBottom:"1rem" }}>
              {[{label:"الهدف التعليمي",val:liveTool.goal,icon:"🎯"},{label:"عدد الاستخدامات",val:`${liveTool.usageCount} مرة`,icon:"📊"}].map(m=>(
                <div key={m.label} style={{ background:"#f9fafb", borderRadius:"12px", padding:"0.8rem" }}>
                  <div style={{ fontSize:"0.7rem", color:"#9ca3af", marginBottom:"4px" }}>{m.icon} {m.label}</div>
                  <div style={{ fontSize:"0.85rem", fontWeight:600, color:"#1f2937" }}>{m.val}</div>
                </div>
              ))}
            </div>
            {liveTool.dueDate && liveTool.status==="borrowed" && (
              <div style={{ background:"#fffbeb", border:"1.5px solid #f59e0b44", borderRadius:"12px", padding:"0.8rem", marginBottom:"1rem", display:"flex", alignItems:"center", gap:"0.6rem" }}>
                <span style={{ fontSize:"1.2rem" }}>⏰</span>
                <div>
                  <div style={{ fontSize:"0.72rem", color:"#92400e" }}>موعد التسليم</div>
                  <div style={{ fontSize:"0.88rem", fontWeight:700, color:"#92400e" }}>{liveTool.dueDate}</div>
                </div>
                {liveTool.borrowedBy && <div style={{ marginRight:"auto", fontSize:"0.72rem", color:"#9ca3af" }}>بواسطة: {liveTool.borrowedBy}</div>}
              </div>
            )}
            <div style={{ background:"#f9fafb", borderRadius:"12px", padding:"1rem", marginBottom:"1rem" }}>
              <div style={{ fontSize:"0.75rem", color:"#9ca3af", marginBottom:"6px" }}>الوصف</div>
              <div style={{ fontSize:"0.88rem", color:"#374151", lineHeight:1.7 }}>{liveTool.desc}</div>
            </div>
            <div style={{ display:"flex", gap:"0.5rem", flexWrap:"wrap", marginBottom:"1.2rem" }}>
              {liveTool.tags.map(tg=><span key={tg} style={{ background:d.light, color:d.color, border:`1px solid ${d.color}33`, borderRadius:"8px", padding:"3px 10px", fontSize:"0.75rem", fontWeight:600 }}>{tg}</span>)}
            </div>
            {(liveTool.photos||[]).length>0 && (
              <div style={{ marginBottom:"1rem" }}>
                <div style={{ fontSize:"0.78rem", color:"#9ca3af", marginBottom:"6px" }}>📸 صور الوسيلة</div>
                <div style={{ display:"flex", gap:"0.5rem", overflowX:"auto" }}>
                  {liveTool.photos.map((src,i)=>(
                    <img key={i} src={src} alt="" onClick={()=>setLightbox(src)} style={{ width:90, height:90, borderRadius:"10px", objectFit:"cover", flexShrink:0, cursor:"pointer" }}/>
                  ))}
                </div>
              </div>
            )}
            {liveTool.video && (
              <div style={{ marginBottom:"1rem" }}>
                <div style={{ fontSize:"0.78rem", color:"#9ca3af", marginBottom:"6px" }}>🎬 فيديو الوسيلة</div>
                <video src={liveTool.video} controls style={{ width:"100%", borderRadius:"12px", maxHeight:200 }}/>
              </div>
            )}

            {/* ── المرفقات ── */}
            {(liveTool.attachments||[]).length>0 && (
              <div style={{ marginBottom:"1rem" }}>
                <div style={{ fontSize:"0.78rem", color:"#9ca3af", marginBottom:"8px" }}>📎 المرفقات</div>
                <div style={{ display:"grid", gap:"0.5rem" }}>
                  {liveTool.attachments.map((att,i)=>(
                    <AttachmentCard key={i} att={att}/>
                  ))}
                </div>
              </div>
            )}

            {/* ── حجز للجميع (متاحة) ── */}
            {canBook && !booked && !showDatePicker && (
              <button onClick={()=>{ user.role==="parent" ? doBook("") : setShowDatePicker(true); }}
                style={{ width:"100%", background:`linear-gradient(135deg,${d.color},${d.color}cc)`, border:"none", borderRadius:"14px", padding:"0.9rem", color:"#fff", fontSize:"1rem", fontWeight:700, cursor:"pointer", marginBottom:"0.8rem", fontFamily:"Tajawal,sans-serif" }}>
                {user.role==="parent" ? "📚 استعارة الوسيلة" : "📅 حجز الوسيلة"}
              </button>
            )}

            {/* ── منتقي التاريخ للمعلم ── */}
            {canBook && !booked && showDatePicker && (
              <div style={{ background:"#f9fafb", border:`1.5px solid ${d.color}44`, borderRadius:"16px", padding:"1.1rem", marginBottom:"0.8rem" }}>
                <div style={{ fontSize:"0.88rem", fontWeight:700, color:"#0f172a", marginBottom:"0.8rem" }}>📅 حدد موعد التسليم</div>
                <input
                  type="date"
                  value={selectedDue}
                  min={new Date(Date.now()+86400000).toISOString().split("T")[0]}
                  onChange={e=>setSelectedDue(e.target.value)}
                  style={{ width:"100%", background:"#fff", border:"1px solid #e5e7eb", borderRadius:"10px", padding:"0.7rem 1rem", fontSize:"0.9rem", outline:"none", fontFamily:"Tajawal,sans-serif", marginBottom:"0.8rem", color:"#1f2937" }}
                />
                {/* FIX: use inline error instead of alert() */}
                {!selectedDue && <div style={{ color:"#ef4444", fontSize:"0.78rem", marginBottom:"0.6rem" }}>⚠️ يجب اختيار موعد التسليم أولاً</div>}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0.6rem" }}>
                  <button onClick={()=>setShowDatePicker(false)}
                    style={{ background:"#f3f4f6", border:"none", borderRadius:"10px", padding:"0.7rem", color:"#6b7280", fontWeight:700, fontSize:"0.85rem", cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>إلغاء</button>
                  <button onClick={()=>{ if(!selectedDue) return; doBook(selectedDue); }}
                    style={{ background:`linear-gradient(135deg,${d.color},${d.color}cc)`, border:"none", borderRadius:"10px", padding:"0.7rem", color:"#fff", fontWeight:700, fontSize:"0.85rem", cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>تأكيد الحجز ✅</button>
                </div>
              </div>
            )}

            {booked && <div style={{ background:"#ecfdf5", border:"1.5px solid #10b981", borderRadius:"14px", padding:"0.9rem", textAlign:"center", color:"#065f46", fontWeight:700, marginBottom:"0.8rem" }}>✅ {user.role==="parent"?"تم إرسال طلب الاستعارة! سيتم إخطارك عند الرد":`تم الحجز بنجاح! موعد التسليم: ${liveTool.dueDate||""}`}</div>}

            {/* ── طلب لو مش متاحة ── */}
            {canReq && !reqSent && (
              <div style={{ background:"#fffbeb", border:"1.5px solid #f59e0b33", borderRadius:"14px", padding:"1rem" }}>
                <div style={{ fontSize:"0.85rem", fontWeight:700, color:"#92400e", marginBottom:"0.6rem" }}>📨 طلب الوسيلة</div>
                <p style={{ fontSize:"0.78rem", color:"#92400e", marginBottom:"0.8rem" }}>الوسيلة غير متاحة حالياً — يمكنك إرسال طلب{user.role==="parent"?" للمعلم المسؤول":" للمعلم"}</p>
                <textarea value={reqNote} onChange={e=>setReqNote(e.target.value)} placeholder="اكتب ملاحظة مع طلبك (اختياري)..." rows={2}
                  style={{ width:"100%", border:"1px solid #f59e0b66", borderRadius:"10px", padding:"0.6rem", fontSize:"0.82rem", resize:"none", fontFamily:"Tajawal,sans-serif", outline:"none", background:"#fff", marginBottom:"0.6rem" }} />
                <button onClick={sendRequest} style={{ width:"100%", background:"linear-gradient(135deg,#f59e0b,#d97706)", border:"none", borderRadius:"10px", padding:"0.7rem", color:"#fff", fontSize:"0.88rem", fontWeight:700, cursor:"pointer", fontFamily:"Tajawal,sans-serif" }}>
                  إرسال الطلب 📨
                </button>
              </div>
            )}
            {canReq && reqSent && (
              <div style={{ background:"#ecfdf5", border:"1.5px solid #10b981", borderRadius:"14px", padding:"0.9rem", textAlign:"center", color:"#065f46", fontWeight:700 }}>
                ✅ تم إرسال طلبك! سيتم إخطارك عند الرد
              </div>
            )}
          </>
        )}

        {tab==="history" && (
          <div>
            <div style={{ fontSize:"0.85rem", fontWeight:700, marginBottom:"1rem" }}>📋 جدول الاستلام والتسليم</div>
            {liveTool.history.length===0 && <div style={{ textAlign:"center", padding:"2rem", color:"#9ca3af" }}><div style={{ fontSize:"2.5rem" }}>📋</div><div>لا يوجد سجل بعد</div></div>}
            {liveTool.history.map((h,i)=>(
              <div key={i} style={{ background:"#f9fafb", borderRadius:"12px", padding:"0.9rem", marginBottom:"0.7rem", display:"flex", gap:"0.8rem", alignItems:"center" }}>
                <div style={{ width:36, height:36, borderRadius:"10px", background:h.action==="استلام"?"#ecfdf5":"#eff6ff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"1.1rem" }}>{h.action==="استلام"?"📤":"📥"}</div>
                <div style={{ flex:1 }}><div style={{ fontSize:"0.85rem", fontWeight:600 }}>{h.user}</div><div style={{ fontSize:"0.72rem", color:"#9ca3af" }}>{h.action} • {h.date}</div>{h.note&&<div style={{ fontSize:"0.72rem", color:"#6b7280" }}>"{h.note}"</div>}</div>
              </div>
            ))}
          </div>
        )}

        {tab==="reviews" && (
          <div>
            <div style={{ background:"#f9fafb", borderRadius:"14px", padding:"1rem", marginBottom:"1rem" }}>
              <div style={{ fontSize:"0.8rem", fontWeight:600, marginBottom:"0.5rem" }}>💬 أضف تعليقك</div>
              <div style={{ display:"flex", gap:"4px", marginBottom:"0.6rem" }}>
                {[1,2,3,4,5].map(s=><span key={s} onClick={()=>setMyRating(s)} style={{ fontSize:"1.3rem", cursor:"pointer", color:s<=myRating?"#f59e0b":"#e5e7eb" }}>★</span>)}
              </div>
              <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="اكتب تعليقك..." rows={2}
                style={{ width:"100%", border:"1px solid #e5e7eb", borderRadius:"10px", padding:"0.6rem", fontSize:"0.85rem", resize:"none", fontFamily:"Tajawal,sans-serif", outline:"none" }} />
              <button onClick={()=>{ 
                if(!comment.trim()) return; 
                const newComment = {user:user.name,text:comment,rating:myRating||4,date:"الآن",userId:user.id};
                // FIX: update rating average and reviews count
                setTools(prev=>prev.map(t=>{
                  if(t.id!==liveTool.id) return t;
                  const allComments = [newComment, ...(t.comments||[])];
                  const newRating   = allComments.reduce((sum,c)=>sum+c.rating,0) / allComments.length;
                  return {...t, comments:allComments, rating:Math.round(newRating*10)/10, reviews:allComments.length};
                }));
                setComments(prev=>[newComment,...prev]);
                setComment(""); setMyRating(0); 
              }}
                style={{ marginTop:"0.5rem", background:"#0f172a", color:"#fff", border:"none", borderRadius:"10px", padding:"0.5rem 1.2rem", fontSize:"0.82rem", cursor:"pointer", fontWeight:700, fontFamily:"Tajawal,sans-serif" }}>نشر</button>
            </div>
            {comments.map((c,i)=>(
              <div key={i} style={{ background:"#fff", border:"1px solid #f3f4f6", borderRadius:"12px", padding:"0.9rem", marginBottom:"0.7rem" }}>
                <div style={{ display:"flex", gap:"0.6rem", alignItems:"center", marginBottom:"0.4rem" }}>
                  <Av initials={c.user.split(" ").map(w=>w[0]).join("").slice(0,2)} color="#6366f1" size={32}/>
                  <div><div style={{ fontSize:"0.82rem", fontWeight:700 }}>{c.user}</div><div style={{ fontSize:"0.65rem", color:"#9ca3af" }}>{c.date}</div></div>
                  <div style={{ marginRight:"auto", display:"flex", alignItems:"center", gap:"0.5rem" }}>
                    <Stars val={c.rating}/>
                    {(user.role==="admin" || c.userId===user.id) && (
                      <button onClick={()=>{
